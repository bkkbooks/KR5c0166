body:
  text: 進表臣守灝言太清顯迹悉資信史之洽聞浩劫遺編必俟熙朝而大備時哉難得道不虛行臣守灝誠惶誠恐稽首頓首切以九霄之上素號帝鄉六合之外具存聖典三墳不存則羲農之迹熄六籍既出而周孔之業興粵在漢唐之盛時咸尚黃老之至教聖賢間作元化誕敷世道交興斯文弗墜惟混元之上聖寶妙道之大原生天生地而莫睹其端倪神鬼神帝而孰窮其畛域先延康赤明之劫既歷代為師洎有商蒼姬之時復分身應化有教無類則西胡成道至道不測則東魯見龍惟其知之者希無怪言之弗究舊傳第測管而窺豹後學益多岐而亡羊蔑聞藏室之全書兹實教門之闕典臣材非入室學愧顓門詎能馳騁乎翰墨之場不過涉獵乎藝文之囿研精而髮半鶴染翰而手屢龜搜羅三教書編敘而為聖紀稽考百家説訂正而合真經計餘十萬言分為一十卷抑亦古人之糟粕庶為後學之筌蹄雖道不在於書而捨書則其道曷傳猶迹固出於履而索履者非迹何代然欲記久而明遠要當辨妄而歸真希開海宇之昏蒙必藉風雷之號令恭惟皇帝陛下離明繼照天德出寧運陰陽不測之神行清靜無為之化祖禪父而父禪子振古無雙人法地而地法天與道為一邁唐虞成周之盛見典章文物之隆矧片善之不遺苟寸長而必録臣聿懷千載之遇輒效一得之愚藐爾涓埃儻容著丙部之録美兹芹菽覬獲塵乙夜之觀臣所編太上老君混元聖紀謹隨表投進以聞臣守灝誠惶誠恐稽首頓首謹言紹熙二年三月日觀復大師高士臣謝守灝上表
  hash: sha256:30aa14470ddd8742ca5217230950f5e241f01468734b9d9845b1c291553f7c76
