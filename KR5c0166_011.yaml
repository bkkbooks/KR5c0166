front:
  text: 混元聖紀卷之九與九
  hash: sha256:0f734eb5b4d4a456db7934457f25902a9a7dfbd166dd6a219a38f9967a349c36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_HFL_011-001a, image: hfl/0553/0553-084.png}
body:
  text: 宋觀復大師高士謝守灝編九月置譙郡紫極宫宜準西京例為太清宫先天太皇先天太后廟亦改為宫太清宫制度南開三門兩重東西各開三門一重每門安戟正殿前後八間置卯階午階酉階及布甎置龍墀沙墀及置皇帝齋宫公卿及行事官齋宇御厨齋厨及官吏公宇焉十二月戊戌帝幸華清宫忽見老君現於朝元閣上移刻不見遂改朝元閣為降聖閣帝見靈符有天寶萬載之文天寶二字已應改元之號遂詔改年為載以合之又改桃林縣為靈寶縣置天寶觀立御製靈符銘於其處四載四月癸巳詔曰尊祖奉先必在於崇敬辨儀正禮所貴於緣情伏以大聖祖玄元皇帝御氣升天長生久視體重玄而不測與玄化以無窮真容屢現天寶仍集恭惟孚佑實表常存比太清宫行事皆具冕服爰及奏樂未易舊名并告獻之時仍陳策祝既非事生之禮豈是降仙之儀且真容殊倫幽明異數理有非便亦在從宜自今後每於太清宫諸宫行禮官宜改用朝服兼停祝板其告獻辭及所奏樂章朕當自修撰仍令所司具儀注奏聞帝製降真召仙之曲紫微送仙之曲於太清宫奏之詔改三禮為三再拜以祝板為靑詞用靑紙朱書御署稱嗣皇帝臣果永為常式七載閏六月丙寅帝親謁太清宫上聖祖玄元皇帝尊號為聖祖大道玄元皇帝丙辰詔曰玄宗妙本實備微言垂範傳學將弘至化朕所以發求道之使遠令搜訪因聞政之餘親加尋閲既刊訛謬爰正簡編必有闡揚以崇勸道令內出一切道經宜令崇玄館即繕寫分送諸道採訪使令管內諸道轉寫其官本便留採訪至郡親勸持誦聖人垂訓莫先於道學者宗本必有其師文宣王與聖祖同時俱為教首雖考言比德理在難名而問禮敘經迹彰親授思廣再三之義用崇混一之尊宜於太微宫聖祖前更立文宣王儀像與四真人列侍左右是日大赦制曰褅祫之禮以存序位質文之變蓋取隨時國家系本仙宗業承聖祖重熙纍盛既錫無疆之庥合享登神思弘不易之典自今已後每禘祫並於太清宫聖祖前設位序正上以明陟配之禮欽若玄宗下以盡虔恭之誠無違至道比來每緣禘祫時享則停事雖適於從宜禮或虧於必備已後每緣禘祫其常享以素饌三上香以代三獻初太清宫成命工人於太白山採白石為玄元聖容又採為玄宗聖容行立於右皆衮冕之服繒絲朱玉為之今又琢玉為老君聖祖像及帝真容於啓聖宫九載庚寅御史大夫王鉷奏稱太白山人王玄翼見玄元皇帝於寶仙洞中得玉石函上請護國經寶券紀籙等帝乃命刑部尚書王倕往訪之遂取以進十載辛卯春正月乙酉朔帝親朝獻太清宫癸巳朝享太廟甲午有事于南郊合祭天地十一載壬辰三山飢死者十五六多採野葛山芋而食忽有二靑童降于劍州女冠王法進之庭謂曰大帝以汝夙稟仙骨志不忘道敕我迎汝受事於上京也法進不覺騰身凌虛徑達帝所夫老君下理十天撫掌兆民則謂之天皇大帝耀魄寶也於是法進朝拜老君命以霞漿賜之徐謂曰世人厭棄五穀為天神所責汝宜歸世間告諭下民使其悔罪乃命侍女授以靈寶清齋告謝天地儀範一軸俾傳於世曰可相率於高山幽靜之所致齋悔罪則宿業可除穀父蠶母之神為致豐衍矣龍虎之年當復召汝乃遣還今蜀中所行天公齋是也法進以十二載復升天十三載二月癸酉帝親朝獻太清宫加上聖祖玄元皇帝尊號曰大聖祖高上大道金闕玄元天皇大帝敕有司每年四孟及五臘修薦獻上香之禮天下州縣永依此式十五載帝辛蜀玄元見於漢中郡三泉縣黑水之側帝親禮謁遂命刻石像真容於所在之處在秦望驛南六里又於利州益昌縣嶺上見老君乘白鹿而過忽去其角變為白𤢟以示收祿山之兆詔封其山為白衛嶺於所現之處置自然觀初李泌幼有神仙志嘗遊嵩山參訪道術老君敕安期生戒之曰國祚將危時方多難宜以文武之道佐佑人主廣濟生靈方可脫屣登真耳泌乃還遂佐肅宗剪除暴亂恢復王室歷輔三朝然後仙化按太平廣記所載云李泌母周氏有娠三年寤而生生而髮至眉為兒童時身輕能於屏風上立有道人云此子十五歲必白日升天父母親族聞之以為憂或空中有異香及音樂之聲時有綵雲挂於庭樹其家乃作蒜虀令人登屋潑之後遊嵩山衡山因遇桐柏真人羡門子安期先生授以長生羽化服餌之道且戒之曰太上之命以國祚中危朝廷多難宜以文武之道佐佑人主功及生靈然後可登真脫屣耳自是多絶粒服氣修黃老谷神之要天寶八載在表兄鄭叔則家忽兩日冥然如寐忽其身自頂踴出長二三寸傍有靈仙揮手動目如相助者足將及頂及念言大事未畢復有庭闈之戀願終家事於是在傍者皆散見一人儀狀甚巨衣冠如帝王者前有婦人禮服而跪如帝者責曰情知未得固欲令來使勞靈仙之衆跪者對曰不然宜教伊近天子遂寤十載玄宗召入內應制作皇唐聖祚文及講道德經敕與太子諸王為布衣之交楊國忠嫉之遂遁入名山安祿山陷潼關玄宗肅宗分道巡狩虢王為河洛節度使人求得泌於嵩少間會肅宗手札至虢王即備車馬送至靈武肅宗延於卧內動靜顧問規畫大計寢則對榻出則聯鑣嘗與泌論諸將功賞因曰若臣之所願特與他人異上曰何也泌曰臣絶粒無家祿位與茅土皆非所要但枕天子膝睡一覺使有司奏客星犯帝座足矣上大笑及南幸扶風每頓必令泌領元帥兵先發請行宫收管鑰奏報然後軍駕至寶定郡泌稍疲先於本院寐上至不令人驚之登牀捧泌首置於膝良久泌覺上曰天子膝已枕矣尅復之功當在何時泌遽起謝曰以臣觀之假九廟之靈乘一人之威當如郡名必保定矣既旬日而西域河隴之師皆會江淮庸調亦相繼而至遂克復兩都泌之居山也栖神幽林不交人事居內也密謀正救動合玄機所以代歷四朝恩渥隆異而兀載李輔國之輩嫉之若仇代宗即位纍有頒賜中使旁午於道號天柱峰中嶽先生賜朝天玉簡薨贈太子太傅是月中使林遠於藍關逆旅遇泌單騎常服暫往衡山話三朝之事慘然久之乃别到長安方聞其薨德宗聞之尤加愴異是乃佐四聖而脫屣也斯言驗矣夔州道士王法明生而舌長呼字不正及入道乃日誦道德經數年後忽夢老君為剪其舌既覺語言遂正肅宗至德二年丁酉三月十八日通化郡人為國祈福於雲龍巖建大齋會忽有祥雲異香氤氲不散移時漸開有神光照天乃見老君立於山前自地接天其山雖高不及其肘左手垂下右手執五明扇儀相炳然衆悉瞻禮良久乃隱遂具奏聞詔圖其本太上高皇製讚並序曰我大聖祖誕敷衆妙光宅上清貽厥孫謀屢彰幽贊晝現殊相空浮瑞色七耀五明之服玉童金媛之儀道釋人天作禮瞻奉昔真誥傳於羊角寶祚無疆今宸儀炳於龍巖妖氛將殄豈惟歷代師授前王得一斯乃宗社降祥後昆惟萬申命藻繪示諸郡國若對寥陽之宇如臨太極之庭讚曰猗我烈祖闡教乘時理身理國曰希曰夷上開仙洞俯視靈姿昭融至道叶贊無為巖谷增麗丹靑罔追神光爍爍淑景遲遲當朝稱慶列郡來斯福祚流衍千齡在兹乾元二年己亥帝夢二靑童導從至一宫闕謁見老君冠九鳳冠衣雲霞衣鬚髮皆黑憑玉几執拂真人童子玉女力士侍衛極衆帝衣絳衣秉圭立侍其後遊涉山海經歷甚遠及旦宣訪諸像乃於務光坊光天觀聖祖院果有黑髮老君之像一如夢中所見帝大悅乃出御容畫像令侍立於像後仍頒天下普令供養代宗大曆五年丙午八月己巳朔乙亥上顧謂宰臣曰神仙之事信乎李藩對曰神仙之説出於道家道家所宗老子五千言為本老子指歸與經無異後代好怪之流假託老子神仙之説故秦始皇遣方土入海求仙漢武帝以女妻方士求不死藥二主受惑即無所得文皇帝服胡僧藥遂致暴疾不救古詩云服藥求神仙多為藥所悮誠哉是言也君人者但務其理四海樂推社稷延永自然長年也上深然之德宗貞元十年甲戌十月十六日果州南充縣金泉山女冠謝自然修道功成老君命召之白日上升後三月再自天降謂刺史李堅曰天上有玉堂最高老君居焉白玉為壁上皆金題神仙之名時有宋書注其下云降世為帝王或為宰輔凡神仙入謁見老君皆四拜焉豫恐世人不信有神仙之事故暫來語君言訖遂即升天堅以表聞有詔褒美按太平廣記云謝自然性穎異少不食葷血母令隨尼越惠經年以疾求歸又令隨尼日曉數月亦求還其家在大方山下山頂有石像老君自然因瞻禮顧謂母曰此兒所願居也母從之乃遷居山頂常誦道德經黃庭內篇居久之年十四歲因食新稻見是蛆蟲自此絶粒其父寰官遊多年及歸見自然不食怒曰我家世業儒何得有此妖惑固鎖閉室中四十餘日益加爽秀寰方驚異之既而東嶽夫人與諸仙時降其家令以香湯沐浴不得用乳頭香又云上天自有真仙非鬼神之類上界無削髮之人得道之後悉皆冠履仙裝也又自然升天時書于堂之東壁云寄語諸眷屬莫生悲苦可勤修功德修立福田清齋念道百劫之後冀有善緣早會清原之鄉即得相見其書迹存焉李堅述金泉道場碑及傳具載其本末昌黎韓文公愈詩云果州南充縣寒女謝自然童騃無所識但聞有神仙輕生學其術乃在金泉山繁華榮慕絶父母慈愛捐一朝坐空室雲霧生其間如聆笙竽韻來自冥冥天白日變幽晦蕭簫風景寒簷楹互明滅五色光屬聯觀者徒傾駭躑躅詎敢前須臾自輕舉飄若風中煙茫茫八紘大影響無由緣里胥上其事郡守驚且觀驅車領官吏氓俗事相先入門無所見冠履同蛻蟬皆云神仙事爍爍信可傳蓋謂此也敬宗寶曆元年乙巳七月命左僕射平章事李逢吉攝太尉充孟秋薦獻大聖祖于太清宫寶曆二年丙午正月帝有事於南郊朝獻太清宫御駕將至老君化為一白衣叟指示長安縣主簿鄭翦曰當此路有眢井可速實之俄失老人所在駕至具以聞百官稱賀詔兵部侍郎韋處厚撰碑起居郎柳公權書之置於實井之側仍編付史官立碑之際忽有徑風颯然而起旋飈不已衆仰視之乃見老君紫衣金冠躡金履立於白蓮之上右手執五明扇左手垂下空中見光明如金色公權與鎸碑人瞻睹良久因以物畫地記其形像及畫畢老君忽以扇指空中流光四散乃騰空而去衆皆注目須臾漸遠沒於雲中遂以事奏聞詔編事迹入碑見柳公權書韋處厚所撰碑大和七年癸丑八月文宗詔曰聖人立極教本奉先王者配天義惟尊祖我大聖祖玄元皇帝肇開寶運垂祚有唐致六合於大同躋群生於壽域保兹鴻業實賴貽謀如聞亳州太清宫頻經水潦頗似摧毁永惟聖誕之地敢忘崇奉之誠宜令宣武軍節度使李程兼充毫州太清宫使乃委漸加修葺以時致敬稱朕意焉開成二年丁巳五月中書舍人高元裕為閬州刺史於州北九里嘉陵江上小山之前忽有崖壁間光彩有異近而觀之石上有自然文成老君之像眉髮巾履服飾無不周備傍有一人寬衣大袖持爐薦香後一童子雙髺高束謹若聽命皆非人力圖繪鎸刻所及元裕每有祈禱即紫氣上浮又有靈泉自湧士民請福無不立效遂刻石建宇用旌其瑞仍圖畫進呈詔編入史武宗以開成五年庚申正月即位二月敕玄元皇帝降生日宜為降聖節休假三日宣宗大中四年七月一日老君遣真人韓衆賜河中永樂縣道淨院道士侯道華姓李賜名內芝命住上清宫善進院按宣室志云唐文宗時道士鄧太玄煉丹成留一合藏於院內後周悟仙主院事有侯道華者灑掃隸役無所不為諸道士常奴畜之然常好子史手不釋卷人或笑之答曰天上無愚懵仙人一旦刳去門前古松之枝云他日礙我上升衆咸怒之時大中五年五月二十日也明旦道華留詩與周悟仙云帖裏大還丹多年色不移前宵盜喫却今日必空飛慚愧深珍重珍重鄧天師他年鍊得藥留著與內芝吾師知此術速鍊莫為遲三清專相待大羅的有期下列細辭云去年七月一日蒙韓君降賜姓李名內芝配住上清善進院乃脫屣松下上古松之表脫衣挂松上而飛升節度使鄭公光按視不誣以事聞奏詔賜絹五百匹並賜御衣修飾殿廊賜名升仙院大中十二年戊寅天台山僧陳惠虛久居國清寺因與同侣遊山欲過石橋水浚苔滑衆皆股栗不行惠虛獨超然而過徑上石壁至夕不回惠虛至石壁外見微有小徑稍稍平闊遂見宫闕花卉萬叢臺閣連亘十里許見三門相向鼎峙其中門題額曰會真府左門曰金庭宫右門曰桐柏宫皆有金樓玉窗高百餘丈入右門內之西又一高樓廣門題曰右弼宫周顧數千間屈曲相通瑶階玉陛流渠激水處處華嚴而了無人迹又入一院見靑衣童五六人相顧笑語而去再三問之應曰但問張老須臾回顧見一老叟扶杖持花而來訝曰汝俗之人何忽至此惠虛曰常聞過石橋即有羅漢寺人世時聞鍾聲故來尋訪千生幸會至此境界不知羅漢何在張老曰此真仙之福庭天帝之下府號曰金庭不死之鄉養真之靈境周回百六十里神仙右弼桐柏上真王君主之列仙三千人上真三百人神王力士天帝玉女萬人為小都會之所太上老君一年三降此宫校定天下學道之人功行品第乃神仙所都非羅漢所居也問曰王君為誰張老曰周靈王之太子浮丘公之弟子位為上真矣惠虛曰神仙可學否張老曰積功纍行肉身升天在於立志堅久耳汝得見此福庭亦是有可學之望又問曰仙道以何門而入張老曰內以保神鍊氣外以服餌丹華凡為仙者神丹之力也汝不可久住上真適遊東海騎衛若還恐有冥責因引之使出門行十餘步已在國清寺矣惠虛自此慕道常好丹石晚居終南山捧日寺漸衰老其心愈切寢疾月餘羸憊且甚忽有老叟負藥囊入寺大呼曰賣大還丹衆僧皆笑之乃指惠虛之門戲謂老叟曰此僧頗好還丹售之可也老叟欣然詣之留藥數丸惠虛便服之老叟即去衆相率來問言已買得還丹吞服之矣遙指衆僧曰勿前覺爾等有臭頃間易新衣忽飛登殿簷揮手相别冉冉凌空而去懿宗咸通元年庚辰二月草寇仇甫攻掠越州奔突縣邑官吏奔駭因據剡縣城詔八道會師討之居民潛竄有沈瑩者家奉老君像甚精誠瑩聞兵至倉惶鎖門而逃誤鎖小童在舍中却回欲開門則營幕充斥矣後勝敗不常市肆焚爇無幾十餘月方誅殄罷兵後瑩所居悉無所損及開鎖小童安然問其故云門閉之後並無驚伯但有一靑衣童子年可十三四來云老君令我嬉戲又引去一大宅內得飲食果食啖才如半日許即聞老君令添香火才炷香了即聞門聲瑩入門時香猶未熄十年己丑九月徐州賊龐勛來寇亳領其徒三千餘人趨太清宫欲據為營壘是日避難士庶千餘人咸在宫內忽望見老君自宫中乘空而南須臾黑氣自九井中出良久昏曀一川賊黨迷路自相蹂踐龐勛溺水而死逡巡開霽無孑遺矣汴州節度使李蔚奏聞尋遣使詣宫告謝仍下詔曰苦縣舊里聖祖故鄉宫宇具嚴廟貌斯設昨者餘妖奔突縱火焚燒陰霧覆蔽於晴空狂寇顚迷於道路散逸鹿野遂至夷平緬惟玄功申兹靈貺內出靑詞虔申告謝布示中外仍付史官僖宗廣明元年庚子三月黃巢攻劫郡邑七月寇淮南將焚太清宫忽陰風四起變暑為寒賊衆駭散卒不敢攻而去又有群盜欲劫掠宫庭行至近境忽陰雲昏蔽迷失路徑乃回亳州城下因圍逼州城攻擊甚急刺史潘稠望宫焚香設拜以祈救護頃之黑霧自宫中來周旋城外腥毒可畏俄密雪交下寒涷異常賊死者十五六而城內晴景晏然復有神鴉銜接賊懼乃解圍去尋亦散滅潘稠令道士馬含彰孫棲梧等上奏云太清宫自乾符已後纍有逆寇少或逾千多或萬餘皆窺伺太清欲為焚劫或來攻城邑或傍犯縣城凡一百八度老君皆密垂神化忽起濃雲或祛以雲風或擊以雷電率皆顚沛尋至敗亡庇謢邦人莫知其數請移縣治就宫安靑詔答曰恐移縣就宫必多穢瀆縣仍舊所準萬年例升為赤縣仍降表詞告謝帝望宫稽首拜而遣之八月十二日敕毫州太清宫是玄元降聖之地名高道祖福蔭皇基九龍之瑞井涵空一鹿之仙蹤在木纍代之祺祥可紀近年之感應尤彰所宜嚴盛於福庭安可荒涼於淨宇潘稠能施善政久染真風廣出俸錢備修宫觀垣墻棟桷無不精新像設丹靑彌加煥麗觀圖考事深可慰嘉其住宫威儀道士吳重玄可賜紫仍號凝玄先生道士馬含彰孫棲梧并賜紫潘稠加金紫光祿大夫檢校工部尚書餘如故十一月黃巢陷東都駕幸興元賈湘隸職計司有老君晝像常持以自隨所至處雖一日亦設香火之位黃巢陷長安湘挈家避難居龍角山下忽有群賊圍其家湘入告老君乃出與賊語賊投刃於地羅拜其前湘入門賊猶拜稱罪過湘哀之持贈帛慰勉之一無所取而去或間賊何所見而反拜曰我見賈君左右神兵極多皆長數丈呀口瞪目似欲吞噬懼不得命耳自後外户不扃人無敢犯成都楊鬧兒奉祀老君精勤不怠嘗於金堂把截被虜往南山寨中晝夜常念老君願再見父母忽夢老君賜雲一朵令一童子引之送於平地及覺已出山寨因得還家到家日父母已作百日齋矣二年辛丑三月河中節度使王重榮奏據晉州申龍角山慶唐觀老君殿側柏樹上瑞葛枯死重生是武德中老君應見後於二樹間立殿宇逾年之後柏樹上忽自生葛蔓長十餘丈榮茂異常其後齊王奪嫡此葛蔓枯死旬日之後忽然再生齊王遂敗至中宗復位朱泚謀亂葛皆枯落久而復生廣明元年黃巢犯闕其年秋葛蔓枯死二年春枝葉再茂又於傍樹上别生一枝旬日間長五丈餘繁茂異常有詔褒美編付史官六月駕幸成都七月改元中和中和二年壬寅七月辛亥朔丙午夜西北方赤氣如虹竟天賊將尚護攻宜君寨雨雪盈尺寒甚賊兵凍死者十二三八月二十九日戊辰宗室李特立命道士李無為於成都靑羊肆玄中觀設醮忽見紅光如毬出於殿基東南竹林中跳躑入殿西梅樹下忽不見遂穿其地入三尺許乃得甎一口長一尺一寸五分闊七寸四分一邊厚一寸三分有花紋一邊厚一寸八分重一十二斤有古篆六字各方二寸深三分鎸刻瑩潔逮非人工其文曰太上平中和災九月庚辰西川節度使侍中陳敬瑄以聞奏曰皇帝陛下稽古順天應圖撫運凝懷至道屬相大同是用省方以明罪己深仁旁達於下土至德升聞於上玄符讖永臻禎祥間出降太上臣扶之命靖中和寇孽之災乃示明文爰形古篆足表妖氛即殄聖壽無疆克知攸復之期便是清寧之日帝令宣示百官中書侍郎平章事章昭度户部侍郎平章事蕭冓門下侍郎平章事鄭畋御史中丞張瀆宗正鄉曹王龜年等表賀曰伏以藿蒲嘯聚車馬省方天災流行國家代有陛下下成湯罪己之詔徴王者有征之師顧彼凶妖即當殄滅清平既彰於嘉兆幽贊爰睹於祕文赤雀銜書貺豈同於天上玄龜負卦慶難比於平災況因宗室齋醮之辰仍有祥光跳躑之瑞其為感現可謂丁寧又復奏云伏自翠華南指黃道西分山行則六鳳翔軒水渡則雙龍負楫劍飛峭壁芝秀行宫祥文泛木於湘川麗日交輝於蜀國蓋由聖神所祐謙抑不居遂令感動玄穹發揮厚土靑羊故里精思盤石之臣白馬新蹤默啓靈甎之篆仙家祕密景祚延洪周旋六字之中契合千年之運魏代之始管宫廟玉璽效祥舜朝之流眄庭除金車迥出方於貽賑難繼斯文云樞密使李順融十軍十二衛都指揮使田令孜表賀曰今者爰有維城來斯仙觀至誠才發嘉兆俄呈現此時在地之赤光是昔日度關之紫氣及穿積土果獲古文驗逸勢之龍蛇知即平其梟獍來於幽邃理頗昭明既太上今已平災知中和永昌厥祚所現全因聖祖掘得又自皇枝驗此靈蹤可明天意且玄元聖祖每逢多難皆有殊祥惟彼明徴備書正史昔於丹鳳門上告田同秀以天寶復國之期今者靑羊肆中示李特立以陛下還宫之慶莫不天下幸甚乞付史官從之十五日李特立授太子校書李無為賜紫仍各賜縑帛二百匹二十一日詔曰太上玄元大帝與弟子文始先生講真經於樓觀之臺約後會於靑羊之肆便乘雲駕俱入流沙仙記傳聞地圖摽載自周昭至于此日曆數約二千餘年景象寂寥基蹤罕落今因巡幸靈貺昭彰殊光跳躑於庭前靈篆甲明於樹下甎含古色字驗伏徴中和之災害欲平厚地之禎符乃現足表玄穹降佑聖祖垂祥將殲大盜之兵戈永耀中興之事業須傳簡册兼示寰區以付史官備令編録仍模勒文字告示諸道及軍前其觀可改號靑羊宫仍置殿堂屋宇側近屬觀田地約有兩頃近來散屬黎氓多植蔥蒜清虛之地難使薰蒸已賜錢二百貫便令收贖仍紿公驗永歸靖廬宗子特立除官道士李無為以賜紫所宜升奬用慶靈休敬瑄位冠公台風行郡國效節於延洪之代修心於道德之鄉遂令境內銷兵地中呈寶其如休美倍可嘉稱云十月七日敕高品鄭遵泰監建靑羊宫土木工用並內庫宣賜自獲靈瑞之後至是月癸丑近蜀群寇相次擒戮旬日之內遂致清平駕幸靑羊宫頒賜有差李特立賜緋授龍州録事參軍三年癸卯下詔曰太上垂祥靑羊應現禮宜崇飾用答殊休諸道州府紫極宫宜委長吏量事修飾仍選差有科儀道士祭醮五月丙寅朔劍南西川節度使成都尹陳敬瑄準詔設醮詞文云伏以上聖誕膺寶命丕纂鴻樞自出震以來至御乾之後何嘗不納隍在慮馭朽勞思惠布寰區恩覃動植雖志期清淨而運偶艱難旋屬盜據宫闈毒流士庶震驚宗廟沸蕩山川是用勞天步以禳災王蜀都而罪己伏賴玄祖垂佑靈符降祥垂六字之明文表千年之聖祚今則果潰元惡爰收九重指鳳闕以非遙返鑾旗而有日臣虔奉綸旨精按科儀投玉板以陳詞潔金壇而備醮伏冀群真效祉大道垂休蕩邪氣於六天掃妖氛於九有保安社稷永息兵戈即仰荷大道覆育之恩尋收復京城誅黃巢秉黃業及同惡等海內清晏大駕還宫敕翰林學士承旨兵部侍郎樂朋龜撰靑羊宫記四年九月八日中書門下奉敕牒西川節度使立碑于宫云金闕降祥紫氣接度關之狀遙壇祕瑞赤光騰發地之祥粵有玄符留于古篆當午夜而龍蛇搖動六字分輝後一年而狼武蕩平八紘無事克昭靈貺獲啓中興考帝祖之徴言顯神功於景運得不標於道觀鉻在蜀川流傳千百萬年紀我一十八葉樂朋龜職司內翰首冠近臣妙回擲地之金鏤入他山之石鋪陳盡善蔡雍當患於先知述作無遺子建何勞於獨步宜刊盛事以證斯文按成都秦惠王時方通中國混元西會之日尚是封城之外秦通以來古迹多不録成都府西南二里有古靑羊肆老松修竹岡阜連延人或居之率多變異不可陘犯民間因立屋宇奉香火以敬事之號玄中觀自大唐受命已來聖祖遺迹罔不崇奉北邙瀨鄉岐山天水皆建宫宇以旌聖功而靑羊肆獨未興葺僖宗幸蜀獲平賊之符始出內庫錢建其宫碑記石刻見存備載本末焉昭宗天祐元年朱全忠遷車駕於洛陽至哀帝天祐二年乙丑四月太清宫使柳璨奏修上清宫畢請改為太清宫從之詔曰玄元皇帝肇基聖緒敷佑神孫璿派靈長共乾坤而莫極瑶圖貞固與日月而無窮是以我朝追崇奕葉昭祀禮因尊祖爰陳恭敬之文事匪求真且異虛無之旨比者常如九廟别置一宫東遷以來欲修奉而未暇北觀之內遂薦享以從宜每備粢盛靡稽古實祝史正亂而追遠雖屬猶龍宰臣肅拜於當陽如求罔象徒陳玉斝莫對瓊儀璨練達舊章振舉重職爰思改作頗謂協宜庶不愆而不忘致來顧而來享又尋玄圃如得瀨鄉古殿密清橋木陰翳可以仰規紫府使號淸宫捨短從長斯為智士尋源正始實賴賢臣合議允俞殊可加奬梁開平二年戊辰改天下太清宫太微宫紫極宫皆為老君廟吳越王錢鏐奏請復兩浙淮南道老君廟為真聖觀仍親製碑文曰若夫真聖之教大道為先恍惚難名虛無罔象極於玄黃之始施功於融結之前籠罩九有森羅萬物可大可久玄之又玄豈推步之能窮非名言之可載太上老君者神凝太素氣積混茫誕形雖感於星精崇德實標於道祖當驪陸犧軒之代則同出而異名洎陶唐殷夏之年乃殊途而一貫抗世立法為師為臣恢張沖漠之風振蕩希夷之迹及乎姬周建國仙聖膺期託孕玄姝寓形楚國指李言姓視耳傳名雙柱三門式表儀形之異厖眉鶴髮更彰耆耋之尊然而隱迹公朝韜光柱史魯宣父起猶龍之嘆尹先生知望氣之祥莫不經演五千齡高八百唐朝將基王業遠託直源廣啓玄關纍崇徽號由是普天之下悉立道宫皆以紫極為名冀以奉行齋醮當府頃嘗建置歲月已深後因大盜經過恣其煨燼緬惟道館久曠真風因為重興俾延多福竊詳載籍靜究源流但以老君稟虛無精應混元氣託神明之質先天地而生在三皇五帝之時則自號鬱華廣壽及殷商成周之代則官居柱史王師出入自然應期而現後以周王之世再誕於苦縣瀨鄉道震中華化行西域然而位居大乙尊號帝君統御十方施生萬物配三光而普照綿萬劫以長生前朝欲濬靈源仰攀仙系寧同血胤聊比宗祊則老君自是大道之至真非唐家之枝派夫軒轅大聖必問道於崆洞周穆至仁亦學仙於瑶水是以追崇道教廣務勝因絳闕朱臺遠比蓬萊之境星壇月殿大新焚醮之場必冀玄功克臻靈貺其餘隙地間植松筠白鹿靑羊自遨遊於春嶺清風皓月更縈帶於秋江立吳都玄教之觀名千秋不朽改越國紫宫之真聖萬載永隆足使大道常興真風不墜大顯玄元之教永資邦國之休宜刻貞珉式揚光烈其錢塘真聖觀宋朝改為天慶觀其所立碑見存後唐明宗天成二年敕朱溫所改老君廟並復舊額為宫觀八月左補闕趙明吉上言曰竊見天下宫觀久失崇修蓋自朱溫篡逆以來例多毁廢請下諸道應本朝舊置宫觀近經毁拆者皆勒增修以奉祖宗以弘孝治光陛下中興之業顯國家大道之源復我真宗置兹永世其兩京宫觀有公田乞免科率俾充齋糧以給正名道士庶懇志於焚修期上玄之福祐從之三年正月中書奏休假令二月十五日玄元皇帝降聖節休假三日準會昌元年二月敕休假一日伏請準近敕從之四年十二月壬子敕尊崇聖祖修飾道宫既復其名固難無額宜令所司依舊造太清宫牌額懸挂兼京城內金真觀仍改名崇道宫亦準上給換牌額以朱梁改為廟額故也晉高祖天福四年己亥九月辛卯召道士崇真大師張薦明錫以繒綵薦明燕人也少為儒遊學河朔漁獵老莊故性與道俱其後雲衣星冠奉自然之教帝素尚玄元御極之初數數召見帝問曰道可治世乎薦明對曰道也者妙萬物而為言總兩儀而稱德得之上者為道得之中者為仁義得之下者為禮智信而失之非人也得其極者尸居衽席之間可以治天地豈止乎世者也帝遂延入內殿講老子道德經召宰臣馮道授卷而聽道曰道士講老子僧人受具戒今古有之不可輕也帝遂禮之為師益加崇重嘗聞宫中奏時鼓乃曰陛下聞鼓聲乎守一而已夫絃匏金石其聲十二其黃鍾也唯合於黃鍾其不應者五十有九出乎多門也鼓之為音也奚其間然無宫商無角徴無羽無變和而契之其一故也人能混成於心則與天地俱矣何患世之不淳哉帝由是致心虛靜尊道貴德故每一召見多所頒賚五年五月賜張薦明號通玄先生令以道德二經雕上印板命學士和凝别撰新序冠于卷首俾頒行天下周世宗顯德五年戊午六月出御衣并錢帛修太清觀六年二月觀成帝駕幸焉禮謁老君畢因觀所賜鍾觀在乾明門外初帝聞濮州有一鍾聲甚𥐪每擊之聞數十里乃命徙之以賜太清觀宋太祖皇帝建隆元年庚申遣使詣亳州祠老君又建建隆觀於閶闔門其觀即周世宗所修太清觀帝改賜今額仍舊奉祠老君太宗皇帝太平興國七年壬午謂輔臣曰朕讀老子道德經佳兵不祥之器聖人不得已而用之未嘗不三復以為規戒王者雖以武功克定終須用致治深得老子衛生之旨九年謂宰臣曰朕每日所為自有常節辰巳間視事既罷便即觀書深夜就寢五鼓而起盛暑晝日亦未嘗寢乃至飲食亦不過度行之既久甚覺得力凡人食飽無不昏濁倘四肢無所運用更便就寢血脈凝滯諸疾自生欲求淸爽其可得乎老子云我命在我不在於天全係人之調適卿等亦當留意毋自欺於攝養也淳化二年辛卯遣內侍李守倫李廷訓羅懷中等下兩浙軍州選擇良才重新修建亳州太清宫自是凡水旱必遣使祈禱屢有感應三年帝嘗誦老子道德經謂侍臣曰清淨致治黃老之深旨也朕當力行之昔汲黯卧治淮陽宓子賤彈琴治單父此則黃老之道也宰臣吕端曰行黃老之道以致升平其效甚速吕蒙正曰老子稱治大國若烹小鮮夫魚撓之則亂比來上封事求更制度者甚衆望陛下行清淨之化上曰朕不欲塞人言路至若愚夫之言賢者擇之亦古典也四年遣中使部丁匠修太清宫至至道元年十月畢役自後命使臣二員監宫及洞霄宫洞霄宫奉先天太后後漢永興元年置廟唐改為宫每三年而代每歲老君生日三元及誕聖節并修齋醮著于今真宗皇帝咸平五年壬寅遣內侍陳延慶重修太清宫及洞霄宫各給兵士灑掃景德二年乙巳詔禁兩宫四面樵採大中祥符二年己酉詔左右街選道士十人校定道藏經典至三年又令於崇文院集館閣官僚詳校命宰臣王欽若總領之初太宗嘗訪道經得七千餘卷命散騎常侍徐鉉知制誥王禹稱校正刪去重復寫演送入宫觀止三千三百三十七卷至是欽若沿舊三洞四輔經目增補凡四千三百五十九卷撰成篇目上進賜名寶文統録帝親製序云夫混茫未闢兹謂之無名文字云生於是乎有作矧乎希夷之旨沖妙之音法於自然生乎太極所以述洪荒之始敘天地之心宣至真之言介群生之福若乃刻之瑶版貫之金繩封以琅函固以瓊藴萬靈翼衛與環極而同遵億世仰觀方珠躔而不昧其久也盤石有時而鑠矣其異也烈火莫得而燔之所謂神之至神大之為大者也言思往古以迄後時開基纘服之后王代工具瞻之卿輔穆清垂拱以致太和廊廟緝熙用成大定莫不奉其訓而成治遵其教而流行至于嗇氣凝神澡心練行纍德增善通幽洞靈上賔於九清下延於萬壽遊方之內故莫得而詳象帝之先實於斯而睹國家肇膺丕曆欽奉元樞藝祖淵默以教人神宗清靜而致治隆興玉字遠募銀題大致闕文敻出前古載惟眇質祗紹慶基仰受河圖下迂飈馭代宗升燎鄈壤豸琮渦水順風國陽肆類民歸淳朴物無荐瘥豈止宗祐之靈以恢盛則抑亦虛無之助用浹多祥期闡真風在揚妙旨惟發揮於閟籍可啓迪於懷生復以載祀屢遷篇章至廣授於帝嚳伯禹不其近歟傳於龍漢赤明蓋夫遠者倘靡伸於詮次即何罄於夤恭由是詔朝宥密之臣總司厥任擇柬校讎之士各效其宫輯丹室之寶章訪紫臺之祕迹正奇字於古篆考方言於軺車索隱造微鉛黃之妙曲盡群分類聚甲乙之次罔差豈止班志之九十三篇仙記之三十六法而已哉飛灰之序三浹貫花之教一成將使垂於後天布之綿字方新濡翰以永藏山惟慶育壽丘是開帝緒高升函谷允曰道宗仰惟述作之言並極天人之際混于諸子良所未安列行寶經兹為至當自幼沖之仰奉詔不朽之明規樞密使吏部尚書檢校太師同平章事王欽若實冠攸司益懷順美顧勤職之無舍期傳世之有輝爰以奏封獻兹篇目願裁序引式謹歲時紹璿宙之鴻源雖遠欽於道蔭繼瓊綱之前制亦可煥於人文俯示方來彌多靦愧題曰寶文統録云爾欽若以道德經陰符經乃老君聖祖所述請自四輔部陸于洞真部初詔道釋藏經互相毁訾者削去之欽若言老子化胡經乃古聖遺迹不可削除詔從之大中祥符四年辛亥帝祀后土于汾陰駕至函谷關御製度關銘并序曰夫聖達之心無適無莫神化之迹或暗或彰倘遺烈之昭然即生民之仰止函谷關者老君西升之途也若夫含真上德闡教強名居藏室以棲真涉流沙而匿影仲尼問禮既吐於微言尹喜授經復占於真氣斯並存於前載播厥方來若乃萬壽之年至神之道臻乎妙有豈易殫云踐華之郊疏河之境仙馭所歷車轍如存揭以關梁見崤函之阻紀斯縣邑彰靈寶之休所謂人往而教存世殊而地久朕恭祠坤載因舉時巡淵默之風永懷於瞻望清靜之治靡捨於宗師將振清塵俾刊翠琰銘曰教父潛真神龍比德方事神遊爰符默識聖言聿昭生民有則載望函谷永存轍迹元妙無疆清輝罔極齋輅云經貞珉乃刻祥符五年遺三司使丁謂詣宫禮謁六年秋有詔幸亳謁太清宫時升天檜已久枯至是再榮七年甲寅正月車駕詣太清宫朝謁親奉册寶上尊號曰太上老君混元上德皇帝御製老君讚并序曰若夫先二儀生庶物是謂之至道首三辰敷元命是謂之高天若乃居道之大侔天之崇迹處於範圍可思而不可測功逾於陶冶可知而不可言其應期也無為而無不為其隱景也無往而無不往是以存靈躅運神遊或恍淴而來同或杳冥而高蹈九清宴處與元始而均尊億世仰瞻稱太上而垂裕洪惟老氏實曰真人所以綿區靡不攸賴況後昭昭福地實再誕之鄉奕奕仙祠蓋炳靈之域宜乎積精之所屬丕佑之所祈徇輿誦以來思揆元辰而祗若者也太清宫者介譙都之列壤濱渦水之洪淵固降聖之名區誠集真之淨館成湯之國疆理相望太皥之墟次舍密邇土風純固地利膏腴高阜層岡總形勢於千里茂林嘉樹呈鬱蔥於四時足以為曲密之庭靈仙之宇者焉矧惟太上混元上德皇帝稟混茫之氣含杳冥之精挺元化而無垠冠懷生而資始故能先太極而有後太極而無先來年而終後來年而在若乃感日而受娠指李而辨宗始育而能言未孩而皓首此至靈之兆也晦迹於樹下遠涉流沙答禮於仲尼授經於尹喜此垂教之迹也肇自羲昊以訖商周代為至人世存奇躅此神變之德也言乘飈馭往陟淸都總治群仙宣布和氣此裁成之功也至于希夷之旨清靜之宗本於自然臻於至妙用之為政政協於大中用之治身身躋於難老施於天下天下可以還淳漸於生民生民由其介福所謂萬物之祖衆教之先漢尚其言措於刑辟唐宗其道致乎升平宜餘迹之誕敷傳億年而靡絶國家膺延洪之寶命啓纍盛之璿圖惟醇治之攸基自妙道而斯始太祖皇帝神武不殺舞干戚而賔九圍太宗皇帝清明在躬垂衣裳而立教增修俊德冠列辟之丕聲茂著鴻靈貽沖人之纘服敢不寶慈儉持恭默尊五千之訓安億兆之民書轍所通期登於仁壽日月所照庶洽於穆淸由至誠之感通果祥徴之昭格暨乎神明告瑞諜頒大禮誠純禧集九霄之馭俯降於宸圍百世之祥縷聞於帝緒欽承錫類祗答降康故將擇吉壤於神臯伸大報於春序念至教之父始妙用於三才景亳之郊峙靈墟於九卻躬修款謁方在於詢謀旅貢輿言遽形於傒望顧兹協契深慰豫衷乃議省巡用諧人欲由是發明詔戒攸司擇元辰於攝提詣殊庭於誰左爾乃千車萬騎九遊八鑾按轡乎皇衢弭蓋乎真館百執措事萬國充庭先時洗盥徇乃齊之訓質明酌獻勵如在之恭鍾罄之諧簠簋斯潔預奉寶册所以增崇名次祓壇墠所以待靈遊也若乃星漢杳杳宫殿沉沉期飈馭以來斯想蓬壺之密邇盛節無斁介祉有孚復將格太室就陽位奠圭幣奉牲牲侑享於祖宗合䄞於穹厚以成巷家之純懿以答神祗之洪祐載惟眇質獲纘睿圖恭佩聖言肅遵道祕非敢溺方術求神仙蓋以宗希夷化區宇緬迫於淳古大庇於蒸人而六廟降衷三靈流貺故能膺天賜交神歡大曠之儀以之纍舉景鑠之事罔不彰明由合宫之齋居成洞山之順拜既遵道而闡化復尚德而教人警蹕言旋顧禮容而斯備琬琰攸刻庶風聲而靡渝讚曰譙都之壤渦水之濱是為福地實誕聖君含兹衆妙佑彼蒸民藏室問禮尼父依仁函谷望氣尹喜知神飈駕雖往鴻應常新福壤斯在風烈無垠緬瞻珍館俯徇輿人羽旄款謁舊典遐遵蕭薌肅薦精意虔伸考聲名兮大備期昭感兮交臻祝威靈兮不昧冀介福兮相因將述宣兮茂則聊刻鏤兮貞珉序凝禎兮三檜昭邁德兮萬春仍敕彩繪殿宇又御製老君古玉石像讚并序云夫聖真之迹實浹於無方神明之區必彰乎尤異眷言肖像成自古先晬表可觀祥徴丕顯發乎輝景既協於禎期飾乎棟梁用昭於精意驂騑雲駐欣獲仰瞻琬琰斯刊庶垂不朽讚曰洪惟教父生此靈墟述宣道德隱景虛無肖像斯在明徴允敷發兹靈耀協乃禎符聿修毖祀言駐乘輿載刊樂石永讚洪圖時正月二十日也是日日重暈甘露降仙鶴翔五色雲現黃雲如蓋下屬及回仗嘉氣彌望紫雲捧日變五色賜天下大酺時亳州通判李若谷之子淑年十二奏頌以述盛禮召對行在面命賦朝謁太清宫詩授筆立成帝嘉賞之詔中使引送中書再賜童子出身初虛無堂之北有大檜引柯南指時營前殿匠者深慮其礙殿簷白官吏欲削之一夕大雷雨明旦視巨枝已轉北矣至是帝見而嘆異駐輦移時因名為御愛檜此檜昔題者甚衆唯石曼卿為絶唱又得福唐林迥詩尤佳句云古殿當年欲葺時槎牙高檜礙簷榱人間斤斧不容手天上風雷為轉枝煙色并來春已重月華饒得夜相宜真皇一駐鑾輿賞從此佳名萬世知蓋紀實也帝御製太上太清天童護命經序云妙本難窮至真善應可道而非常道無為而靡不為是以瓊簡瑶函爰敷寶訓雲章鳳篆咸演祕文標示明科形容造化所以宣揚博利佐助洪鈎為善教之筌蹄導含靈之耳目朕獲膺元命茂育群黎冀廣真詮潛滋庶品天童護命經者太清密誥金闕珍符素有前徴播於别録其或洗心成誦結念奉持固可却厲蠲邪臻和致壽類義經之立象幽贊神明同夏鼎之除妖不逢魑魅愈凶災於六極集戬穀於百祥因模寫以頒行乃標題而敘引所期寰海共樂生成云爾初帝以儲嗣久虛命句曲山道士朱自英奏章自英存念精誠神升帝闕忽見三茅真君各乘寶輦從黃道而下自英俯伏避道俄聞輦中顧問自英因何來此自英答以臣為真宗皇帝祈求聖嗣茅君領之曰此亦人間大事既而章進御太上敕茅某有憂國愛民之心宜為宋天子嗣明年果誕皇子是為仁宗皇帝天聖初召自英詣闕二聖眷遇甚隆賜號觀妙先生建乾元天聖二觀以旌其功按三茅山二十二代宗師觀妙先生朱君碑銘有曰方帝三葉之慶祥兮屬春宫之位虛祀高禖以詔弓韣兮洞天輟司命之友于蓋謂是也仁宗皇帝天祐四年丙寅宰臣王曾言道藏經其中有詞語淺俗者帝曰道藏多説飛煉金層修合方藥豈得皆如老氏五千言宰臣張知白曰道德經乃治清靜之術與諸道經不同帝曰今搜訪道經當精細詳校乃入藏至和二年乙未正月帝不豫召建隆觀道士劉從善於大慶殿設醮奏章命宰臣代拜至夜伏章次帝忽大漸暝目已數刻中外驚讋從善遲久方起曰章已達太上有敕令聖駕回矣俄而帝蘇即傳宣問葛將軍是何神從善對曰即三天門下中元將軍也主人間章奏之事復傳宣令速設位供養翌日聖體遂康謂左右曰朕昨夜夢至天門有葛將軍者自門內出曰皇帝未合來急索馬送回遂寤時有旨特建葛將軍觀於郊壇之西仍賜從善御服金帛甚厚范文正公仲淹通判陳州日郡守為母疾請道士拜章公曰庸人安能達章帝所耶因來問疾次遂令其奏章伏地久不動人捫其軀則僵矣直至五更方起謂守曰得太上旨太夫人壽有六年所苦勿慮公詰其伏地甚久之故道士曰上章罷將回適會張明年試進士榜群仙聚觀壅隘欲出不能是以久公疑其妄曰法師曾見榜否曰是何不見復問曰狀元是誰道士曰姓王名上是拱字下一字墨塗之又注一字於傍天門高望之不可辨明年果王拱壽作大魁御筆改為拱辰嘉祐七年帝不豫夢三神人自言其姓號左右翊衛之既寤而疾遂平乃詔遍訪神祠無有合者帝後於所受太上正一籙中得之乃三將軍也八年三月十六日詔曰神理至幽必有驗於顯誠心至著必有達於微音容相交符應若合上仙隱景唐將軍上靈飛形葛將軍直使飛真周將軍階列仙遊名在真籍頃朕違預漠而感通孚佑有加康復如故不薦美號無以隆其稱謂不嚴祕閣無以宅其威靈唐將軍加號道化真君葛將軍加號護正真君周將軍加號定志真君仍於在京宫觀內建置殿宇庶殫精衷庸答休證神宗皇帝元豐三年癸丑從張君善奏自今補道職試道德經靈寶度人經南華真經義五年詔增神仙封號又詔釋氏水陸道場設三清上帝等位與幽冥鬼神為列褻瀆高真仰所在官司嚴加禁止哲宗皇帝紹聖五年戊寅二月十五日夜亳州太清宫道衆朝禮次見老君像兩眉間紅光浡浡而出漸照滿殿通徹瓦屋上連霄漢入洞霄宫先天大聖后殿逡巡光定左右二道爛若紅霞中間一道皎如白練輝華連屬亘若虹橋數百里間光明如晝遠近居人皆出户仰望燒香瞻拜至二更已後光影浸移尋入天門而去宫主觀妙大師張景先并道衆韓惟吉等一百四十人洞霄宫主女冠王景素等八十一人狀并監宫兼谷陽鎮監酒稅李翔繳連到市户王靖等一百一十一人狀申州知州事喻陟等亦睹靈光之異遂以奏聞有旨就宫開建金籙道場一月日差守臣喻陟代拜命左街都監道士賈善翔率其屬從事善翔嘗至太清宫衆請講度人經至説經二遍盲者目開時會中有媪年七十餘喪明已三十年一聞經義豁然目明至醮之夕夢衆靈官傳太上命賜其仙服以善翔為太清宫主者後數日返真張商英作真遊記備載其事三月十八日丁卯降靑詞嗣天子臣某謹遺入內侍省東頭供奉官幹御藥院臣蘇圭請道士三七人於太清宫開啓祈福道場一月罷日設普天大醮一座三千六百分位臣謹上啓太上老君混元上德皇帝太淸玉陛下伏以譙亳奧區聖真所宅發祥降祉神光屬天現於眉間照耀千界顧德不類獲承天休夙夜祗嚴罔敢怠忽二十日將晚執圭升殿燒香忽見老君兩眼下有光如雙珠圓明至巳時方散四月初九日珠光復現如前州郡賀表云一毫煥發初照殿庭五色相鮮俄連霄漢傍若慶雲之紛郁中如素練之卷舒又云化潛格於無形福自生於有象浮雲異彩為史官甚盛之書表聖洪禧協帝緒無疆之慶徽宗皇帝崇寧五年丙戌十月五日下詔曰有天下者尊事上帝敕命惟幾敢有弗虔而釋氏之徒修營佛事妄以天帝次於鬼神之列瀆神踰分莫此之甚其能克享上帝之心乎可令有司檢會削除以稱朕嚴恭寅畏之意又準敕水陸道場之內設三清玉皇上帝等位其可以三境高真與幽冥鬼神同列乎昔神考元豐中曾降詔止絶可檢舉施行又準敕舊來僧居多設三教像為院額及堂殿名且以釋氏居中老君居左孔子居右非所以稱朝廷奉天神興儒教之意可迎老君及道教功德并歸道觀遷宣聖赴隨處學舍以正名分以别教像大觀元年丁亥正月初四日尚書省劄子準敕道士序位在僧之上女冠在尼之上致和二年壬辰建康府有鄉民梁光映久患癩疾其家畏其傳染而棄之乃於茅山玉晨觀捨身逐日擔水以給道衆夜則睡於三門外龍虎君之下如是者數載一日給水之際忽一人皓首素衣乘白馬而朱鬃紫煙彌覆其上身放光明照映山川前有二人持節叱梁曰太上老君來梁再拜叩頭老君曰吾有天童護命妙經流傳於世久矣汝聞之乎曰不識老君曰吾今授汝汝可記之誦以呪水沐浴則汝疾當愈亦可以濟人也乃誦經今世上天童護命妙經是也六年八月詔太上老君混元上德皇帝名耳并字伯陽及諡聃並見在於經傳見今士庶多以為名字甚為褻瀆自今後並令禁止十一月詔曰周室衰中國有聖人焉著書九九篇以貽後世淡然獨與神明居豈得而窺之漢司馬遷班固皆小智自私作傳則同於韓非申不害之徒敘古今人表以為第三等列子遊子夏之後表而揚之實在今日史記老子傳升於列傳之首自為一秩前漢古今人表敘列于上聖其舊本並行改正昨注道德經可視倣唐制命大臣分章句書寫刻石于京神霄萬壽宫以垂無窮焉司馬貞史記索隱以老子與韓非並傳為史遷之失謂二人教迹全乖不宜同傳先賢已有成説故其序云伯陽清虛為教韓子峻刻制法靜躁不同德刑斯舛今宜柱史共漆園同傳公子與商君並列可不善歟今詔升於列傳之首自為一秩又盡善也又班固漢書古今人表序為九等乃置老子於第三後漢邊詔曰班固以老子絶聖棄智禮為亂首與孔子道違故抑而下之與楚子西同科二者之論殊矣所謂道不同不相為謀又曰夫大人之度非凡所訂九等之序何足纍名耶唐陸希聲亦云仲尼親見老氏從之問禮誠無間然而班固乃絀之於第三品雖其名可絀而道可貶乎哉是皆天下之公論也是以唐之明皇嘗有詔令史記升老子入上聖今朝復有此詔可謂前聖後聖其揆一也二十日詔道無乎不在由漢以來析以異之世流於末俗不見大全由是以隱朕作而新之究其本始使黃帝老子堯舜周孔之教偕行於今日可令天下學校諸生添大小一經各隨所願分治大經黃帝內經道德經小經莊子列子自今學道之士應入學人並令所在州縣勘會保明不經刑責不犯十惡姦盜及違八行之人許入州縣學教養并依見行學法所習經以黃帝內經道德經為大經莊子列子為小經外兼通儒書俾合為一道經周易小經孟子自來唯有先生法師處士大師等號而品秩甚少名稱既高視官亦隆人難遽進並依舊外其在學中選人可依下項置士名分入官品元士正五品高士從五品大士正六品上士從六品良士正七品方士從七品逸士正八品居士從八品隱士正九品志以從九品資任請紿各隨品官法神霄玉清萬壽宫天慶觀及其餘宫觀知副並以學校登科人充禮部置籍差注如吏部法山林高蹈之士令監司守令依八行法以禮延入州學並以名聞其後禮部尚書薛嗣昌奏從禮部出給印紙所屬批書從之同日詔莊周列禦寇令神霄玉清萬壽宫司設像並配於太上之祠以稱朕欽崇道妙之意是先聖政録編修官王禮言莊列功不在顔孟下竊見朝廷推尊孔子而顔孟配祀爵皆封公至莊列獨以諸子百家為稱未有旌異乞講究崇祀之禮故有是詔宣和元年六月九日詔莊周封微妙元通真君列禦寇封致虛觀妙真君仍行册命八月編修道史官言編修道史所止年代詔自龍漢止五代為道史本朝為道典宣和三年十一月三日詔提舉道録院見修道史非可以常史論自史記漢書以來體制有可采當以為例則史表一門不須徒設道紀斷自天地始分以三清為首三皇而下帝王之得道者以世次先後列於紀為天地宫府品秩輿服符籙儀範禁律修煉丹石靈文寶書等十二志男真自風后力牧而下女真自九靈元君而下及凡臣庶之得道者各以世次先後為傳方諸宫靑童大君撰金闕後聖李君紀曰夫二氣離合理物有期二道虧盈出處因運期之至也因而適之運有來矣就而撫之承唐之年積數有四十六丁亥從此後復有五十六丁亥之間主有縱橫九一之名建光延昌元年其後甲申之歲前後種善人除殘民疾疫洪水交其上兵火繞其下惡惡並滅凶凶皆沒好道陸隱善人登山到壬辰之年三月六日金闕聖君來下光降於兆人矣當是時聖君發自靑城出隴西雲北察燭龍之外北方黑國之北有山極峻造天四時冰雪晝無日北向更明夜直上觀北極乃燭龍所居燭龍北方之神也山海經曰西北海之外有神人面蛇身而赤其服及晦視乃明不食不寢是燭九陰是謂燭龍炬可以明照西旋九流之關東之扶林晨落南視朱山空中乘三素飛輿從虛輦萬龍天光總照神鑑三辰於焉滅惡人於水火存慈善以為種民始學者為仙使得道者為仙官若能精洞房於上元修九真以彌勤步隱書於七靈窮八素之用誠既得涉三災而不傷必觀更始於太平又得賜書為仙官神真長生也然後聖君當復斷其粗妙擢以補官僚者或位為仙伯或拜為仙侯助聖牧人理氣布德或對掌一邑委政一國若奉鬱儀以召日施結璘以攝月詠大洞之上經存七變之轉章按金闕之真書佩神虎之大符施八道以拘神啓紫文以駕浮誦金根以長存設九赤以封丘命曲素以招神役紫度以昭無服五行以呼魔挹琅玕而不休經嶮試度無疑履兵火而不憂者皆位為左右仙公左右大夫或為卿相之司上國仙侯也所以聖君從虛輦萬龍者以視衆仙隨材而授給也聖君雖封掌兆民下盻萬生故自逍遙金闕宫館上清棲形太虛遨遊五城察照十天百方太平也諸見太平者皆是慈心仁人守善不已或學道修真可教之士或靈人受書守精保胎或得道得仙精誠之夫或玄簡録名七代有德祚及子孫當為仙者或生有靑骨通神接真或才性偉寂天分淑邁至忠至孝至正至廉作仙之品高下數百矣聖君皆隨才署置以為大小仙侯皆各有秩以君種人也仙侯一年一朝上清見聖君以受事也聖君五年一下遊以幸仙侯察種民而考仙治焉蓋老君於將來運親降為太平真君也故亦號金闕後聖君世閭拜表上章露刺投詞皆乞徑御太平金闕後聖玄元上道太上老君太清玉陛下蓋老君號千二百官君千二百官章之主也封章用九老仙都君印者老君亦號九老仙都君也以至上士澄心注想隨祈而應靈感之迹接於見聞然形於紀録者蓋大地之一塵爾其周流三界濟度無窮或示仙姿瑞像爰及肉身或飛或步或尊或卑或朝或野或夏或夷應己則隱不可測量來無所從去無所至洞有洞無周遍一切真身化身一歸妙有稱讚所不能及記述所不可既姑托經史前聞編次以為實録云混元聖紀卷之九
