front:
  text: 混元聖紀卷之二與二
  hash: sha256:b0d5e9d4d34f5b616bd304b1ebe08645f67fcaa70b7285f2ef2140c80c4de9a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_HFL_002-001a, image: hfl/0551/0551-092.png}
body:
  text: 宋觀復大師高士謝守灝編太上老君乃大道之宗祖三才之本根也太極之先寥廓何有道源肇啓炁母混成澒洞溟津兆朕胚腪中有眞精自然而生是爲神明强名虚皇潛司玄化道運御世一炁分三爲玄元始三炁混合氤氲漸著爲萬象之端莫知其先强目曰元莫知其初强目曰始故曰元始天尊三炁相生九炁混合化生諸天成就世界莫知其大强目曰太莫知其高强目曰上首出無極仰之曰老宰而無我主之曰君故曰无上三天玄元始三炁太上老君焉初自一炁而分三炁是爲三天三炁合生九炁是爲九天自大羅天生清微天禹餘天大赤天三清境也自三天下生鬱單天襌善天須延天兜術天不驕樂天洞元天梵輔天清明天無想天此九大梵天也九天又各下生三天合三十六天其外諸小梵天悉係屬於此大梵天也九炁乃融炁炎炁演炁昊炁景炁道炁混炁洞炁浩炁也次四種民天犬極平育天龍變梵度天玉隆騰勝天太虚常融天爲種民天亦曰種人謂開劫之初降爲人種也釋氏呼爲四襌天此天上取太清境三千三百萬億炁下生八梵天五千五百五十五萬炁凡一炁三千里此天出三界之上超陰陽之數故無年壽之限水火風灾所不能壞也次分三界欲界六天色界十八天無色界四天也次八梵天始靑天靑元天始丹天太丹天始素天太素天始玄天太玄天也次人間世北方清靜世界東北長安世界東方納善世界東南用賢世界南方棄賢世界西南仁靜世界西方淨行世界西北延賢世界下置九地結爲山嶽融爲海瀆第一壘潤色澤地第二壘剛澤色地第三壘脂色澤地第四壘潤澤地第五壘金粟澤地第六壘金剛鐵澤地第七壘水制地第八壘大風澤地第九壘洞泉無色綱維地每壘一重土一重水一重風自上而下也陽精爲日陰精爲月分日月五行之精爲星辰二炁交會則動植萬彙更相産化按開化置品經曰吾於無形無名濛澒溟涬之中開道玄黄分靈散炁從大羅下生三境次生九天立九帝爲三寳之玄律二十七天爲境界之修品三十六部爲三境之玄根下爲三十六天之域宅次三十二天三十二帝潛運開化下分三界傍貫璇璣二十八宿五星躔度以明五方清炁上騰重濁下凝下生九地中生九人天地人物無不備焉故陽和正炁化生上聖高眞柔和沖靜之炁化生元君聖后仙妃玉女剛烈英勇之炁化生天丁力士神兵將吏陰陽五行之炁化生男女雜謬之炁化生飛禽走獸咸承一炁萬種不同隨其化生也大劫之末九地之上至無色界三灾大作萬象消化種民天之上灾所不及元炁復合再爲混沌歷劫重開復命天人降爲人種爲君爲臣洪道建法隨時布化已經無量浩浩之劫悉皆如是按上清經云天圓十二綱地方十二紀天綱運關三百六十度爲陽孛地紀推機三千六百度爲陰蝕天綱三百三十日運關一周地紀三千三百日推機一度九千九百度爲天地炁交名大陽九大百六亦名大劫大運也以數乗之大凡三百三十年一度陽孛此爲小陽九之灾一百八萬九千年即天綱運關三萬三千周地紀推機三千三百度大運之交也夫天動地靜陽躁陰遲故有孛蝕之異耳此時天氣窮於太陰地氣極於太陽陽極則孛陰極則否陽極則其精化爲水陰極則其精化爲火先焚爲大火次漂以大水上至九天之下下至九地之内金玉消化毫末無遺然後元氣復合謂之混沌混沌再分則三天上聖四天種民下世教化亦如此劫之初三皇五帝相承而治矣如此變革總名爲元炁離合老君歷此離合之數經無量劫故西昇經云動則有載劫自惟甚苦勤此之謂也風俗通曰十千曰萬十萬曰億十億曰兆十兆曰經十經曰垓十垓曰載載者謂地不能載也又按九天生神章曰大運將期數終甲申三官鼓筆料别種人考筭功過善惡當分自赤明以來至上皇元年依元陽玉匱受度者應二十四萬人開皇以後數至甲申諸天選叙仙曹空廢官僚不充依元陽玉曆當依三代更料有心積善建功爲三界所舉五帝所保名在上天者取十萬人以充其任又當别舉一十二萬人以充儲官三官相應皆逆注種名謂合生四天爲後劫種人也又九幽之府被東華靑宫九龍符命使拔九幽男女死魂宿名有善功德滿足應受開度者取三十二萬人以充甲申驅除之後開大有之民劫歷皆然悉禀命於老君也天地之狀象類雞卵元炁繞之如日之暈如是天地有五億五萬五千五百五十五億重各於其中立天文地理運陰陽五行列神祇産萬彙秉生成之柄鎭造化之原故在天爲衆聖之尊在世爲萬教之主謂之老子者道之形也應旣不一號亦無量或三十六號或七十二名或號九天上皇或號洞眞帝一君或號高上玉帝或號長生大帝或號太平正眞太乙妙炁皇君或號九玄帝君或號太千法王或號九靈老子或號太上左玄眞人或號上清金闕三洞妙經大法師或號高上大法王或號玄一眞定光或號金闕後聖君或號九老仙都君或號九炁丈人或號太上丈人或號千二百宫君或號太平上景君或號無爲父或號萬物母其降生之時十方天神空中稱讚尊號有十曰太上老君圓神智無上尊帝王師大丈夫大仙尊天人父無爲上人大慈仁者眞元教主天人稱讚亦有十號曰無爲之君無上玄老太上老君高上老子天皇大帝玄中大法師有古大先生金闕帝君太上高皇虚無大眞人復有至眞無極大道自然元始太上天尊道君無上天眞天老天師黄老玄宗世師神人眞人仙人至人大人道人聖人之號也以上自天眞以下號各二字老君洞眞極聖本無常形消則爲炁息則爲人或於太虚之中凝爲眞容體大無邊相好備足上無所攀下無所躡或在雲華之上身如金色萬眞侍衛百靈宗奉或坐蓮花之内建七曜玲瓏之冠披九色離羅之帔項負圓光照曜天地或處寳堂金殿珠玉帷帳萬帝朝禮神兵衛軒或金容玉姿黄裳繡帔或素服玄冠乗朱鬃白馬或下治十天封掌兆民居太微勾陳紫房中爲天皇大帝或春化爲上景君長九千丈建七精寳華之冠衣玄黄二炁之服靑錦飛裙手執虎符坐七色之雲或夏化爲老翁戴九龍之冠衣黄紋之衣服黄羽之裙手執金板立紫雲之上或秋化爲童子衣五色之衣或乗獅子或坐靑雲或冬化爲蒼玄靑三色之光光明混沌更相纏繞此則返金闕之炁更受鍊飛玄通晨之精也或化身爲玄天大帝經云八十二變爲眞武故佑聖眞君啓請有云仰啓玄天大聖者北方壬癸至靈神金闕眞尊應化身無上將軍號眞武也其神通自在隨感則現能白能黑能方能圓能屈能伸能修能短能老能少能一能萬縱横反覆厥體靡常或爲千二百老子應現諸天或爲百八十道君接引凡世分靈散景倏忽周徧而眞一之身湛然常寂常在太清太極宫也老君嘗以上和元年歲在庚寅九月三日甲子化生於鬱單北玄玉國天罡靈鏡山李谷之間上玄靈母九玄之房初母之始孕夢玄雲日月纏其形六氣之電動其神遂有妊旣誕之辰有三日並出乃以谷爲氏族用曜景爲名一名弘字子光一名玄水字山淵上和乃天上之紀年也如赤眀朱靈清漢天漢開皇上皇之類也而世俗之士秖知甲子造於大撓年號始於漢武便以上和等號皆謂之妄殊不知上天自億劫以前紀年不廢世人無從而知耳自鬼谷子北郭子張天師葛仙公等方引諸天之號以配人間時代也不然則諸仙博古該今窮幽宄微豈不知秦漢之前未有年號耶至如開闢之初建立法度及世代因革悉由上天數定時遣天眞降教以傳人世耳非世人能先天而肇造也學者詳之於是斂魂研魄守胎寳神録精鎭血固液凝筋吞光飲霞咀嚼飛根内德圓充外累遠判形分百萬變化無窮紫微上眞天帝玉清君遣八景瓊輿來迎以登上清宫授蘂剛丹玉鳳璽金眞玉光給神虎之符及飛行之羽朱錦龍裙靑帔虎帶戴圓容神冠受書爲金闕後聖帝君老君於龍漢元年分身於中央大福堂國出眞文赤書以化其民民皆長生又於南極赤明之國出火煉眞文故號洞陽之庭有流火之池人煉其形皆成金色上置南昌之宫下立朱陵之館以主生成老君以龍漢赤明上皇延康開皇五劫皆運始靑丹光中靈素華玄陽之炁輪轉而爲玉曆龍漢以來渺渺億劫混沌之中寥廓無光載籍叵考赤明開圖然後經典始可得而推也眞文者五方眞炁之精凝結成文八角垂芒或爲雲篆之形或成飛走之狀即今之符文天眞之信契也以上並互見於三洞眞經也又於東極碧落之天浮黎之國書眞文於空靑之林成紫字之文其林風聲成音鳥食其葉身生文章人得其羽即能飛行其民長生安樂無爲又於西極衛羅世界西那玉國出眞文於浮羅之嶽以度國人玉池自生金精流映人挹其水身生金光與天相畢又於北方鬱單之國書眞文於洞靈之觀以度兆民其下寒池靈津自然流澳人得飲之無有終極此五土之内皆禀老君靈寳之教以得長生因命五老上帝以鎭五方行道垂教和寧群品也隋書經籍志云元始天尊生於太無之先禀自然之炁沖虚凝遠莫知其極天地淪壞劫數終盡而天尊之體常存不滅每至天地初開或在玉京之上或在窮桑之野授以祕道謂之開劫度人然其開劫非一度矣故有延康赤明龍漢開皇是其年號所說之經亦禀元一之炁自然而有非所造爲亦與天尊常在不滅天地不壞則藴而莫傳劫運若開其文自見乃命天眞皇人改轉天音而辨析之自天眞以下至於諸仙展轉節級以次相授諸仙得之始授世人推其大㫖蓋亦歸於仁愛清淨積而修習漸至長生自然神化或白日登仙與道合體宋張商英道德經云劫運悠曠太少格塞邪炁失元散著群生因其九竅發生情識情流識蔽宛轉顚倒因流起愛蔽愛生憎僧愛交攻前伏後起棄明趨昧積昧爲陰陰結爲幽入幽爲鬼神正爲人形傍爲異趣啖食陵暴性不得靜命不得延黑炁慘霾干犯霄極三清化主三帝天君鑑觀在下一念興悲自然妙炁絡繹成文靈風鼓奏自成音聲至慈度厄至仁好生至正摧邪至明破冥上列曹官下設嶽洞衆眞受職列仙分統眞機旣漏玉字乃出火煉洞陽筆著空靑玉檢金版符籙呪訣教授仙衆威制魔群煉度魂魄役召萬靈太上道三上眞道七中眞道六下眞道四金口所說三師所授瑶函寳笥祕蓄天臺遺落人間太倉一稗修眞之士集爲三洞無無上眞名曰洞眞幽深微妙名曰洞玄靈奇隱顯名曰洞神非眞之眞泯寂無文非元之元妙體孤存非神之神欻忽無垠此明三洞眞文之㫖趣也老君又化身號靜老天尊行教五方遂於東華山九合玄臺說法以授東極始老國王其王妃王子大臣五千餘人同修其道俱得地仙乃建習仙宫習靈七正二館令學仙者居之二百年中國内白日昇天者三千餘人其王昇爲妙梵天主按靑童内文云始老國在東海之外也一名清和國妙梵天主後以逸樂過度謫下人間爲罽賔國王老子化之爲佛者是也老君在天皇時號玄中大法師亦曰通玄天師出洞眞經一十二部以無極大道下教人間在地皇時號有古大先生出洞玄經一十二部化人以無上正眞之道在人皇時號盤古先生出洞神經一十二部化人以太平無爲之道在伏犧時降于田野號鬱華子授天皇内文又降河圖八卦之文教人以順性之道在祝融時降于恒山號廣壽子授人皇内文教人以安神之道俾陶鑄爲器以變生冷在神農時降于濟陰號大成子授地皇内文教人以好生之道俾播植穀果以代烹殺和合方藥救疾養性略見唐紀在黄帝時降于崆峒山號廣成子帝即位二十九年憂天下之不治乃往見廣成子而問曰聞子達於至道吾欲取天地之精以佐五穀以養民人又欲觀陰陽以遂其群生爲之奈何廣成子曰而所問者物之質也所欲官者物之殘也自汝治天下雲氣不待族而雨草木不待黄而落日月之光亦以荒矣而佞人之剪剪者又奚足以語至道黄帝退捐天下築特室席白茅順下風膝行而進再拜稽首問曰聞吾子達於至道敢間治身奈何而可以長乆廣成子蹙然而起曰善哉問乎來余將語汝夫至道之精杳杳冥冥至道之極昏昏默默無視無聽抱神以靜形將自正必清必靜毋勞汝形毋揺汝精少思寡欲可以長生目無所見耳無所聞心無所知神將守形形乃長生謹汝内閉汝外多知爲敗我爲汝遂於大明之上矣彼至陽之原也爲汝入於窈冥之門矣彼至陰之原也天地有官陰陽有藏謹守汝身物將自壯我守其一以處其和故修身千二百歲吾形未嘗衰也黄帝再拜稽首曰吾子之謂天矣廣成子又謂黄帝曰來余語汝彼其物無窮而民皆以爲終彼其物不測而人皆以爲極得吾道者上爲皇下爲王失吾道者上見光而下爲土今夫百昌皆生於上而返於土故余將去汝入無窮之門以遊無極之野吾與日月參光吾與天地爲常乃授帝陰符經老君於三皇時說經世謂之三墳之書乆失其傳兼累世所說經多藏瓊室瑶臺或秘龍宫海藏神眞保護世莫得聞今所傳者太山一毫芒爾久之又命西王母授帝元始天尊玉像帝置於高觀以敬奉之常有綵雲覆其上故號爲道觀道觀之號自此始也按太平廣記所引道經云在昔道炁凝寂湛體無爲將欲啓迪玄功化生萬物先以東華至眞之炁化而生木公木公生於碧海之上蒼靈之墟以主陽和之炁理於東方號曰東王公焉又以西華至妙之炁化而生金母以主元毓神玄奥於眇莽之中分大道醇精之炁結炁成形與東王木公共理二炁而毓養天地陶鈞萬物體柔順之本爲極陰之元位配西方母養群品號曰西王母焉天上天下三界十方女子登仙得道者咸所隸焉木公冠三維之冠服九色雲霞之服亦號玉皇君居於雲房之間以紫雲爲蓋靑雲爲城仙童侍立玉女散香眞僚仙官巨億萬計各有所職故男子得道者名籍所隸焉時往謁九靈金母一歲再遊其宫共較定男女眞仙皆品功行以陞降之天地劫歷陰陽代謝時運興廢陽九百六舉善黜惡靡不由之總其籙籍而上奏元始中關玉晨以禀命於老君故老君授道於黄帝乃命金母示以元始之像焉老君又命帝陟王屋山開石函發玉笈得九鼎神丹飛雪爐火之道帝遂鑄鼎荆山煉丹成服之有雲龍來迎帝乗龍上昇時群臣侍女同得昇天者七十有二人其餘小臣不及上爭持龍髯攀墮黄帝弓與鼎皆抱之號泣世謂之烏號之弓臣民無所追慕遂取其遺物於巴山造墳以藏之號巴陵又於橋山葬其衣冠號黄帝陵鼎所墮處謂鼎湖焉今處州縉雲縣仙都山其巓有鼎湖無路可縁上生金蓮其葉嘗飄墮於雙溪故名金華縣古以帝氏縉雲故以名其邑信不虚也初老君垂世立教故示有修證之訣師資傳授之格乃以上皇元年甲子七月二日出遊西河時見元始天尊乗八景玉輿駕九色玄龍三素飛雲導從群仙浮空而來同會西河之上天尊吐洞玄内觀玉符以授老君老君稽首承教服符三部八景神身中並見金書玉字二十四圖空中自明洞徹無窮羅縷自然即命主圖上仙依而畫之金書紫字丹簡玉章於此成立自南極上元九光太眞王夫人東西二華南北眞公五嶽神仙清虚眞人所授眞文並出於老君焉其圖分爲上中下三品上品一神仙沐浴東井圖二五嶽眞形圖三通靈訣精八史圖四六甲通靈圖五九宫紫房圖六元始太清圖七眞道混成圖八西昇保籙圖中品一神仙通微靈化圖二躡虚九靈圖三九變天圖四常存圖五守一養身圖六守神含景圖七寂嘿養眞守志圖八芝英玉女圖下品一神仙六陰玉女圖二九九道仙圖三導引圖四洞中洪保圖五變化隱測圖六採芝開山圖七明鏡圖八無極太一圖凡二十四圖皆修身長生之術並洞玄元始之炁化成也老君又典領玉晨神虎符圖智慧素經凡上清大洞眞經召靈威魔神符玉章莫不掌録焉此經皆結飛玄自然之炁以成其道高妙衆經之尊總統萬靈匡御群仙祕於九天之上大有之宫鑄金爲簡以撰靈文刻玉丹書以明其篇或藏太微靈都瓊宫玉房之内咸衛以巨獸扞以毒龍神虎七千備于玉闕金晨玉童素靈玉女各三千人侍衛靈文衆眞宴禮萬聖朝軒玉晨大道君常謂老君曰大劫之周擇授上賢自無其人累劫不傳後學求仙不知道原徒勞思存損疲形神夫欲尋本當歸其根失根求生萬不得全上皇玉文子擇人而傳其法寳祕深不可言當依明科承而奉焉中皇元年壬戌三月一日老君於玉天瓊房推較本元撰集靈篇以爲寳經三百卷符圖七千章玉訣九千篇以授東海方諸宫靑童大君使傳後學玉名合眞之人大君旣受寳經位登上相金華玉女紫晨玉童各三千人俱侍衛焉秉靈符之節麾命魔靈旛逍遥紫虚之館徘徊靑華之房滅六天於末運剪萬精於群山採後學於金簡校靑籙於方諸延萬帝於曲宇讚寳訣於妙章撰獨立於齊眞嚴四極以檢運普統九天九地五嶽名山億兆萬眞莫不咸隸生死圖籍細無不關末學之子欲受經及修行皆宜先奏金簡於靑宫投玉札於上清典籙玉司常陰察人精麤其有勤苦乃得玄授焉老君又傳太虚眞人南嶽赤君使授學道宿有金名玉字高閣刻名當爲眞人者又傳天眞皇人太眞王夫人等或封於西玄王屋山中或刻於蓬萊府北室金柱玉璧上又以五色玉爲簡各封五嶽石笥中須壬辰告會後聖君來下當出以付四輔使教上眞之才按後聖李君列記云後聖李君四輔上相方諸宫靑童大君上保太丹宫南極元君上傅白山宫太素眞君上宰西城宫總眞王君凡欲求仙當尋其文得其本原道無不成苟不知道所出與寳訣所生謂之投暗而學無有祖宗眞不爲降道亦不行也老君曰夫三洞寳經皆三清上道也吾昔授之於元始天尊于今七億萬劫天地成壞萬品生滅惟吾道獨存今猶修之於景雲之上常以玉清玄簡出付眞公於無量壽天又付方諸靑童大君依九天品格萬劫一出自開皇以來傳付後學應爲眞者九千年聽傳三人或四十九年中遇有其人聽頓傳人欲受吾經當依四極明科齎信詣師受以佩身閉心修行愼勿輕傳考之經科受經之格年限不同蓋上古淳和萬劫一出末代澆薄拯救尤切四十九年得人即傳皆以齋戒爲先陰功爲務以拔九祖之罪以度群品之厄後及己身立功布德上遵天憲以期超昇故有二十七品齋科三十六品醮法上即以清虚簡寂爲用次即以吐納服御爲階末即以洗心悔過爲宗普即以後己先人爲要功行三千白日登天斯言有證者也又曰欲修行上法宜先修高上洞眞三元齋直三元合眞上應九祖凡欲修行大洞眞經三十九章雌一玉檢五老寳經玄母八十二上願佩神虎金虎符豁落七元流金火鈴銷魔隱祝威制萬靈飛步五星存注七元思眞行道上求天仙合服神丹飛騰靈丸當修上元之法九日九夜清齋念神未至一日五香沐浴宿結齋心上至九人下至三人主客丹禱每事精勤欲修中元齋直六日六夜以贖己身積滯之愆解過於天眞謝罪於三元宿愆旣散高上降眞書名玄圖尅成上仙學而無法徒勞損功無感於自然欲修下元之法三日三夜解抜九祖令飛魂更生出離三塗上昇南宫釋結解滯斷滅惡根七祖旣懼身自成仙其法高妙非眞勿傳齋直畢然後行上道常當沐浴清齋盛潔法服并漱蕩口腹令内外清虚口無餘味腹無餘薰眼無餘穢體無塵染淡泊靜嘿惟道是身然後修行法事焉夫學上道不奉三百大戒而誦經行呪佩符思神合丹服藥隱處山林求昇仙之舉恐未可希也若能戒全於内和光於外乃庶幾於靈標之崖矣非修道難奉戒難耳子能全戒及十方太上將保爾登仙也戒今而誦寳經佩大符而行事若復不仙則天下無有不死之道矣我之所慨世求其人難得耳夫有經而無戒猶涉海而無舟楫猶有口而無舌何縁度兆身耶夫道要在行合冥科積善内足然後始涉大道之境界弗能爾者皆爲徒勞於風塵無益於生命之修短也老君復授靑童大君靈書紫文修行二十四事其略曰採服飛根吞日氣之法先服開眀符常思見日初出時叩齒陰呪日魂之名日中五帝之字存見日中五色流霞來接一身呪嚥如法當覺體生玉澤面有流光次採服陰華吞月精之法先服太玄陰生符常思見月初出時叩齒陰呪月魄之名月中五夫人之字存見月中五色流晶來接一身呪嚥如法當覺體生玉光目有飛精次拘三魂以三魂棄身遊遨飈逝本室或爲他魂留制或爲魅物收録當拘而留之使無遊逸其法常存心中有赤炁轉大以覆身變而爲火洞照内外叩齒呼呪如法則三魂拘留矣次制七魄以七魄流落遊走穢濁或交通血食往來鬼魅或共死屍相關或言人之罪欲人之敗皆魄之疾也其法生晦朔弦望及庚申日存鼻端有白炁漸大以冠身九重又變作四靈之獸匝繞一身呼呪如法則七魄制煉矣又人身中有三元宫上元丹田泥丸宫其神赤子字元先一名帝鄉中元丹田絳宫其神眞人字子丹一名光堅下元丹田命門宫其神嬰兒字元陽一名玄谷此三一之神上一服紫衣中一赤衣下一黄衣皆如嬰兒之狀欲拘制魂魄當先陰呼其名并存服色次第分明又命門宫中有大君名桃康字合延衣朱衣冠芙蓉冠三魂侍側暮卧常存大君祝守如法一十八年大君能左激三田右御三炁呼陽六甲召陰六丁來侍人也又行鬱儀結璘奔晨之道服靈飛六甲陰陽符佩神虎金虎銷魔豁落流金之章誦大洞眞經存三部八景二十四神服琅玕華丹挹黄水月華徊水玉精環剛之果即頭生七色之炁分形變化千乗萬騎白日昇天皆學道修行要文乃太微天帝紫微上眞天帝玉清君口傳之訣以紫玉爲簡靑金爲文龜母執筆金童佛筵天妃侍香玉童結篇名曰靈書紫篇以付上相靑童大君使下授玄宫玉名爲眞人者於是靑童大君清齋千日稽伏膝行捧首北面依科盟授以還方諸霄宫其後傳西城王君使下授骨相之子焉按經云始自大羅天開張萬範攝生十方先立九聖各分九等從凡遷仙有八十一等本爲三界迷暗參差故立三乗以爲修品上中下殊普令開悟昔於龍漢初時以聖道傳九天丈人九天眞皇次於赤明劫時以其道傳虚皇玉帝次於上皇劫時以仙道傳萬始先生太眞玉皇此上聖傳其道也太易時以德授太帝君太始時授天帝君太初時授太微帝君太極時授太微天帝太素時授金闕帝君上相靑童君此中眞傳其德也下代傳教者應化法門十二等事一者三洞本文二者神符告信三者玉訣祕諱四者靈圖圖寫五者歷代授道六者戒律防非七者威儀庠序八者方法修行九者術數隱景十者記傳傳示十一者讚詠歌頌十二者章表奏請三洞通達應感符證此下代傳其教也老君在少皥時復降于崆峒山號隨應子說莊敬經教以順時行令在顓頊時降于衡山號赤精子說微言經教以忠順之道在帝嚳時降于江濱號録圖子說黄庭經教以清和之道又命九天眞王三天眞皇執九光之節景雲之符下牧德臺授帝嚳以九天眞靈三天寳符上以奉天使二儀無遺下以營人使年命無墜帝乃祭天於北河之壇藏符鍾山之峰後昇天爲玄宫眞人老君是時傳道與赤松子被衣子王倪齧訣略見唐紀按魏書釋老志云道家之原出於老子先天地以資萬類上處玉京爲神王之宗下在紫微爲飛仙之主千變萬化有德不德隨感應物厥迹無常授軒轅於峨嵋教帝嚳於牧德大禹問長生之訣尹喜授道德之㫖丹書紫字昇玄飛歩之經玉石金光妙有洞靈之說如此之文不可勝記魏證隋書經籍志云自古黄帝帝嚳夏禹之儔並遇神人咸受道籙年代旣遠經史無聞焉又曰方外之教聖人之遠致也俗士爲之不通其㫖多雜以迂怪斯所以爲弊也故中庸之教是所罕言然亦不可誣也在帝堯時降于姑射山號務成子說玄德經教以謙遜之道在帝舜時降于河陽號尹壽子說道德經教以無爲之道又傳道與彭祖唐紀按太平廣記載集仙録云女道士王妙想居蒼梧九嶷山辟穀服氣時念黄庭朝謁精誠忽有靈香郁烈祥雲滿庭天樂震空光燭壇殿千乗萬騎浮空而來旌幢鶴蓋導九龍之輦下降壇前見一仙官羽衣寳冠佩劍曳履昇殿而坐身有五色光妙想即往瞻謁仙官謂妙想曰吾乃往昔有虞氏之君帝舜也勞厭萬國養道此山每欲誘掖後人使之知道而世無可教授者夫道在於内不在於外道在爾身不在他人玄經曰所謂修之於身其德乃眞也頃者地司奏汝居此山三十餘歲初終如一守道不邪存念精誠遵禀玄戒若無所成證此乃道之棄人也玄經云常善救物而無棄物道之布惠周普物物皆欲成人人人皆欲度之但世人福德卑微道氣膚淺不能精專勤乆道氣未應而已中怠是人自棄道非道棄人也以精誠一至期以百生千生望於所證不怠不退深可愍也吾昔遇太上老君示以道德眞經理國理身度人行教可以亘天地塞乾坤通九天貫萬物爲行化之要修證之本非言可喻但世俗浮詐嗤謙光爲懦怯輕退身爲迂劣笑絶聖棄智爲荒唐鄙絶仁棄義爲逕庭蓋末世之迷妄也玄聖之意將欲還淳復朴宗道黜邪斜徑旣除至道自顯淳朴已立澆競自祛則裁制之義無所施兼愛之慈無所措昭灼之聖無所用機譎之智無所行天下混然歸乎大順此玄聖之大㫖也吾以曆數旣往歸理兹山常以乆視無爲之道分命仙官下教於人蓋上聖高眞愍劫曆不常代運流轉陰陽倚伏生死推遷俄爾之間又及陽九百六之會孜孜下教以救於人尤切於世人之求道也世人求道若存若亡繫念存心萬中無一天眞憫俗常在人間隱景化形隨方開悟此山九降皆有宫室眞官主之其下有寳玉五金靈芝神草三天所鎭之藥太上所藏之經或在石室洞臺雲崖嵌谷皆有靈司主掌無毒螫鷙攫之物可以度世可以養生可以修道可以登眞也汝居山以來未嘗遊覽四表俯睇岑巒固不得而知也勉之修之佇俟駕景策空然後倒景而研其本末也於是命侍臣以道德二經及駐景靈圖授之而去自是一年或三五降於黄庭觀後數年妙想白日昇天所居觀改爲營道觀兹山以舜修道之所故曰道州老君嘗以道德授舜於此可驗故河上公云吾者此書已一千七百歲也在夏禹時降于商山號眞行子教以勤儉之道授九疇書又命宛委山之神玄夷使者授以玉書靈寳五符治水眞文及罡步劾召鬼神之法初禹治水隨山濬川老君遣雲華夫人往陰相之時禹駐巫山之下大風卒至崖谷振損力不可制忽遇雲華夫人禹拜而求助夫人即敕侍女授禹策召鬼神之書因命其神狂章虞餘黄麾大翳庚辰童律巨靈神等助其斬石疏波决塞導阨禹嘗謁雲華於崇巘之巓顧盻之際化而爲石或倏然飛騰散爲輕雲油然而止聚爲夕雨或爲游龍或爲翔鶴千態萬狀不可親也禹疑其狡獪怪誕非眞仙也問諸童律曰天地之本者道也運道之用者聖也聖之品次眞人仙人也其有禀炁成眞不修而得道者木公金母是也蓋二炁之祖宗陰陽之原本仙眞之主宰造化之元先雲華夫人者金母之女也受書爲雲華上宫夫人主領教童眞之士理在玉映之臺隱見變化蓋其常也亦曰凝炁成眞與道合體非寓胎禀化之形乃西華少陰之炁也且炁能彌綸天地經營動植大包造化細入毫髮在人爲人在物爲物豈止於龍鶴飛鴻騰鳳哉禹然之往詣焉忽見雲樓玉臺瓊闕森然靈官侍衛不可名識獅子抱關天馬啓途毒龍電獸八威備軒夫人宴坐於瑶臺之上禹稽首問道召禹坐而謂曰夫聖匠肇與剖大混之一樸判爲億萬之體發大藴之苞散爲無窮之物故步三光而立乎晷景對九域而制乎邦國刻漏以分晝夜寒暑以成歲紀兑離以正方面山川以分陰陽城郭以聚民器械以衛衆輿服以表貴賤禾黍以備凶歉凡此之制上禀乎星辰而取法乎神眞下以養於有形之物也是故日月有幽明生煞有寒暑雷電有出入之期風雨有動靜之常類炁浮乎上而衆精散于下廢興之數治亂之運賢愚之質善惡之性剛柔之氣壽夭之命貴賤之位尊卑之序吉凶之感窮達之期此皆禀之於道懸之於天而聖人爲紀也性發乎天而命成乎人立之者天行之者道道存則有道去則無非道則物不可存也非修則道不可致也太上有言致虚極守靜篤萬物將自復謂歸於道而常存也道之用也變化萬端而不足其一是故天參玄玄地參混黄人參道德去此之外非道也哉長乆之要者天保其玄地守其物人養其氣所以全也則我命在我非天地煞之鬼神害之失道而自逝也志乎哉勤乎哉子之功及於物矣勤逮於民矣善格乎天矣而未聞至道也吾昔於紫清之關受書寳於勤之我師三元道君曰上眞内經天眞所寳封之金臺佩之太微則雲輪上往神虎抱關振衣瑶房遨宴希林長招仙公右棲白山而下盻太空汎乎天津則乗雲騁龍遊此名山則天人詣房萬神奉衛千精伺迎動有八景玉輪靜則宴處金臺亦謂之太上玉珮金璫之妙文也汝將欲越巨海而無飈輪渡飛砂而無雲軒陟阨塗而無所輿涉泥波而無所乗陸則困於遠絶水則懼於漂淪將欲以導百谷而濬萬川也危乎悠哉太上愍汝之至將授汝以靈寳眞文陸策虎豹水制蛟龍斬馘千邪檢馭群兇以成汝之功也其在乎陽明於天矣吾所授寳書亦可以出入水火嘯叱幽冥收束虎豹呼召六丁隱淪八地顚倒五星乆視存身與天相傾也因命侍女陵容華出丹玉之笈開上清寳文以授禹仍命狂章巨靈等神助禹誅爲民害人力不能制者戮防風氏於會稽鏁淮渦之神無支秖於龜山皆其力也禹後入陽明洞天爲紫庭眞人藏眞文於包山之墟按玉笥山太秀法樂洞天乃太上授禹靈寳眞文之所遺迹存焉今太湖中洞庭山林屋洞天即禹藏眞文之所一名包山吳王闔閭十二年正月登包山之上命隱者龍威丈人入包山之洞宄其深遠見金城玉屋題曰天后别宫太陰之堂於玉室几上得素書一卷凡百七十四字而還闔閭不識其書使使問仲尼云赤烏銜書以授於王仲尼曰吾昔遊於西海之上聞童謡曰吳王出遊觀震湖龍威丈人名隱居北上包山入靈墟乃造洞庭竊禹書天帝大文不可舒此文長傳六百初今强取出喪國廬丘按謡言乃龍威丈人洞中得之赤烏所銜非丘所知也吳王懼復歸其書也在商湯時降于潛山號錫則子說長生經教以恭愛之道今潛山天祚宫前龍堂之址即其所也老君雖歷代應見而未有誕生之跡將欲和光同塵以立世教乃先命玄妙玉女降爲天水尹氏之女名益壽適仙人李靈飛玄妙玉女即無上元君也靈飛本臯陶之後至商時父子相承得修生之道父慶賔年百歲餘常有少容周遊五嶽諸山一旦雲龍下迎白日昇天靈飛感父昇天之事精修大道亦百餘歲當老君未誕而昇天至商十有八世王陽甲踐祚之十七年庚申歲老君自太清仙境分神化炁乗日精駕九龍化爲五色流珠下降時尹氏晝寢夢天開數丈衆仙捧日出良乆見日漸小從天而墜爲五色珠大如彈丸因捧而吞之覺而有娠今亳州天靜宫有流星壇即其處由是容顔益少神炁安閑所居之宰六氣和平冬無凝寒夏無祁暑祥光照室衆惡不侵八十一年不覺其乆至商二十二王武丁之九年庚辰歲二月建寅十五日卯時聖母因攀李枝忽從左腋降生仙傳所載皆云在胎八十一年唯内傳云上帝之師元君感日精入口因娠經七十二年剖左腋而生二說雖或不同然亦有由虞宣出塞記云老子復命胞中七十二年舉候九年則亦八十一年也是時陽景重輝祥雲蔭庭萬鶴翔空九天稱慶玉女跪捧九龍薦水以浴聖姿龍出之池因成九井按漢伏滔北征記云老君廟中有九井水皆相通故每汲一井九井皆動降生之初即行九歩步生蓮花因指李樹曰此吾姓也老君嘗於多劫之前降生於北玄玉國李谷之間因以姓李今又降生李氏之家李木之下生而知其姓故指以示人非今方以李爲姓也謚曰聃老君耳高於項厚而且堅下有垂珠中有三門天神之表與凡迥異故以爲謚或作儋者漢字通用也故史記亦作太史儋如今儋州曰儋耳也或作耽者音訛也或謂其吐舌舑然而謂之舑此又傳聞之謬也名耳字伯陽或曰伯陽父者尊老之稱也一名雅字伯宗一名志字伯光一名石字孟公一名重字子文一名定字元陽一名元字伯始一名顯字元生一名德字伯文按九宫經三五經元辰經云人各有厄會若易名字以隨元炁之音可以延年度厄今世有道者亦多如此又列記云李君二千五百年輒易名字老君在世最乆故名字稍多嘗告尹喜曰吾姓字渺渺從劫至劫非可悉紀也老君降生九日身有九變皆天冠天衣自然被體仍有七十二相八十一好七十二相者頭圓如天面光象日伏犀蟠起玉椀穹隆皓髮如鶴長七尺餘眉如北斗其色翠緑虎髭龍髯素結如絲耳有垂珠中有三門高平於頂厚而且堅河目日月方瞳緑筋鼻有雙柱準骨隆隆口方如海脣赤如丹炁有紫色其香如蘭齒如編貝其堅如銀數有六八上下均平舌長且廣形如錦紋其音如玉其響如金顴高而起頤方若矩日角月淵金容玉姿龍顔肅肅鳳視閑閑額有光象三午上達天庭平坦金匱充盈頰有白誌頤有玉丸項有三約鶴素昂昂垂臂過膝手握十紋其指纖長各有策文爪有玉甲身有緑毛胸有偃骨背有河魁臍深餘寸腹軟如綿心有錦紋腹有玄誌眼有輪文足蹈二卍指有乾坤身長丈二徧體芳香面方而澤上下三停體如金剛貌若琉璃行如虎步動若龍趨此其相也左扶靑龍右據白虎前導朱雀後從玄武頭蔭紫雲足履蓮花項負雙景五明耀日身有圓象動照九天兼全仙相光色奇妍總八十一謂之好也寄胎八十一年極太陽九九之數生而皓首故號爲老古人稱師爲子又子者男子之通稱故號老子一說老者長年之稱子者幼稚之號故謂之老又是初生故謂之子又乃白首故兼二儀而稱之曰老子也唐尹文操論曰老子者即道之身也迹有内外不同由能應之身或異也其内號者即至一眞一玄一皇一元一帝一太一天一正一等是也至一者妙而無質也眞一者淳粹湛然也玄一者通靈不滯也皇一者光明無上也元一者萬道之長也帝一者百神之聖尊也太一者長生之大主也天一者司陰之眞宰也正一者明威之法王也謂兹九義同出異名旣契玄機故咸言一矣其外號者則鬱華大成廣壽廣成隨應赤精録圖務成尹壽眞行錫則燮邑育成經成郭叔等子是也鬱華者道化光盛也大成者玄德普資也廣壽者怡神術贍也廣成者攝生功博也隨應者感通無礙也赤精者矜靈丹著也録圖者符命冥合也務成者庶績充遂也尹壽者公正身康也眞行者精誠淳粹也錫則者仁惠有方也燮邑者風教變俗也育成者牧養克諧也經成者正訓常全也郭叔者廓清累代也此並隨教得名旣降爲國師故同稱子也居于東國苦縣瀨鄉曲仁里渦水之陰按史記云楚苦縣瀨鄉曲仁里人劉向列女傳云陳人皇甫謐高士傳云楚之相人家于渦水之陰或曰譙人瀨或作厲其說不同者蓋其地乃太皥伏犧氏之墟宛丘之側顓帝亦都焉禹貢屬潁州之分商湯復都之謂之亳商周武王克商封舜後媯汭於宛丘是謂陳國熊繹始封地連於陳爲楚國魯宣公十一年楚滅陳申叔時諫乃復立之昭公八年楚又滅陳遂縣之至十三年楚復封陳至襄公十七年卒爲楚所滅陳遂屬楚楚頃襄王爲秦所伐失兵鄢郢都陳秦滅楚陳屬潁川郡至漢爲淮陽國居陳領九縣如苦相譙厲等皆屬焉後漢章帝時改爲陳郡今爲亳州也苦縣徐廣云晋名谷陽齊省谷陽隋復置焉苦縣東谷陽故城即古之厲鄉城也縣東北有古相城即楚之相縣也戰國之末并相爲苦唐乾封元年改爲眞元縣今爲衛眞縣北近渦水東四十里有古譙城即漢之譙縣也故老子或稱陳人楚人相人譙人也厲鄉者即瀨鄉也左氏傳云楚成王伐徐秦師伐厲以救之杜預云厲楚之與國也地理志云屬淮陽王莽改曰賴陵裴松之北征記酈善長水經闞駰十三州已并圖經皆作賴爲其地近渦水俗遂轉而爲瀨焉聖母旣誕育道身將返天闕復元君之位欲示世人以師資傳授之道乃告老君曰夫人受生於天地中有清有濁炁之清者聰明慈仁氣之濁者愚癡凶虐明者因修以成性昧者恣欲以傷命性者身之原也命者生之根也是故修學之人鍊身於九丹解結於五神引炁於本生滅根於三關九鍊十變百節開明胞結斷滅乃知本眞而成上仙也若不修學則邪魔入身百痾競生死不盡命痛乎難言夫仙由心學心誠則仙成道貴内求内密則道來能致靜以學眞積虚以通神則仙日近矣苟心競神勞體煩不專動靜喪精耳目曠眀徒積稔索道道愈遠也寄寓天地間少許時耳若能攝炁營神辛苦注眞乆將得道則與天地共寄寓於太無中也能洞虚體無則視之不見聽之不聞乃與道合眞矣老子曰今涇跡塵寰欲常存不死隨世度人可乎元君曰吾有秘寳非聖不傳有能修之可以長存老君曰願聞其致元君曰至道淵奥深不可識匪有匪無匪聲匪色視之不見搏之不得囊括天地至人無極近在諸身莫知能測能知其則是謂玄德老君曰其道亦有衛以致之乎元君曰道者虚通之至眞術者變化之玄技道因術以濟人人因修而會道則變化無窮矣夫道之要者無爲而自然術之秘者符與炁藥而已符者三光之靈文天之其信也藥者五行之華英地之精液也炁者陰陽之和粹萬物之靈爽也人雖得一事未畢要資符藥道乃訖此吾之秘寳爾能兼之可以長存度人無量矣老君曰身者得道之器也炁者致命之根也根抜則命終器敗則道去今欲修之令命固道隆可得聞平元君曰人禀骨肉之質猶陶家坯也坯木冶則敗速身未煉則命促理固然也縱使德冠群有神䟽太玄而身猶恐未免乎老死夫何故哉由化致然不得不然也惟藥能煉形符能致神神歸則心通而性逸形堅則氣固而命全然後化炁變精洞入無形飛行虚空存出自然乃能長存得道之人雖遭劫交天地崩淪而灾不能及所以貴乎符藥者由此也老君曰服神丹而得長生者神靈佑之乎將藥之力也耶元君曰長生之功由於丹丹之成由於神故將合丹必正其心不履罪過神明佑之作丹必成神丹入口壽命無窮已天地明察道歸仁人萬兆蠢蠢名曰行尸不信長生之可學謂爲虚誕從朝至暮但作求死之事天豈能强生之乎恣心盡欲奄忽輒死千金送葬何所益哉神丹道成不惟長生而已亦可作世之寳也知此道者亦安用天下爲人有以國易吾方而非其人不傳也老子稽首曰願聞其㫖元君乃仰天而嘯倏忽有紫雲如蓋自天奄至中有五色藴光明八達仙人涓子侍之元君披出神圖寳章變化之方還丹伏火水汞金液之術凡七十二篇以授老君其文曰一爲玄白生金公太陽流珠入華池斤内五兩文姜赤鹽白雪成雄雌五符九丹得之飛眞道在此人不知五符者一曰玄白二曰金精三曰飛符四曰金華五曰三五靑龍精九丹者一曰白雪九轉還丹二曰雌雄九轉還丹三曰金液九轉還丹四曰白華九轉還丹五曰丹華九轉還丹六曰五色九轉還丹七曰泥汞九轉還丹八曰金精九轉還丹九曰九鼎極耀還丹此九丹得一則可以長生不在徧作也神丹之道皆三化五轉至九而止得服之者與吾等矣神仙之道不在祭祀禱鬼神不在導引與屈伸不在呪願多語言不在精思自苦勤長生之要在神丹知之甚易爲寔難于能行之可長存此之道成立得仙吾亦學得非自然老子再叩頭稽首曰九丹之道旣奉慈訓矣切聞求仙不得金液虚自苦辛願示直要元君曰大哉子之問也九丹金液同爲昇天之道然九丹中金液爲上所以爾者服九丹之人或三年或二年或一年或半年或百日六十日三十日十日三日乃有仙官雲龍來迎惟服金液者入口則身色紫金立生羽翼昇天爲仙官矣凡欲服之維先長齋斷穀一年乃得服之自非有玄中之籙及不死之名者終不得聞九丹金液之道也其法依前合丹金成而液之其道畢矣此吾之秘寳也凡有千二百訣吾於往劫塵沙天地之先受之元始天尊奉而行之得居無上元君之位吾昔以傳至眞大聖天帝上帝太微太一元君今又授汝爾其勉之老君受記復請曰萬兆芸芸動之死地今以此道廣濟如何元君曰悠悠之徒躭榮嗜欲死者若墜石投川往而不返甚可痛傷然道不虚行必授眞人此道高妙秘於九玄瓊臺雲笈萬年一行貽諸玄籙玉名耳自非宿命骨相合仙之人不得聞也愚人多過爲得違天科而妄傳乎吾道盡止將去矣當遣太和元君語汝言訖即有千乗萬騎五帝上眞擁八景玉輿迎之昇天今太清神丹經其法乃出於無上元君其神能調和陰陽役使風雨進退五星斟酌寒暑驂駕九龍十二白虎天下衆仙皆仰隸焉人之生死咸由之猶言服丹所致也老君乃遠遊山澤求煉神丹行經勞山果遇太一元君乗五色班麟從官十人老君從之問道元君曰道之要在乎還丹金液耳遂且授秘訣他年之歷山復會大一元君因謝神丹之方元君曰君是群仙之尊萬道之主玄靈秘術本玄分也奚辱謝焉老君曰凡民無知死者甚衆撫心泣血見之傷悲欲給以神藥令皆長生可乎元君曰不可生道至重必授大賢及孝順篤信之士天生萬物有善有惡善者宜生惡者宜除不足給藥令皆長生也君已知之不可輕泄聖紀讚曰老君體寂太無德資妙有成道億劫造化萬天自然而然不由積學降九皇而設教委歷帝以爲師獨立紫清誰與爲先今乃請聖母而寄學從元君而訪道欲顯眞道玄妙非學不成神仙高奇修之可獲俾夫尊師貴德存牝守柔表上聖之靈規垂將來之妙範所以隨機示教奬善懲迷文始抱朴旣述之於前今更讚之於其後老君以神仙之道必假修煉欲垂法以勸來世故存眞抱一煉丹復炁然後乗空陵虚出有入無隨意所適人莫能測一日乗白鹿履庭檜而昇天混元聖紀卷之二
