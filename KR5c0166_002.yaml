front:
  text: 混元聖紀卷之二與二
  hash: sha256:b0d5e9d4d34f5b616bd304b1ebe08645f67fcaa70b7285f2ef2140c80c4de9a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_HFL_002-001a, image: hfl/0551/0551-092.png}
body:
  text: 宋觀復大師高士謝守灝編太上老君乃大道之宗祖三才之本根也太極之先寥廓何有道源肇啓氣母混成澒洞溟津兆朕胚腪中有真精自然而生是為神明强名虛皇潛司玄化道運御世一氣分三為玄元始三氣混合氤氲漸著為萬象之端莫知其先强目曰元莫知其初强目曰始故曰元始天尊三氣相生九氣混合化生諸天成就世界莫知其大强目曰太莫知其高强目曰上首出無極仰之曰老宰而無我主之曰君故曰無上三天玄元始三氣太上老君焉初自一氣而分三氣是為三天三氣合生九氣是為九天自大羅天生清微天禹餘天大赤天三清境也自三天下生鬱單天襌善天須延天兜術天不驕樂天洞元天梵輔天清明天無想天此九大梵天也九天又各下生三天合三十六天其外諸小梵天悉係屬於此大梵天也九氣乃融氣炎氣演氣昊氣景氣道氣混氣洞氣浩氣也次四種民天犬極平育天龍變梵度天玉隆騰勝天太虛常融天為種民天亦曰種人謂開劫之初降為人種也釋氏呼為四襌天此天上取太清境三千三百萬億氣下生八梵天五千五百五十五萬氣凡一氣三千里此天出三界之上超陰陽之數故無年壽之限水火風灾所不能壞也次分三界欲界六天色界十八天無色界四天也次八梵天始靑天靑元天始丹天太丹天始素天太素天始玄天太玄天也次人間世北方清靜世界東北長安世界東方納善世界東南用賢世界南方棄賢世界西南仁靜世界西方淨行世界西北延賢世界下置九地結為山嶽融為海瀆第一壘潤色澤地第二壘剛澤色地第三壘脂色澤地第四壘潤澤地第五壘金粟澤地第六壘金剛鐵澤地第七壘水制地第八壘大風澤地第九壘洞泉無色綱維地每壘一重土一重水一重風自上而下也陽精為日陰精為月分日月五行之精為星辰二氣交會則動植萬彙更相産化按開化置品經曰吾於無形無名濛澒溟涬之中開道玄黃分靈散氣從大羅下生三境次生九天立九帝為三寶之玄律二十七天為境界之修品三十六部為三境之玄根下為三十六天之域宅次三十二天三十二帝潛運開化下分三界傍貫璇璣二十八宿五星躔度以明五方清氣上騰重濁下凝下生九地中生九人天地人物無不備焉故陽和正氣化生上聖高真柔和沖靜之氣化生元君聖后仙妃玉女剛烈英勇之氣化生天丁力士神兵將吏陰陽五行之氣化生男女雜謬之氣化生飛禽走獸咸承一氣萬種不同隨其化生也大劫之末九地之上至無色界三灾大作萬象消化種民天之上灾所不及元氣復合再為混沌歷劫重開復命天人降為人種為君為臣洪道建法隨時布化已經無量浩浩之劫悉皆如是按上清經云天圓十二綱地方十二紀天綱運關三百六十度為陽孛地紀推機三千六百度為陰蝕天綱三百三十日運關一周地紀三千三百日推機一度九千九百度為天地氣交名大陽九大百六亦名大劫大運也以數乘之大凡三百三十年一度陽孛此為小陽九之灾一百八萬九千年即天綱運關三萬三千周地紀推機三千三百度大運之交也夫天動地靜陽躁陰遲故有孛蝕之異耳此時天氣窮於太陰地氣極於太陽陽極則孛陰極則否陽極則其精化為水陰極則其精化為火先焚為大火次漂以大水上至九天之下下至九地之內金玉消化毫末無遺然後元氣復合謂之混沌混沌再分則三天上聖四天種民下世教化亦如此劫之初三皇五帝相承而治矣如此變革總名為元氣離合老君歷此離合之數經無量劫故西升經云動則有載劫自惟甚苦勤此之謂也風俗通曰十千曰萬十萬曰億十億曰兆十兆曰經十經曰垓十垓曰載載者謂地不能載也又按九天生神章曰大運將期數終甲申三官鼓筆料别種人考算功過善惡當分自赤明以來至上皇元年依元陽玉匱受度者應二十四萬人開皇以後數至甲申諸天選叙仙曹空廢官僚不充依元陽玉曆當依三代更料有心積善建功為三界所舉五帝所保名在上天者取十萬人以充其任又當别舉一十二萬人以充儲官三官相應皆逆注種名謂合生四天為後劫種人也又九幽之府被東華靑宫九龍符命使拔九幽男女死魂宿名有善功德滿足應受開度者取三十二萬人以充甲申驅除之後開大有之民劫歷皆然悉禀命於老君也天地之狀象類雞卵元氣繞之如日之暈如是天地有五億五萬五千五百五十五億重各於其中立天文地理運陰陽五行列神祇産萬彙秉生成之柄鎮造化之原故在天為衆聖之尊在世為萬教之主謂之老子者道之形也應既不一號亦無量或三十六號或七十二名或號九天上皇或號洞真帝一君或號高上玉帝或號長生大帝或號太平正真太乙妙氣皇君或號九玄帝君或號太千法王或號九靈老子或號太上左玄真人或號上清金闕三洞妙經大法師或號高上大法王或號玄一真定光或號金闕後聖君或號九老仙都君或號九氣丈人或號太上丈人或號千二百宫君或號太平上景君或號無為父或號萬物母其降生之時十方天神空中稱讚尊號有十曰太上老君圓神智無上尊帝王師大丈夫大仙尊天人父無為上人大慈仁者真元教主天人稱讚亦有十號曰無為之君無上玄老太上老君高上老子天皇大帝玄中大法師有古大先生金闕帝君太上高皇虛無大真人復有至真無極大道自然元始太上天尊道君無上天真天老天師黃老玄宗世師神人真人仙人至人大人道人聖人之號也以上自天真以下號各二字老君洞真極聖本無常形消則為氣息則為人或於太虛之中凝為真容體大無邊相好備足上無所攀下無所躡或在雲華之上身如金色萬真侍衛百靈宗奉或坐蓮花之內建七曜玲瓏之冠披九色離羅之帔項負圓光照曜天地或處寶堂金殿珠玉帷帳萬帝朝禮神兵衛軒或金容玉姿黃裳繡帔或素服玄冠乘朱鬃白馬或下治十天封掌兆民居太微勾陳紫房中為天皇大帝或春化為上景君長九千丈建七精寶華之冠衣玄黃二氣之服靑錦飛裙手執虎符坐七色之雲或夏化為老翁戴九龍之冠衣黃紋之衣服黃羽之裙手執金板立紫雲之上或秋化為童子衣五色之衣或乘獅子或坐靑雲或冬化為蒼玄靑三色之光光明混沌更相纏繞此則返金闕之氣更受鍊飛玄通晨之精也或化身為玄天大帝經云八十二變為真武故佑聖真君啓請有云仰啓玄天大聖者北方壬癸至靈神金闕真尊應化身無上將軍號真武也其神通自在隨感則現能白能黑能方能圓能屈能伸能修能短能老能少能一能萬縱橫反覆厥體靡常或為千二百老子應現諸天或為百八十道君接引凡世分靈散景倏忽周遍而真一之身湛然常寂常在太清太極宫也老君嘗以上和元年歲在庚寅九月三日甲子化生於鬱單北玄玉國天罡靈鏡山李谷之間上玄靈母九玄之房初母之始孕夢玄雲日月纏其形六氣之電動其神遂有妊既誕之辰有三日並出乃以谷為氏族用曜景為名一名弘字子光一名玄水字山淵上和乃天上之紀年也如赤眀朱靈清漢天漢開皇上皇之類也而世俗之士秖知甲子造於大撓年號始於漢武便以上和等號皆謂之妄殊不知上天自億劫以前紀年不廢世人無從而知耳自鬼谷子北郭子張天師葛仙公等方引諸天之號以配人間時代也不然則諸仙博古該今窮幽宄微豈不知秦漢之前未有年號耶至如開闢之初建立法度及世代因革悉由上天數定時遣天真降教以傳人世耳非世人能先天而肇造也學者詳之於是斂魂研魄守胎寶神録精鎮血固液凝筋吞光飲霞咀嚼飛根內德圓充外纍遠判形分百萬變化無窮紫微上真天帝玉清君遣八景瓊輿來迎以登上清宫授蘂剛丹玉鳳璽金真玉光給神虎之符及飛行之羽朱錦龍裙靑帔虎帶戴圓容神冠受書為金闕後聖帝君老君於龍漢元年分身於中央大福堂國出真文赤書以化其民民皆長生又於南極赤明之國出火煉真文故號洞陽之庭有流火之池人煉其形皆成金色上置南昌之宫下立朱陵之館以主生成老君以龍漢赤明上皇延康開皇五劫皆運始靑丹光中靈素華玄陽之氣輪轉而為玉曆龍漢以來渺渺億劫混沌之中寥廓無光載籍叵考赤明開圖然後經典始可得而推也真文者五方真氣之精凝結成文八角垂芒或為雲篆之形或成飛走之狀即今之符文天真之信契也以上並互見於三洞真經也又於東極碧落之天浮黎之國書真文於空靑之林成紫字之文其林風聲成音鳥食其葉身生文章人得其羽即能飛行其民長生安樂無為又於西極衛羅世界西那玉國出真文於浮羅之嶽以度國人玉池自生金精流映人挹其水身生金光與天相畢又於北方鬱單之國書真文於洞靈之觀以度兆民其下寒池靈津自然流澳人得飲之無有終極此五土之內皆禀老君靈寶之教以得長生因命五老上帝以鎮五方行道垂教和寧群品也隋書經籍志云元始天尊生於太無之先禀自然之氣沖虛凝遠莫知其極天地淪壞劫數終盡而天尊之體常存不滅每至天地初開或在玉京之上或在窮桑之野授以祕道謂之開劫度人然其開劫非一度矣故有延康赤明龍漢開皇是其年號所說之經亦禀元一之氣自然而有非所造為亦與天尊常在不滅天地不壞則藴而莫傳劫運若開其文自見乃命天真皇人改轉天音而辨析之自天真以下至於諸仙展轉節級以次相授諸仙得之始授世人推其大㫖蓋亦歸於仁愛清淨積而修習漸至長生自然神化或白日登仙與道合體宋張商英道德經云劫運悠曠太少格塞邪氣失元散著群生因其九竅發生情識情流識蔽宛轉顚倒因流起愛蔽愛生憎僧愛交攻前伏後起棄明趨昧積昧為陰陰結為幽入幽為鬼神正為人形傍為異趣啖食陵暴性不得靜命不得延黑氣慘霾干犯霄極三清化主三帝天君鑑觀在下一念興悲自然妙氣絡繹成文靈風鼓奏自成音聲至慈度厄至仁好生至正摧邪至明破冥上列曹官下設嶽洞衆真受職列仙分統真機既漏玉字乃出火煉洞陽筆著空靑玉檢金版符籙呪訣教授仙衆威制魔群煉度魂魄役召萬靈太上道三上真道七中真道六下真道四金口所說三師所授瑶函寶笥祕蓄天臺遺落人間太倉一稗修真之士集為三洞無無上真名曰洞真幽深微妙名曰洞玄靈奇隱顯名曰洞神非真之真泯寂無文非元之元妙體孤存非神之神欻忽無垠此明三洞真文之㫖趣也老君又化身號靜老天尊行教五方遂於東華山九合玄臺說法以授東極始老國王其王妃王子大臣五千餘人同修其道俱得地仙乃建習仙宫習靈七正二館令學仙者居之二百年中國內白日升天者三千餘人其王升為妙梵天主按靑童內文云始老國在東海之外也一名清和國妙梵天主後以逸樂過度謫下人間為罽賔國王老子化之為佛者是也老君在天皇時號玄中大法師亦曰通玄天師出洞真經一十二部以無極大道下教人間在地皇時號有古大先生出洞玄經一十二部化人以無上正真之道在人皇時號盤古先生出洞神經一十二部化人以太平無為之道在伏犧時降于田野號鬱華子授天皇內文又降河圖八卦之文教人以順性之道在祝融時降于恆山號廣壽子授人皇內文教人以安神之道俾陶鑄為器以變生冷在神農時降于濟陰號大成子授地皇內文教人以好生之道俾播植穀果以代烹殺和合方藥救疾養性略見唐紀在黃帝時降于崆峒山號廣成子帝即位二十九年憂天下之不治乃往見廣成子而問曰聞子達於至道吾欲取天地之精以佐五穀以養民人又欲觀陰陽以遂其群生為之奈何廣成子曰而所問者物之質也所欲官者物之殘也自汝治天下雲氣不待族而雨草木不待黃而落日月之光亦以荒矣而佞人之剪剪者又奚足以語至道黃帝退捐天下築特室席白茅順下風膝行而進再拜稽首問曰聞吾子達於至道敢間治身奈何而可以長久廣成子蹙然而起曰善哉問乎來余將語汝夫至道之精杳杳冥冥至道之極昏昏默默無視無聽抱神以靜形將自正必清必靜毋勞汝形毋搖汝精少思寡欲可以長生目無所見耳無所聞心無所知神將守形形乃長生謹汝內閉汝外多知為敗我為汝遂於大明之上矣彼至陽之原也為汝入於窈冥之門矣彼至陰之原也天地有官陰陽有藏謹守汝身物將自壯我守其一以處其和故修身千二百歲吾形未嘗衰也黃帝再拜稽首曰吾子之謂天矣廣成子又謂黃帝曰來余語汝彼其物無窮而民皆以為終彼其物不測而人皆以為極得吾道者上為皇下為王失吾道者上見光而下為土今夫百昌皆生於上而返於土故余將去汝入無窮之門以遊無極之野吾與日月參光吾與天地為常乃授帝陰符經老君於三皇時說經世謂之三墳之書久失其傳兼纍世所說經多藏瓊室瑶臺或祕龍宫海藏神真保護世莫得聞今所傳者太山一毫芒爾久之又命西王母授帝元始天尊玉像帝置於高觀以敬奉之常有綵雲覆其上故號為道觀道觀之號自此始也按太平廣記所引道經云在昔道氣凝寂湛體無為將欲啓迪玄功化生萬物先以東華至真之氣化而生木公木公生於碧海之上蒼靈之墟以主陽和之氣理於東方號曰東王公焉又以西華至妙之氣化而生金母以主元育神玄奧於眇莽之中分大道醇精之氣結氣成形與東王木公共理二氣而育養天地陶鈞萬物體柔順之本為極陰之元位配西方母養群品號曰西王母焉天上天下三界十方女子登仙得道者咸所隸焉木公冠三維之冠服九色雲霞之服亦號玉皇君居於雲房之間以紫雲為蓋靑雲為城仙童侍立玉女散香真僚仙官巨億萬計各有所職故男子得道者名籍所隸焉時往謁九靈金母一歲再遊其宫共較定男女真仙皆品功行以升降之天地劫歷陰陽代謝時運興廢陽九百六舉善黜惡靡不由之總其籙籍而上奏元始中關玉晨以禀命於老君故老君授道於黃帝乃命金母示以元始之像焉老君又命帝陟王屋山開石函發玉笈得九鼎神丹飛雪爐火之道帝遂鑄鼎荆山煉丹成服之有雲龍來迎帝乘龍上升時群臣侍女同得升天者七十有二人其餘小臣不及上爭持龍髯攀墮黃帝弓與鼎皆抱之號泣世謂之烏號之弓臣民無所追慕遂取其遺物於巴山造墳以藏之號巴陵又於橋山葬其衣冠號黃帝陵鼎所墮處謂鼎湖焉今處州縉雲縣仙都山其巔有鼎湖無路可緣上生金蓮其葉嘗飄墮於雙溪故名金華縣古以帝氏縉雲故以名其邑信不虛也初老君垂世立教故示有修證之訣師資傳授之格乃以上皇元年甲子七月二日出遊西河時見元始天尊乘八景玉輿駕九色玄龍三素飛雲導從群仙浮空而來同會西河之上天尊吐洞玄內觀玉符以授老君老君稽首承教服符三部八景神身中並見金書玉字二十四圖空中自明洞徹無窮羅縷自然即命主圖上仙依而畫之金書紫字丹簡玉章於此成立自南極上元九光太真王夫人東西二華南北真公五嶽神仙清虛真人所授真文並出於老君焉其圖分為上中下三品上品一神仙沐浴東井圖二五嶽真形圖三通靈訣精八史圖四六甲通靈圖五九宫紫房圖六元始太清圖七真道混成圖八西升保籙圖中品一神仙通微靈化圖二躡虛九靈圖三九變天圖四常存圖五守一養身圖六守神含景圖七寂默養真守志圖八芝英玉女圖下品一神仙六陰玉女圖二九九道仙圖三導引圖四洞中洪保圖五變化隱測圖六採芝開山圖七明鏡圖八無極太一圖凡二十四圖皆修身長生之術並洞玄元始之氣化成也老君又典領玉晨神虎符圖智慧素經凡上清大洞真經召靈威魔神符玉章莫不掌録焉此經皆結飛玄自然之氣以成其道高妙衆經之尊總統萬靈匡御群仙祕於九天之上大有之宫鑄金為簡以撰靈文刻玉丹書以明其篇或藏太微靈都瓊宫玉房之內咸衛以巨獸扞以毒龍神虎七千備于玉闕金晨玉童素靈玉女各三千人侍衛靈文衆真宴禮萬聖朝軒玉晨大道君常謂老君曰大劫之周擇授上賢自無其人纍劫不傳後學求仙不知道原徒勞思存損疲形神夫欲尋本當歸其根失根求生萬不得全上皇玉文子擇人而傳其法寶祕深不可言當依明科承而奉焉中皇元年壬戌三月一日老君於玉天瓊房推較本元撰集靈篇以為寶經三百卷符圖七千章玉訣九千篇以授東海方諸宫靑童大君使傳後學玉名合真之人大君既受寶經位登上相金華玉女紫晨玉童各三千人俱侍衛焉秉靈符之節麾命魔靈幡逍遙紫虛之館徘徊靑華之房滅六天於末運剪萬精於群山採後學於金簡校靑籙於方諸延萬帝於曲宇讚寶訣於妙章撰獨立於齊真嚴四極以檢運普統九天九地五嶽名山億兆萬真莫不咸隸生死圖籍細無不關末學之子欲受經及修行皆宜先奏金簡於靑宫投玉札於上清典籙玉司常陰察人精粗其有勤苦乃得玄授焉老君又傳太虛真人南嶽赤君使授學道宿有金名玉字高閣刻名當為真人者又傳天真皇人太真王夫人等或封於西玄王屋山中或刻於蓬萊府北室金柱玉璧上又以五色玉為簡各封五嶽石笥中須壬辰告會後聖君來下當出以付四輔使教上真之才按後聖李君列記云後聖李君四輔上相方諸宫靑童大君上保太丹宫南極元君上傅白山宫太素真君上宰西城宫總真王君凡欲求仙當尋其文得其本原道無不成苟不知道所出與寶訣所生謂之投暗而學無有祖宗真不為降道亦不行也老君曰夫三洞寶經皆三清上道也吾昔授之於元始天尊于今七億萬劫天地成壞萬品生滅惟吾道獨存今猶修之於景雲之上常以玉清玄簡出付真公於無量壽天又付方諸靑童大君依九天品格萬劫一出自開皇以來傳付後學應為真者九千年聽傳三人或四十九年中遇有其人聽頓傳人欲受吾經當依四極明科齎信詣師受以佩身閉心修行愼勿輕傳考之經科受經之格年限不同蓋上古淳和萬劫一出末代澆薄拯救尤切四十九年得人即傳皆以齊戒為先陰功為務以拔九祖之罪以度群品之厄後及己身立功布德上遵天憲以期超升故有二十七品齊科三十六品醮法上即以清虛簡寂為用次即以吐納服御為階末即以洗心悔過為宗普即以後己先人為要功行三千白日登天斯言有證者也又曰欲修行上法宜先修高上洞真三元齊直三元合真上應九祖凡欲修行大洞真經三十九章雌一玉檢五老寶經玄母八十二上願佩神虎金虎符豁落七元流金火鈴銷魔隱祝威制萬靈飛步五星存注七元思真行道上求天仙合服神丹飛騰靈丸當修上元之法九日九夜清齊念神未至一日五香沐浴宿結齊心上至九人下至三人主客丹禱每事精勤欲修中元齊直六日六夜以贖己身積滯之愆解過於天真謝罪於三元宿愆既散高上降真書名玄圖尅成上仙學而無法徒勞損功無感於自然欲修下元之法三日三夜解拔九祖令飛魂更生出離三塗上升南宫釋結解滯斷滅惡根七祖既懼身自成仙其法高妙非真勿傳齊直畢然後行上道常當沐浴清齊盛潔法服并漱蕩口腹令內外清虛口無餘味腹無餘薰眼無餘穢體無塵染淡泊靜默惟道是身然後修行法事焉夫學上道不奉三百大戒而誦經行呪佩符思神合丹服藥隱處山林求升仙之舉恐未可希也若能戒全於內和光於外乃庶幾於靈標之崖矣非修道難奉戒難耳子能全戒及十方太上將保爾登仙也戒今而誦寶經佩大符而行事若復不仙則天下無有不死之道矣我之所慨世求其人難得耳夫有經而無戒猶涉海而無舟楫猶有口而無舌何緣度兆身耶夫道要在行合冥科積善內足然後始涉大道之境界弗能爾者皆為徒勞於風塵無益於生命之修短也老君復授靑童大君靈書紫文修行二十四事其略曰採服飛根吞日氣之法先服開眀符常思見日初出時叩齒陰呪日魂之名日中五帝之字存見日中五色流霞來接一身呪咽如法當覺體生玉澤面有流光次採服陰華吞月精之法先服太玄陰生符常思見月初出時叩齒陰呪月魄之名月中五夫人之字存見月中五色流晶來接一身呪咽如法當覺體生玉光目有飛精次拘三魂以三魂棄身遊遨飈逝本室或為他魂留制或為魅物收録當拘而留之使無遊逸其法常存心中有赤氣轉大以覆身變而為火洞照內外叩齒呼呪如法則三魂拘留矣次制七魄以七魄流落遊走穢濁或交通血食往來鬼魅或共死尸相關或言人之罪欲人之敗皆魄之疾也其法生晦朔弦望及庚申日存鼻端有白氣漸大以冠身九重又變作四靈之獸匝繞一身呼呪如法則七魄制煉矣又人身中有三元宫上元丹田泥丸宫其神赤子字元先一名帝鄉中元丹田絳宫其神真人字子丹一名光堅下元丹田命門宫其神嬰兒字元陽一名玄谷此三一之神上一服紫衣中一赤衣下一黃衣皆如嬰兒之狀欲拘制魂魄當先陰呼其名并存服色次第分明又命門宫中有大君名桃康字合延衣朱衣冠芙蓉冠三魂侍側暮卧常存大君祝守如法一十八年大君能左激三田右御三氣呼陽六甲召陰六丁來侍人也又行鬱儀結璘奔晨之道服靈飛六甲陰陽符佩神虎金虎銷魔豁落流金之章誦大洞真經存三部八景二十四神服琅玕華丹挹黃水月華徊水玉精環剛之果即頭生七色之氣分形變化千乘萬騎白日升天皆學道修行要文乃太微天帝紫微上真天帝玉清君口傳之訣以紫玉為簡靑金為文龜母執筆金童佛筵天妃侍香玉童結篇名曰靈書紫篇以付上相靑童大君使下授玄宫玉名為真人者於是靑童大君清齊千日稽伏膝行捧首北面依科盟授以還方諸霄宫其後傳西城王君使下授骨相之子焉按經云始自大羅天開張萬範攝生十方先立九聖各分九等從凡遷仙有八十一等本為三界迷暗參差故立三乘以為修品上中下殊普令開悟昔於龍漢初時以聖道傳九天丈人九天真皇次於赤明劫時以其道傳虛皇玉帝次於上皇劫時以仙道傳萬始先生太真玉皇此上聖傳其道也太易時以德授太帝君太始時授天帝君太初時授太微帝君太極時授太微天帝太素時授金闕帝君上相靑童君此中真傳其德也下代傳教者應化法門十二等事一者三洞本文二者神符告信三者玉訣祕諱四者靈圖圖寫五者歷代授道六者戒律防非七者威儀庠序八者方法修行九者術數隱景十者記傳傳示十一者讚詠歌頌十二者章表奏請三洞通達應感符證此下代傳其教也老君在少皥時復降于崆峒山號隨應子說莊敬經教以順時行令在顓頊時降于衡山號赤精子說微言經教以忠順之道在帝嚳時降于江濱號録圖子說黃庭經教以清和之道又命九天真王三天真皇執九光之節景雲之符下牧德臺授帝嚳以九天真靈三天寶符上以奉天使二儀無遺下以營人使年命無墜帝乃祭天於北河之壇藏符鍾山之峰後升天為玄宫真人老君是時傳道與赤松子被衣子王倪齧訣略見唐紀按魏書釋老志云道家之原出於老子先天地以資萬類上處玉京為神王之宗下在紫微為飛仙之主千變萬化有德不德隨感應物厥迹無常授軒轅於峨嵋教帝嚳於牧德大禹問長生之訣尹喜授道德之㫖丹書紫字升玄飛步之經玉石金光妙有洞靈之說如此之文不可勝記魏證隋書經籍志云自古黃帝帝嚳夏禹之儔並遇神人咸受道籙年代既遠經史無聞焉又曰方外之教聖人之遠致也俗士為之不通其㫖多雜以迂怪斯所以為弊也故中庸之教是所罕言然亦不可誣也在帝堯時降于姑射山號務成子說玄德經教以謙遜之道在帝舜時降于河陽號尹壽子說道德經教以無為之道又傳道與彭祖唐紀按太平廣記載集仙録云女道士王妙想居蒼梧九嶷山辟穀服氣時念黃庭朝謁精誠忽有靈香郁烈祥雲滿庭天樂震空光燭壇殿千乘萬騎浮空而來旌幢鶴蓋導九龍之輦下降壇前見一仙官羽衣寶冠佩劍曳履升殿而坐身有五色光妙想即往瞻謁仙官謂妙想曰吾乃往昔有虞氏之君帝舜也勞厭萬國養道此山每欲誘掖後人使之知道而世無可教授者夫道在於內不在於外道在爾身不在他人玄經曰所謂修之於身其德乃真也頃者地司奏汝居此山三十餘歲初終如一守道不邪存念精誠遵禀玄戒若無所成證此乃道之棄人也玄經云常善救物而無棄物道之布惠周普物物皆欲成人人人皆欲度之但世人福德卑微道氣膚淺不能精專勤久道氣未應而已中怠是人自棄道非道棄人也以精誠一至期以百生千生望於所證不怠不退深可愍也吾昔遇太上老君示以道德真經理國理身度人行教可以亘天地塞乾坤通九天貫萬物為行化之要修證之本非言可喻但世俗浮詐嗤謙光為懦怯輕退身為迂劣笑絶聖棄智為荒唐鄙絶仁棄義為徑庭蓋末世之迷妄也玄聖之意將欲還淳復朴宗道黜邪斜徑既除至道自顯淳朴已立澆競自祛則裁制之義無所施兼愛之慈無所措昭灼之聖無所用機譎之智無所行天下混然歸乎大順此玄聖之大㫖也吾以曆數既往歸理兹山常以久視無為之道分命仙官下教於人蓋上聖高真愍劫曆不常代運流轉陰陽倚伏生死推遷俄爾之間又及陽九百六之會孜孜下教以救於人尤切於世人之求道也世人求道若存若亡繫念存心萬中無一天真憫俗常在人間隱景化形隨方開悟此山九降皆有宫室真官主之其下有寶玉五金靈芝神草三天所鎮之藥太上所藏之經或在石室洞臺雲崖嵌谷皆有靈司主掌無毒螫鷙攫之物可以度世可以養生可以修道可以登真也汝居山以來未嘗遊覽四表俯睇岑巒固不得而知也勉之修之佇俟駕景策空然後倒景而研其本末也於是命侍臣以道德二經及駐景靈圖授之而去自是一年或三五降於黃庭觀後數年妙想白日升天所居觀改為營道觀兹山以舜修道之所故曰道州老君嘗以道德授舜於此可驗故河上公云吾者此書已一千七百歲也在夏禹時降于商山號真行子教以勤儉之道授九疇書又命宛委山之神玄夷使者授以玉書靈寶五符治水真文及罡步劾召鬼神之法初禹治水隨山濬川老君遣雲華夫人往陰相之時禹駐巫山之下大風卒至崖谷振損力不可制忽遇雲華夫人禹拜而求助夫人即敕侍女授禹策召鬼神之書因命其神狂章虞餘黃麾大翳庚辰童律巨靈神等助其斬石疏波决塞導厄禹嘗謁雲華於崇巘之巔顧盻之際化而為石或倏然飛騰散為輕雲油然而止聚為夕雨或為游龍或為翔鶴千態萬狀不可親也禹疑其狡獪怪誕非真仙也問諸童律曰天地之本者道也運道之用者聖也聖之品次真人仙人也其有禀氣成真不修而得道者木公金母是也蓋二氣之祖宗陰陽之原本仙真之主宰造化之元先雲華夫人者金母之女也受書為雲華上宫夫人主領教童真之士理在玉映之臺隱見變化蓋其常也亦曰凝氣成真與道合體非寓胎禀化之形乃西華少陰之氣也且氣能彌綸天地經營動植大包造化細入毫髮在人為人在物為物豈止於龍鶴飛鴻騰鳳哉禹然之往詣焉忽見雲樓玉臺瓊闕森然靈官侍衛不可名識獅子抱關天馬啓途毒龍電獸八威備軒夫人宴坐於瑶臺之上禹稽首問道召禹坐而謂曰夫聖匠肇與剖大混之一朴判為億萬之體發大藴之苞散為無窮之物故步三光而立乎晷景對九域而制乎邦國刻漏以分晝夜寒暑以成歲紀兑離以正方面山川以分陰陽城郭以聚民器械以衛衆輿服以表貴賤禾黍以備凶歉凡此之制上禀乎星辰而取法乎神真下以養於有形之物也是故日月有幽明生煞有寒暑雷電有出入之期風雨有動靜之常類氣浮乎上而衆精散于下廢興之數治亂之運賢愚之質善惡之性剛柔之氣壽夭之命貴賤之位尊卑之序吉凶之感窮達之期此皆禀之於道懸之於天而聖人為紀也性發乎天而命成乎人立之者天行之者道道存則有道去則無非道則物不可存也非修則道不可致也太上有言致虛極守靜篤萬物將自復謂歸於道而常存也道之用也變化萬端而不足其一是故天參玄玄地參混黃人參道德去此之外非道也哉長久之要者天保其玄地守其物人養其氣所以全也則我命在我非天地煞之鬼神害之失道而自逝也志乎哉勤乎哉子之功及於物矣勤逮於民矣善格乎天矣而未聞至道也吾昔於紫清之關受書寶於勤之我師三元道君曰上真內經天真所寶封之金臺佩之太微則雲輪上往神虎抱關振衣瑶房遨宴希林長招仙公右棲白山而下盻太空泛乎天津則乘雲騁龍遊此名山則天人詣房萬神奉衛千精伺迎動有八景玉輪靜則宴處金臺亦謂之太上玉珮金璫之妙文也汝將欲越巨海而無飈輪渡飛砂而無雲軒陟厄塗而無所輿涉泥波而無所乘陸則困於遠絶水則懼於漂淪將欲以導百谷而濬萬川也危乎悠哉太上愍汝之至將授汝以靈寶真文陸策虎豹水制蛟龍斬馘千邪檢馭群凶以成汝之功也其在乎陽明於天矣吾所授寶書亦可以出入水火嘯叱幽冥收束虎豹呼召六丁隱淪八地顚倒五星久視存身與天相傾也因命侍女陵容華出丹玉之笈開上清寶文以授禹仍命狂章巨靈等神助禹誅為民害人力不能制者戮防風氏於會稽鎖淮渦之神無支秖於龜山皆其力也禹後入陽明洞天為紫庭真人藏真文於包山之墟按玉笥山太秀法樂洞天乃太上授禹靈寶真文之所遺迹存焉今太湖中洞庭山林屋洞天即禹藏真文之所一名包山吳王闔閭十二年正月登包山之上命隱者龍威丈人入包山之洞宄其深遠見金城玉屋題曰天后别宫太陰之堂於玉室几上得素書一卷凡百七十四字而還闔閭不識其書使使問仲尼云赤烏銜書以授於王仲尼曰吾昔遊於西海之上聞童謡曰吳王出遊觀震湖龍威丈人名隱居北上包山入靈墟乃造洞庭竊禹書天帝大文不可舒此文長傳六百初今强取出喪國廬丘按謡言乃龍威丈人洞中得之赤烏所銜非丘所知也吳王懼復歸其書也在商湯時降于潛山號錫則子說長生經教以恭愛之道今潛山天祚宫前龍堂之址即其所也老君雖歷代應見而未有誕生之跡將欲和光同塵以立世教乃先命玄妙玉女降為天水尹氏之女名益壽適仙人李靈飛玄妙玉女即無上元君也靈飛本臯陶之後至商時父子相承得修生之道父慶賔年百歲餘常有少容周遊五嶽諸山一旦雲龍下迎白日升天靈飛感父升天之事精修大道亦百餘歲當老君未誕而升天至商十有八世王陽甲踐祚之十七年庚申歲老君自太清仙境分神化氣乘日精駕九龍化為五色流珠下降時尹氏晝寢夢天開數丈衆仙捧日出良久見日漸小從天而墜為五色珠大如彈丸因捧而吞之覺而有娠今亳州天靜宫有流星壇即其處由是容顔益少神氣安間所居之宰六氣和平冬無凝寒夏無祁暑祥光照室衆惡不侵八十一年不覺其久至商二十二王武丁之九年庚辰歲二月建寅十五日卯時聖母因攀李枝忽從左腋降生仙傳所載皆云在胎八十一年唯內傳云上帝之師元君感日精入口因娠經七十二年剖左腋而生二說雖或不同然亦有由虞宣出塞記云老子復命胞中七十二年舉候九年則亦八十一年也是時陽景重輝祥雲蔭庭萬鶴翔空九天稱慶玉女跪捧九龍薦水以浴聖姿龍出之池因成九井按漢伏滔北征記云老君廟中有九井水皆相通故每汲一井九井皆動降生之初即行九步步生蓮花因指李樹曰此吾姓也老君嘗於多劫之前降生於北玄玉國李谷之間因以姓李今又降生李氏之家李木之下生而知其姓故指以示人非今方以李為姓也諡曰聃老君耳高於項厚而且堅下有垂珠中有三門天神之表與凡迥異故以為諡或作儋者漢字通用也故史記亦作太史儋如今儋州曰儋耳也或作耽者音訛也或謂其吐舌舑然而謂之舑此又傳聞之謬也名耳字伯陽或曰伯陽父者尊老之稱也一名雅字伯宗一名志字伯光一名石字孟公一名重字子文一名定字元陽一名元字伯始一名顯字元生一名德字伯文按九宫經三五經元辰經云人各有厄會若易名字以隨元氣之音可以延年度厄今世有道者亦多如此又列記云李君二千五百年輒易名字老君在世最久故名字稍多嘗告尹喜曰吾姓字渺渺從劫至劫非可悉紀也老君降生九日身有九變皆天冠天衣自然被體仍有七十二相八十一好七十二相者頭圓如天面光象日伏犀蟠起玉碗穹隆皓髮如鶴長七尺餘眉如北斗其色翠緑虎髭龍髯素結如絲耳有垂珠中有三門高平於頂厚而且堅河目日月方瞳緑筋鼻有雙柱準骨隆隆口方如海脣赤如丹氣有紫色其香如蘭齒如編貝其堅如銀數有六八上下均平舌長且廣形如錦紋其音如玉其響如金顴高而起頤方若矩日角月淵金容玉姿龍顔肅肅鳳視間間額有光象三午上達天庭平坦金匱充盈頰有白志頤有玉丸項有三約鶴素昂昂垂臂過膝手握十紋其指纖長各有策文爪有玉甲身有緑毛胸有偃骨背有河魁臍深餘寸腹軟如綿心有錦紋腹有玄志眼有輪文足蹈二卍指有乾坤身長丈二遍體芳香面方而澤上下三停體如金剛貌若琉璃行如虎步動若龍趨此其相也左扶靑龍右據白虎前導朱雀後從玄武頭蔭紫雲足履蓮花項負雙景五明耀日身有圓象動照九天兼全仙相光色奇妍總八十一謂之好也寄胎八十一年極太陽九九之數生而皓首故號為老古人稱師為子又子者男子之通稱故號老子一說老者長年之稱子者幼稚之號故謂之老又是初生故謂之子又乃白首故兼二儀而稱之曰老子也唐尹文操論曰老子者即道之身也迹有內外不同由能應之身或異也其內號者即至一真一玄一皇一元一帝一太一天一正一等是也至一者妙而無質也真一者淳粹湛然也玄一者通靈不滯也皇一者光明無上也元一者萬道之長也帝一者百神之聖尊也太一者長生之大主也天一者司陰之真宰也正一者明威之法王也謂兹九義同出異名既契玄機故咸言一矣其外號者則鬱華大成廣壽廣成隨應赤精録圖務成尹壽真行錫則燮邑育成經成郭叔等子是也鬱華者道化光盛也大成者玄德普資也廣壽者怡神術贍也廣成者攝生功博也隨應者感通無礙也赤精者矜靈丹著也録圖者符命冥合也務成者庶績充遂也尹壽者公正身康也真行者精誠淳粹也錫則者仁惠有方也燮邑者風教變俗也育成者牧養克諧也經成者正訓常全也郭叔者廓清纍代也此並隨教得名既降為國師故同稱子也居于東國苦縣瀨鄉曲仁里渦水之陰按史記云楚苦縣瀨鄉曲仁里人劉向列女傳云陳人皇甫謐高士傳云楚之相人家于渦水之陰或曰譙人瀨或作厲其說不同者蓋其地乃太皥伏犧氏之墟宛丘之側顓帝亦都焉禹貢屬潁州之分商湯復都之謂之亳商周武王克商封舜後媯汭於宛丘是謂陳國熊繹始封地連於陳為楚國魯宣公十一年楚滅陳申叔時諫乃復立之昭公八年楚又滅陳遂縣之至十三年楚復封陳至襄公十七年卒為楚所滅陳遂屬楚楚頃襄王為秦所伐失兵鄢郢都陳秦滅楚陳屬潁川郡至漢為淮陽國居陳領九縣如苦相譙厲等皆屬焉後漢章帝時改為陳郡今為亳州也苦縣徐廣云晋名谷陽齊省谷陽隋復置焉苦縣東谷陽故城即古之厲鄉城也縣東北有古相城即楚之相縣也戰國之末并相為苦唐乾封元年改為真元縣今為衛真縣北近渦水東四十里有古譙城即漢之譙縣也故老子或稱陳人楚人相人譙人也厲鄉者即瀨鄉也左氏傳云楚成王伐徐秦師伐厲以救之杜預云厲楚之與國也地理志云屬淮陽王莽改曰賴陵裴松之北征記酈善長水經闞駰十三州已并圖經皆作賴為其地近渦水俗遂轉而為瀨焉聖母既誕育道身將返天闕復元君之位欲示世人以師資傳授之道乃告老君曰夫人受生於天地中有清有濁氣之清者聰明慈仁氣之濁者愚癡凶虐明者因修以成性昧者恣欲以傷命性者身之原也命者生之根也是故修學之人鍊身於九丹解結於五神引氣於本生滅根於三關九鍊十變百節開明胞結斷滅乃知本真而成上仙也若不修學則邪魔入身百痾競生死不盡命痛乎難言夫仙由心學心誠則仙成道貴內求內密則道來能致靜以學真積虛以通神則仙日近矣苟心競神勞體煩不專動靜喪精耳目曠眀徒積稔索道道愈遠也寄寓天地間少許時耳若能攝氣營神辛苦注真久將得道則與天地共寄寓於太無中也能洞虛體無則視之不見聽之不聞乃與道合真矣老子曰今涇跡塵寰欲常存不死隨世度人可乎元君曰吾有祕寶非聖不傳有能修之可以長存老君曰願聞其致元君曰至道淵奧深不可識匪有匪無匪聲匪色視之不見搏之不得囊括天地至人無極近在諸身莫知能測能知其則是謂玄德老君曰其道亦有衛以致之乎元君曰道者虛通之至真術者變化之玄技道因術以濟人人因修而會道則變化無窮矣夫道之要者無為而自然術之祕者符與氣藥而已符者三光之靈文天之其信也藥者五行之華英地之精液也氣者陰陽之和粹萬物之靈爽也人雖得一事未畢要資符藥道乃訖此吾之祕寶爾能兼之可以長存度人無量矣老君曰身者得道之器也氣者致命之根也根拔則命終器敗則道去今欲修之令命固道隆可得聞平元君曰人禀骨肉之質猶陶家坯也坯木冶則敗速身未煉則命促理固然也縱使德冠群有神疏太玄而身猶恐未免乎老死夫何故哉由化致然不得不然也惟藥能煉形符能致神神歸則心通而性逸形堅則氣固而命全然後化氣變精洞入無形飛行虛空存出自然乃能長存得道之人雖遭劫交天地崩淪而灾不能及所以貴乎符藥者由此也老君曰服神丹而得長生者神靈佑之乎將藥之力也耶元君曰長生之功由於丹丹之成由於神故將合丹必正其心不履罪過神明佑之作丹必成神丹入口壽命無窮已天地明察道歸仁人萬兆蠢蠢名曰行尸不信長生之可學謂為虛誕從朝至暮但作求死之事天豈能强生之乎恣心盡欲奄忽輒死千金送葬何所益哉神丹道成不惟長生而已亦可作世之寶也知此道者亦安用天下為人有以國易吾方而非其人不傳也老子稽首曰願聞其㫖元君乃仰天而嘯倏忽有紫雲如蓋自天奄至中有五色藴光明八達仙人涓子侍之元君披出神圖寶章變化之方還丹伏火水汞金液之術凡七十二篇以授老君其文曰一為玄白生金公太陽流珠入華池斤內五兩文姜赤鹽白雪成雄雌五符九丹得之飛真道在此人不知五符者一曰玄白二曰金精三曰飛符四曰金華五曰三五靑龍精九丹者一曰白雪九轉還丹二曰雌雄九轉還丹三曰金液九轉還丹四曰白華九轉還丹五曰丹華九轉還丹六曰五色九轉還丹七曰泥汞九轉還丹八曰金精九轉還丹九曰九鼎極耀還丹此九丹得一則可以長生不在遍作也神丹之道皆三化五轉至九而止得服之者與吾等矣神仙之道不在祭祀禱鬼神不在導引與屈伸不在呪願多語言不在精思自苦勤長生之要在神丹知之甚易為實難于能行之可長存此之道成立得仙吾亦學得非自然老子再叩頭稽首曰九丹之道既奉慈訓矣切聞求仙不得金液虛自苦辛願示直要元君曰大哉子之問也九丹金液同為升天之道然九丹中金液為上所以爾者服九丹之人或三年或二年或一年或半年或百日六十日三十日十日三日乃有仙官雲龍來迎惟服金液者入口則身色紫金立生羽翼升天為仙官矣凡欲服之維先長齊斷穀一年乃得服之自非有玄中之籙及不死之名者終不得聞九丹金液之道也其法依前合丹金成而液之其道畢矣此吾之祕寶也凡有千二百訣吾於往劫塵沙天地之先受之元始天尊奉而行之得居無上元君之位吾昔以傳至真大聖天帝上帝太微太一元君今又授汝爾其勉之老君受記復請曰萬兆藝藝動之死地今以此道廣濟如何元君曰悠悠之徒耽榮嗜欲死者若墜石投川往而不返甚可痛傷然道不虛行必授真人此道高妙祕於九玄瓊臺雲笈萬年一行貽諸玄籙玉名耳自非宿命骨相合仙之人不得聞也愚人多過為得違天科而妄傳乎吾道盡止將去矣當遣太和元君語汝言訖即有千乘萬騎五帝上真擁八景玉輿迎之升天今太清神丹經其法乃出於無上元君其神能調和陰陽役使風雨進退五星斟酌寒暑驂駕九龍十二白虎天下衆仙皆仰隸焉人之生死咸由之猶言服丹所致也老君乃遠遊山澤求煉神丹行經勞山果遇太一元君乘五色班麟從官十人老君從之問道元君曰道之要在乎還丹金液耳遂且授祕訣他年之歷山復會大一元君因謝神丹之方元君曰君是群仙之尊萬道之主玄靈祕術本玄分也奚辱謝焉老君曰凡民無知死者甚衆撫心泣血見之傷悲欲給以神藥令皆長生可乎元君曰不可生道至重必授大賢及孝順篤信之士天生萬物有善有惡善者宜生惡者宜除不足給藥令皆長生也君已知之不可輕泄聖紀讚曰老君體寂太無德資妙有成道億劫造化萬天自然而然不由積學降九皇而設教委歷帝以為師獨立紫清誰與為先今乃請聖母而寄學從元君而訪道欲顯真道玄妙非學不成神仙高奇修之可獲俾夫尊師貴德存牝守柔表上聖之靈規垂將來之妙範所以隨機示教奬善懲迷文始抱朴既述之於前今更讚之於其後老君以神仙之道必假修煉欲垂法以勸來世故存真抱一煉丹復氣然後乘空陵虛出有入無隨意所適人莫能測一日乘白鹿履庭檜而升天混元聖紀卷之二
