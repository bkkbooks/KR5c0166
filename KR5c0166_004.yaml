front:
  text: 混元聖紀卷之四與四
  hash: sha256:12e8a1793eb4c0cbd5d11c445b62507763804896ef76423e3f24b948ed21e58f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_HFL_004-001a, image: hfl/0552/0552-004.png}
body:
  text: 宋觀復大師高士謝守灝編老君謂尹真人曰子昔欲從吾遠遊今道已成可以遊觀八紘之外也乃吐八方隱文授之喜奉受訖即致八景雲輿老君乘輿駕五色神龍建流霄黃天丹節蔭九光鶴蓋前導十二衛官神丁執麾後有九萬飛仙驂控飈輪師子啓途鳳凰翼軒策空東遊真人與四天王從焉至日窟常暘之山掇扶桑之丹椹散若木之朱華觀碧海挹東井過鬱池宫暘谷神王東海靑童仙衆陳丹椹朱實金津碧醴次登祖山觀芝田採養神草息蓬萊宫復南遊風山登靑丘過紫府太元夫人紫府先生獻九光甘液白文王英靑林白子此山一名蕭丘出九光芝英火浣之布登長離山越赤津入太丹宫南極夫人設瓊花玉酒赤靈火棗至絳山觀流火之鄉息朱陵之闕太和玉真華蓋上公列炎岡朱髓飛丹紫桃雲浪之液而奉焉乃西遊龜臺入七寶園觀飛玄紫文過流精闕九靈金母太素元君進玉文之棗其實如缶命侍女陳返魂靈香玄光碧桃金紫交棗次泛弱水登鳳山挹玉池息昆吾山白帝天君採七名石芝流精玉膏金光丹醴進焉北遊崆峒山過洞陰宫北極真公獻千結神草玄雲李空洞瓜其瓜四劫一熟登玄丘觀朔陰八煉池息廣寒墟太玄仙伯奉絳樹丹實三玄紫棕進焉復登中嶽崑崙山此非人間之五嶽海上之神山也東嶽曰廣桑南嶽曰長離西嶽曰麗農北嶽曰廣野中嶽曰崑崙遊玄圃瑶臺入閬風觀七寶瓊林聆九苞鳴鳳盻日月星辰交輝下覽四天下如指掌上有金臺玉樓七寶宫殿晝夜光明天帝神王之下遊處也一面有二百四十門有珠玉七寶之林紫華丹實碧葉瑶英琴瑟相和皆應律吕太玄九室真人居焉皆自然天厨出入任意天伎雅絶樂難可勝實宇內之清都神真之盛觀也尹真人初受童真之任隨侍老君遊此宛利天下五嶽名山洞天宫觀及四海江河洞源水府其主者或稱聖帝或稱真王或公或侯有所咨啓多論二儀三景陰陽氣候劫運賒促及帝王命録修短安危興廢兆人禍福並學道進仙階級黜陟之事調和氣序抑消陽九百六灾會之法或問道德宗源希夷之㫖老君皆如所請酬答言辭隱奧不可測識為西王母說常清靜經亦此西遊龜臺之時葛仙公曰吾昔授之於東華帝君東華帝君授之於金闕帝君金闕帝君授之於西王母西王母皆口口相傳不記文字吾今於世書而録之也老君謂喜曰吾將與汝上朝玉晨遊歷帝鄉作是語時靈音八會雲氣四合冉冉升虛遂遍歷九天諸天帝君皆來迎老君老君入其宫宇設瓊英玉實月液雲漿靈芝仙果光華映席天樂繁會靈唱妙絶諸天帝真皆禮拜請問自然無上玄妙至真帝一之道已而上元大有真公中元太極仙公下元太清仙伯乘碧霞黃素雲輿駕蒼虬麒麟師子張交輝流霞鸞鳳飛鶴之蓋仗日精命真之旆月華命魔之節星光命仙之旗侍從神仙靈官十五萬謂上元七萬中元五萬下元三萬所乘駕及蓋旆旗節之類皆各有等降各持香花浮空而至稽首拜迎老君上升上清日闕丹城蘂珠宫老君乃命喜朝拜高上玉晨太上大道君於是道君賜喜環剛丹果隱伏龍芝珠英玉醴共一十二事乃從老君下降于天水之靈山遂之西域今秦州啓靈山也見有西升臺聖容殿並在巖下初老君去周嘗西化大秦安息月氏烏戈竺乾等國號古先生其國王及臣民皆奉教行善變强獷之俗崇揖遜之風乃還中國按唐通典云大秦一名犁靬亦曰拂籃去長安四萬里其地平正有四百餘城小國役屬者數十其人長大有類中國其王無常人皆簡立賢者老君先已開化諸國世莫知之故傳記不載今因將尹真人行化遂有記述流傳中國劉向列仙傳云老君好養精氣居周久之去入大秦至尹真人傳云喜與老子俱遊流沙時然後得俱遊也葛洪丹序云洪少欲詣拂籃備聞海外諸國風境說大秦國清淨奉道人民淳和王法甚正見商賈者皆目曰周人又唐時遣使入朝戴冠穿鞾嘗謁老君像捨錢修觀寫明皇御注道德經黃帝陰符經歸其國足驗老君嘗至其國今復與無上真人尹喜至罽賔行化暫止于近郊山谷初清和國王即東極始老國也生天為妙梵天王每遇老君遊行經歷即遙拜發願云惟願慈尊濟度弟子於當來世常與弟子為師於當來世得為高真其後享天福報盡降生人世尚以餘福得為羌胡之主即罽賔之煩陀力士是也既生人間忘其宿命殺害無度頻出遊獵老君不忍違其前願乃於此教化之時王出獵至山有五色光氣貫日怪而尋之乃遇老君王問曰公是何人老君曰吾是修道之士至人通玄宄微應諸天諸地異域方言以至異類音聲莫不洞解故與胡王問答皆隨其國之方言而與之言當時隨侍衆真即以正音紀録之還傳中夏後人目曰化胡經也猶齊人能為楚人言者遇楚人則操南音與之言及其紀之於册則必用齊語矣事出一人之手不待翻譯也王曰道是何物誠為我說之老君曰道者元氣虛無混沌自然無表無裏無有高下天地從之而生萬物資之而形不得而名故强為之稱曰道也王曰吾自建國以來不聞有如是事公何所從來而居此乎老君曰吾是萬氣之靈根神仙之道元在天為衆聖所尊在地為萬國師君天上天下皆吾百官回神無極造化方圖分布日月星宿虛玄步天量地制作經文天地萬物係命道君有形之類皆從道生吾生於無形長於無名降為帝師隨世教化今來自周也老君知王頑獷難化不達謙遜之辭故以直告之庶其警悟宿因耳王曰未審在彼國土以何法教人老君曰吾在中華常以道法開化王曰何謂道法老君曰道法者乃太上靈寶生於天地之先大無不包細無不納天不得此無以耀明地不得此無以表形神不得此無以入冥人不得此無以生成是以萬物藝藝以道為根蛇得之為龍禽得之為鳳獸得之為麟凡人得之為仙人能修之逍遙太空改易五內變化形容役使鬼神隱顯無常上仙之道也王曰所說靈寶者固為希有然我智力淺劣不任是事不知今於此國宜以何法設教老君曰觀王風俗人懷悖戾更相誅戮虐及含生邪淫貪欲日造惡業自取沉淪一欲生得全壽死無殃考宜修浮屠之法內外剪除而不傷形體故曰浮屠也王曰其法云何老君曰先去人我止烹殺衆生蠢蠢皆愛形命王今好獵殺害無度天道好生甚惡殺傷王欲保壽願勿畋獵王艴然變色曰異哉是欲亂我風俗乃疾我遊獵禁我殺生耶我自有國以來代代弋獵亦保天年公有所須當遣供給毋出此語亂我國人使之失業遂馳還後出獵復到屈山又遇老君問曰殺有何罪乃禁我獵身死空無將何受報老君曰王之好獵不問四時不避胎養是何逆天暴物法當滅祿奪算天有司殺之神紀人過惡一朝命終地司追其魂神禁繫考掠永淪罪獄王曰未知殺外更有何罪老君曰殺罪至重積寃成業五道四生緣對不絶如驕恣暴逆耽酒淫色貪婪欺罔信用妖巫亦皆有罪死入地獄魂神受苦王欲改過信奉浮屠生則富貴康寧死則魂魄不拘喜悅無量不亦善乎王曰甚善公試為我分别說之老君曰浮屠者削去鬚髮著瓌色衣偏袒徒行以制其形持戒止惡中食悔過常習止觀以檢其心能修之者上可全身保國下可免離苦趣王曰善則善矣但我智識淺劣積習既久未能持戒止觀又不能惡衣徒行然軍國事重猶希福祐請且修中食漸省殺獵以化國人可乎老君曰可王曰未解其方請公教之老君欲化其國令悉信向乃謂王曰今請為王設中食願率群臣衆庶悉來會食因觀法度王曰公縱神聖安能供給吾國之衆老君曰願王枉駕率衆俱來勿以為慮王乃歸國尅曰聚會老君散五雲於五方山谷隨其方色化為宫殿陳設帷帳飛仙百億悉為給使天厨飲食不可稱數王密遣人覘之方大驚異遂舉國俱來就會七日滿散并以種種珍寶綵繒賜王遍及臣庶王啓老君曰我等已見儀法欲設中食願率徒衆皆來老君曰吾衆頗多恐王不能供給王訝曰我大國無所不有何以不能供給耶請尅期而會老君謂尹喜真人胡性堅强心猶未服可因此會方便化之乃勑海內群仙皆來赴會來者相續於路月餘不絶王倉庫將竭齊未及半乃生悔心玉召群臣謀曰道士徒衆何乃果多耶豫設中食本祈益國今乃傾我倉庫恐是鄰敵姦謀故遣來害我國不然必是鬼魅若不早圖恐彌損國汝等急宜焚殺以全豫國於是群胡積薪外郊煙焰亘天乃將兵圍繞老君及隨侍仙衆驅逼入火老君與諸仙怡然赴火隨煙出沒身更精明又令左右沉之深淵老君入水淩波越流身放光明王益發怒又燒大鑊令煎煮之老君欣然入沸湯中談笑自若胡王始驚知不可殺然業已行此恥不能殺乃急遣使以告鄰國曰有一妖魅或老或少變化不常處吾國山谷中我投之水火皆不能殺恐更興妖害及諸國請速興兵相共誅戮旬月之間胡兵並集共圍老君吹具扣革彎弓按劍四面合圍于時老君宴處圍中怡然不為恤亦無怒意俄而風雷四合天地震動胡兵矢石皆自反中戈矛摧落金革無聲胡兵驚懼一時奔潰胡王戰栗調群胡曰其老翁等安知非大聖人今欲事之何如群胡曰大王既已燒沉煮射皆不能傷豈非聖人耶但恐其積怒將滅王國願王早為之謀王曰誠然吾今正爾自詣其前求哀請命庶蒙赦宥於是面縛至老君前五體投地叩頭千百求乞哀宥是時老君欲堅其信心語之曰吾是太上老君生乎無極之先經歷塵沙劫運度人無量為三十六天之尊統領三界制御萬靈報應罪福莫不由吾哀汝造罪故來行化汝恃貴驕不能遵依邀我中食返相折辱汝積惡鍾身萬悔何及諸天神兵將滅汝國絶汝種類語未竟胡王衆等皆見天丁力士神王甲卒不可稱計乘龍跨虎俱在空中怒聲震地王及庶等驚怖哀號叩頭出血跪伏謝曰我生邊戎受性狂愚不信道法凌辱天尊伏量此過萬死尚輕一國同誅不足償責惟乞赦罪重賜全活願受前法至死不悔舉國奉身不敢終怠老君曰且止且止雖叩頭泣血猶未可保恐汝後悔當何以為質誓耶王曰若天尊大聖見赦我罪與我更始請以舉世男女一世不婚不娶髠剃鬚髮以奉教法若違誓約當身死為證老君曰可矣汝今誓重諒可憫也然汝凶惡日久甚不足恤吾滅汝國土令入地萬丈化為微塵猶彈指耳不足為難但吾好生故赦汝當一如吾戒不得後負王拜曰敬奉命既而神兵匿景天地清寧老君乃戒王曰今釋汝罪汝宜奉浮屠法永世受福常生人道王及群胡莫不懼喜頭面著地合掌禮謝老君於是注慈惠光降照王身王忽追省前因悔悟悲泣涕淚俱下再拜叩首曰我從無量劫來惡根未滅雖得超生旋即墮落頭出頭沒如汲井輪不遇天尊大慈仁者憫念宿緣特賜救拔終淪惡道無有出期今願棄國入山以奉太戒為國人謝罪祈福終希度世永離輪回老君曰善汝欲居山學道妻子群臣任其去留留者令奉五戒十善隨入山者則奉六戒王曰唯唯是誠所願老君曰汝審欲聞法者可清潔修齊齊竟同集當授汝法王禮謝而退即捨王位傳授其子乃率國中臣民男女發善心者一萬二千五百人俱時來至稽首長跪以俟尹真人適赴天帝中食而還項負圓光足履蓮花諸仙玉童玉女香花天樂從空而下老君指尹真人示胡王曰此吾之弟子無上真人命為汝師乃令王與偕來之衆先懺悔三業六根自從無始以來所造陰罪陽過十惡五逆信用邪見外道一切罪犯以至積世父母眷屬所造諸業悉皆懺悔懺悔已畢乃謂汝等各各攝念靜神諦聽吾言今為汝授五戒十善五戒者一不殺生二不飲酒三不偷盜四不邪淫五不妄語能持此戒當有二十五戒神護之十善者一曰孝二曰忠三曰慈四曰忍五曰施惠六曰精勤七曰供養八曰信向九曰勸化十曰靜定能行此者當有十天善神衛之矣授已即復為王等說十戒十八戒二十四戒二百五十戒女人五百戒又令一歲正月五月九月謂之三長月齊又每月六齊初一初八十四十五二十八二十九日謂之四天王齊又每月十直齊初一日念無量太華天尊免火車地獄之苦初八曰念玄上玉晨天尊免溟泠地獄之苦十四日念度仙上聖天尊免鑊湯地獄之苦十五日念玉寶皇上天尊免風雷地獄之苦十八日念好生度命天尊免銅柱地獄之苦二十三日念玄真萬福天尊免火翳地獄之苦二十四日念太靈虛皇天尊免屠割地獄之苦二十八日念太妙至極天尊免金剛地獄之苦二十九日念真皇洞神天尊免普掠地獄之苦三十日念玉虛明皇天尊免三界寃報之苦是日十方諸天下降觀人善惡當一日一夜素食誦經可免九獄之苦三界寃報之罪不能齊者許食自死肉仍謂四衆曰王今已得受度我將行化諸國王復再拜啓曰天尊大聖今將遠遊覬集良難舉國受恩慨巒無所欲請天尊洎我師徒衆行道三十日然後送别唯垂許可老君曰善王遂與世子群臣人民大建道場廣陳供養歌唱詠讚會日告滿猶欲延留真人謂曰善哉善哉供養矣吾將侍師行化諸國弗可得而留也於是胡王攝衣而起跪行而進再拜長跪合掌白言我師將捨我去無所咨請願授要㫖終身受持真人謂曰吾語子夫戒律雖非至道誠為入道之階能堅持不懈泰定從此生智慧從此起九層之臺起於纍土合抱之木生於毫末千里之行始於足下又曰汝國風俗獷戾阿修羅之氣習未除我師立教柔弱處上汝惟不爭故天下莫能與之爭汝能無爭三昧則於見在世當為人中第一未來世中當證善果王受教已稽首禮謝真人重告王曰子來前子知身相虛假萬有非實乎汝欲求寂滅之樂當除垢止念不見可欲一塵有著即纍汝性王於言下開悟叩頭拜謝曰唯唯真人遂偕諸仙衆侍從老君出罽賔境合境臣民俱哀戀拜送王即與衆入山修道遞相訓導老君遂至條支國其國王奉事外道魔師曰謂是聖人其徒三千餘人皆從官供給凡十二年廣行幻術王敬信之一日語魔師曰國中大山當道妨人行路壅遏源流時作洪水師等能為却之否魔師曰可明日為王却之時老君適至坐於樹下觀諸魔師各作奇術兩手作訣山為微動老君知王可化謂尹真人曰魔師作法欲除此山山若果除王必信之謂真神聖不可復化矣乃令尹真人遙以神通制之山遂不動魔師自相謂曰向者已動今返不動莫有異術之人禁制之乎遂競上山巔四望尋覓遙見真人乃急追捉送王王問曰汝是何人真人答曰太上弟子王曰太上何人耶曰太上聖人王曰汝太上今安在曰自罽賔國行化至此近在山下王即勑左右迎之既至王宫王即延坐問曰人言老翁是聖人吾國有一大山妨路萬民患之魔師却之不能願聖者謂我除之老君曰諾王曰不知須幾人力曰此小事也何須人力魔師恐王因此不復信用更求自却王曰善於是魔師三千人俱作法用盡其術終不能動王曰師法盡矣請老翁除之老君即把九節之杖撥而去之如去塊土水乃順流地亦平正王叩頭再拜求為弟子不復奉事魔師舉國臣民莫知敬仰咸願皈依受化老君還於樹下王請就館王宫老君不從王益加信仰於是匍匐膝行叩頭請問曰竊聞聖者不違人心伏願為說妙法老君曰吾聞王者悉非常人德蔭萬物行合乾坤開化人天為國之君君能行道國土長全寢甲休兵安濟萬民於世無道國土傾淪多嬰灾難毒及臣民王宜盡心奉道求真身無灾害嗣續詵詵鄰國畏服姦惡不侵命壽長永與天相傾月不夜蝕日不晝昏父不哭子臣不背君王宜體之尊道敬天王曰願乞哀憫留神賜教示以道要老君曰恐王驕蹇易生退心未可輕付王於是召群臣萬民七日七夜修齊供養各持絲繒黃金以為信誓手持香花叩頭百拜殷勤三請伏聞大聖開化罽賔遠近諸國咸受正真我今劣弱未蒙垂慈願剖大道開示愚民使舉國人民終世奉行老君知其心至乃謂曰吾已令弟子無上真人與諸國王為師演說經戒刳心制形生得安穩無有夭橫死得滅度不墮惡趣王能敬奉獲福無量王曰唯唯老君曰善王可還宫焚香作念於是真人應見化身於王宫殿坐寶蓮花為王授十八戒王歡喜合掌禮拜願棄國家不顧身世持如是戒不敢有違又為王天人群臣若男若女初發心者說三戒為已伏心者說五戒王復問曰太上聖人先下東方不知以法教化莫亦如今所授乎真人曰我師隨世設教昔在神州以神仙之道教化天下上自三皇次及五帝修之皆得神仙王曰浮屠神仙有何差别真人曰浮屠者回心向道剪滅六根以空寂為宗至於神悟性靈得證佛果然命過形亡終歸菽滅永為陰靈而已神仙者修真證道形神俱妙顯化飛升出有入無長生不滅胡王曰何不以此教我外國使得同然耶真人曰生道至重上天所祕非夙植道本安得易聞胡王禮謝遂建精舍造像供養老君乃與真人行化諸國遂至于闐國于闐先聞老君將至即率國奉迎於國南渠山之上一名檀特山營造精舍延請老君居焉老君宴處其間不飲不食王與近臣朝夕咨問求乞所聞老君授以齊戒之法王曰聖師所言止有齊戒還更有餘教耶老君曰吾道無量無邊順俗通時因機立化在中華時行無上正真無極大道修習之者度世延年行備功圓克登仙果乘龍馭氣白日升天說三洞真經三十六部大乘次法萬八千篇上至帝王下及凡庶修奉之者隨其淺深受報登仙或為上聖或證高真品秩崇卑三十七等飛行自在變化不測又有金液神丹修煉之道吐納咽景養氣之訣柔體調神導引之法三奔五煉嗽御之經及採餌靈芝神草柔金水玉之方至於隱天藏月變景煉形役使鬼神制御天地符圖寶籇玉璽金書萬術千經開化後學皆因宿根清淨禀氣淳和好道樂真精誠不退身心相應方堪付授如汝國人積生剛徑宜以浮屠之法制煉身心如能精勤不懈命終之後受福生天道法玄妙深微縱教於汝亦難解了非吾所惜也良由衆生自無始以來慳貪嗜欲啖食無厭養其膿血彌益罪根生老病死惡風毒氣百病來侵受生禀質各各不同日夜循環萬生萬死或居母腹不得出生或至分娩即便死亡或一歲二歲念念改張一日之中無少安樂良由廣食穢濁骨肉薰蒸損傷臟腑金玉化銷身形難久吾不飲不食抱道自然變化無方長生不死常說經教開度衆生凡夫遇迷不能信用吾常憂念憫痛在兹故使持齊减其病苦能行之者獲福無量王曰聞有佛陀近在罽賔出世傳法度人莫是聖師否老君曰此浮屠教法西域諸國國王人民咸已歸依止殺除淫調柔其性當得果報常生人天今汝奉行不得懈怠內外清淨心照圓明罪既不生福亦自長歷劫之中常得快樂王大信服敬禮受命混元聖紀卷之四
