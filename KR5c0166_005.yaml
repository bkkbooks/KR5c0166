front:
  text: 混元聖紀卷之五與五
  hash: sha256:3d539b6876d7ffee83d113d5914930105cb86dbe9d62647e315434194d8fd272
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_HFL_005-001a, image: hfl/0552/0552-044.png}
body:
  text: 宋觀復大師高士謝守灝編是時老君在于闐國謂尹真人曰吾所行化遍此西方攝伏外道令歸正法其諸國土已得度者及未得度者我於此時咸令集會俾其開悟歸入法門語已即有九色神光遍照西方無極國界光所及處無有遠近俄頃之間毗摩城中自然寬平地化金色建大法座百寶莊嚴三界衆真諸天靈神俱時來集時于闐國王及罽賔國條支國安息國大月氏國朱俱半國渴叛陀國護密多國骨咄陀國俱密國解蘇國𢪛汙那國久越得犍國悒怛國烏拉喝國失范延國護時健國訶達羅支國波斯國疏勒國碎葉國龜兹國拂籃國焉耆國弓月國瑟匿國康國史國采國似沒盤國曹國何國大小安國穆護國烏那葛國尋勿國火尋國西女國大秦國波羅奈國帝那勿國伽摩路國乾陀羅國烏萇國曇陵國多勒建國大食國殖賦國數漫國怛沒國俱藥國嵯骨國迦葉彌羅國迦羅國不路羅國泥婆羅國獅子國拘尸那揭羅國毗舍離國劫毗陀國室羅伐國瞻波羅國三摩怛吒國嗚茶國蘇剌吒國信度國烏利尸國扈利國色伽栗國漫土漫國尼拔國越底延國賒彌國小人國軒渠國陀羅伊羅國狼揭羅國舍衛摩竭提國臨倪國天竺國等王已上共計八十國土按通典云塞王居罽賔國在度山之西塞種分散為數國自疏勒以西北休屠損毒之屬皆故塞種也損毒即婆羅門國或曰摩伽陀漢謂之損毒亦曰身毒顔師古云身毒即天竺也塞種即釋種也蓋胡音有輕重也身毒有别國數十如舍衛波羅奈之屬雖各小異而俱名天竺故有五天竺亦曰五印土及諸羌酋部落不可勝數遙睹光相妙麗希有晝夜瞻仰歡喜讚歎老君運妙有神通悉皆攝受令俱得至道前老君宴坐寶座之上諸胡國王及其后妃眷屬各各燒香散花奏樂圍繞禮拜供養願聽法音老君乃為說經老君說經竟復告曰汝等常當皈依大道信奉佛陀時舍衛國王摩竭提國王等按通典云摩竭提乃天竺之屬國其都臨恆河有山曰靈鷲胡語曰耆闍崛山蓋有靑石山頭似鷲鳥故以為名出班再拜胡跪請曰敢問皈依大道信奉佛陀其法云何修何恭敬老君曰善哉問奉吾法者當作淨舍恭肅無疑朝夕焚香傳授經教念念相續自悟悟他興建福田齊講開悟親近明師鄰愍後學厭離俗纏不矜功德常思濟物願見明時念施法藥願道流行不妄興利不慕榮觀不欺卑賤一切恭敬恤老矜孤平等親疏不妄殺戮永斷諸業常興道合能如是者見世獲福過去生天慶流後嗣時舍衛烏萇摩竭等國王皆願捨位歸心修道會中無鞅數衆悉發善心稽首唯唯信受奉行尹真人將侍老君復還中夏群胡留戀不忍辭决願留於此國土教化衆生祈懇再三真人曰汝等以相見我我本無動寧有去來汝必欲以身相見我者宜以五色土木金玉彩石置像吾身禮拜供養吾當應現為汝說法復告之曰汝等同受天地一元之氣而生皆具足真常之性於未來世究竟當得無上正真遍知至道善自護持無犯戒律過中勿食食已欲起先作念言處世界如虛空如蓮花不著水心清淨超於彼稽首禮無上尊念已即起時會衆等悉皆歡喜頂禮信受是時彼國又有外道九十六種善惑人心人莫能覺老君悉皆化之令歸正道老君將還中夏乃與群胡辭决胡衆攀戀不已老君不違其善意乃喻之曰我暫歸天上簡定人鬼之録尋當下降百年之外當遺佛陀生汝國土施教後人言訖老君駕八景雲輿尹真人乘白鹿群仙跨鶴仙樂駭空天神導從升天而去按唐通典西域總傳云于闐都葱嶺之北二百餘里去長安九千八百餘里户三萬二千東北至都護理所二千八百里東至鄯善千五百里葱嶺以東唯此二國為大後漢魏梁後周隋唐正觀中並遣使通中國自商昌以西諸國人多深目高鼻惟此國貌不堪胡頗類華夏自漢武帝至今中國詔令書册符節悉傳以相付敬而存焉國西五百里有毗摩寺云是老君化胡之所群胡仰望再拜哀泣倏忽之間無復影響乃各還本國惟罽賔煩陀王入山居精舍積修苦行堅持戒律化其國人捨惡從善死後上生梵天既生天已能知宿命每念前因願聞大道老君不違其願乃命尹真人下降授以真空常寂之道神仙解化之法後漢書裴楷上書於桓帝云臣聞宫中立黃老浮屠之祠此道清虛貴尚無為好生惡殺省欲去奢老君西入夷域始為浮屠之化浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血爾遂不盻之其守一如此乃能成道故知浮屠立教之初煩陀王率先捨國入山修行又能堅志不破戒律宜其終聞大道而證佛果也魏明帝製老君化胡經讚云混元未始老君為先長於太初冥昧之前無師無祖誕生自然渝真散朴乃微乃玄仰而攀之耀乎霄乾俯而察之深乎淵源敷二儀以布化燭三光以列天其性無欲純粹精也體虛抱素妙難明也撓之不濁澄之不清幽之不昧顯之不榮誰謂天高懸象可標誰謂地厚重泉可洮然道也標之不高洮之不浚物受其形莫鑑其源人禀其中莫識其全美哉乎道為萬物之宗天地之始吾欲書之非筆可紀吾欲體之無形可擬又曰深愍後世託下於陳為周柱史經九百年無極之際言歸崑崙化被胡域次授罽賔後及天竺於是遂遷文垂後世永乎不泯老君化胡已即升天至穆王四年甲申降遊東海至扶桑會大帝校集諸仙品位高下復分身降于西海王蘇鄰國號長生甘露無上醫王大光明使度化人天神鬼凡教法所未暨處皆令得度俄復登天穆王少好神仙之道感西王母降甘吕又獲八駿之馬王乘之命奔戎為右造父為御導車涉弱水魚鱉鼉為梁遂登春山觴王母於瑶池之上而歸在位五十四年壽一百四歲時尹喜既適流沙其草樓在終南之陰王追慕靈跡命駕諸馬為修觀建祠延杜外等七人為道土以奉同事冲字玄逸間居幽室吟詠道德常攝護氣液吐納光華經二十餘載忽展真人降其靖室將侍者二人捧碧玉函立於左右沖拜手求哀蒙授以九華丹經一函謂沖曰老君與文始先生於東海八渟山召大帝校集群仙天下山川洞室仙人無遠弗至時有地司保舉子勤勞老君勑我付汝仙方也沖依法令服身生玉光五臟充實僅容氣息又感真人李君授以太上素靈洞玄大有妙經沖復修之甚得其驗遂解胞釋結保命凝真領攝群神洞觀衆妙祛策虎豹役使百靈通達冥顯莫測其涯年百餘歲穆王十九年己亥老君遣上清元君下迎授書為太極真人任王屋山仙王文始先生之徒茅軌字公度少學天文兼通讖緯文始授以道經丹訣凡百餘篇皆蒙口訣文始先生登真之後即與隱士杜沖等同於樓觀修習時年二十有八絶粒行氣修煉神丹道成上升老君賜任太和真人命下統仙僚於杜陽宫軌時出遊帶神丹歷天下濟度有緣之人或煉金銀以賑會窮或行丹樂以救危厄求哀之人咸得其福利焉李脫學長生之道穆王時來居蜀金堂山龍橋峰下合九華丹丹成夫遊五嶽十洞二百餘年於海上遇飛陽君授水玉之道還歸此山煉藥成又夫數百年或隱或顯遊於市朝後復回龍橋峰下煉金鼎還丹丹成已八百歲矣蜀人歷代見之因號曰李八百凡三於此山學道故世人號此山為三學山脫妹名真多隨兄修道居綿竹中老君與玄古三師降授以飛升之道先於八百白日升天故其山號真多化即古浮山治也厲王二十一年甲辰洛陽人宋倫棲止樓觀抱一沖和不交人事日誦道德二篇數遍服黃精白术積二十餘年一日老君降其居仙童六人輔真執籙倫匍匐乞哀乃告倫曰吾有中景之道通真之經生乎三元之始出乎九玄之庭五德合慶六氣凝精負真保遐長生回齡子能修之立致雲軿出有入無徹幽洞明三光並照二氣齊靈變化適意飛升上清今以授汝倫拜受教乃開寶藴出靈飛六甲素奏丹符以付於倫倫修之乃自然通感常有童子六人更迎侍之洞視萬里察物如神能望岩伸步凌波涉險不用津路或化為鹿或化為鳩鴿翱翔原陸試人之心年九十餘以景王時授書為太清真人下司中嶽神仙之録焉彭宗年二十學道師事杜沖受道德五千言行雌一之道能三日三夜通為一息能一氣誦道德經兩遍厲王時年一百五十歲老君召為太清真人宣王時馮長任柱下史年四十休官入道常誦道德經居終南山老君遣真人彭宗駕白虎降其室授以太上隱書至平王時升仙為西嶽真人宣王四十三年老君過渭川王迎謁之老君曰歲星北入于燕周其衰矣後二年幽王立今汧渭之側有伯陽川是其處也是時郊野採薪者行歌曰巾金巾入天門呼長精翕玄泉鳴天鼓養泥丸時人莫能識老君曰此活國中人其語祕矣斯乃修習無上至真之道也幽王二年西周地動涇渭洛三川皆震老君曰周將亡矣夫天地之氣不失其序若失其序民亂之也陽伏而不能出陰迫而不能蒸於是其地震今三川實震是陽失其所而填陰也陽失而在陰原必塞原塞國必亡矣夫水土演而民用也土無所演民乏財周不亡何待昔洛竭而夏亡河竭而商亡今周德若二代之季乎其川原又塞塞必竭夫國必依山川山崩川竭亡之徴也川竭山必崩若亡不過十年數之紀也是歲三川竭岐山崩三年幽王嬖褒姒老君曰周亡矣昔夏之衰也二龍止於庭而言曰余為褒之二君於是布幣而策告之龍亡而漦在乃櫝而藏之比三代莫敢發厲王發而觀之漦化為黿童妾遭之而生女子懼而棄之宣王時有謡曰檿弧箕服實亡周國王聞有夫婦賣其器者使執而戮之懼而夜逃聞童妾所棄女子啼於路哀而收之奔褒褒人有罪請入此女以贖是為褒姒王愛之生伯服立為太子乃廢申后及太子宜臼老君曰禍成矣無可奈何尋為犬戎所滅平王三十三年老君復出關行化諸國遂遊西海至流麟等洲召十方神仙及初得道地下主者遊散仙人至孝至忠經歷度者八萬餘人校其功行授以仙職五等仙官二十七品隨高下付之乃復升天老君自與群胡辭决已逾百年煩陀王昔罽賔胡王也下生身毒國為王子是謂浮屠教主實莊王九年癸巳四月七日夜半從莫耶夫人右脅誕生周之四月即今二月也釋氏過去見在經云二月八日生因果經三月七日生瑞應經云四月八日夜半子時生按唐通典載晋宋間浮屠經云臨倪國其王生浮屠太子父曰頭耶母曰莫耶浮屠身服色黃髮如靑絲始莫耶夢白象而孕及生從母右脅出生而有髻墮地能行七步此國在天竺國中其國又有神人名沙律又後魏釋老志云釋迦即天竺迦維衛國王之子天竺其總攝迦維别名也初釋迦於四月八日夜從母右脅而生既生姿相超異者三十二種天降嘉瑞以應之亦三十二其本起經說之備矣釋迦生時當周莊王九年春秋魯莊公七年夏四月恆星不現夜明是也至魏武定八年凡一千二百三十七年又隋書經籍志云釋迦當生周莊王之九年四月八日自母右脅而生姿相奇異有三十二相八十種好捨太子位出家學道勤行精進悟一切種智而謂之佛亦曰佛陀亦曰浮屠皆胡言也華言譯之謂之淨覺云鬚髮皆卷多力善射年十七父王為納瞿夷耶輸鹿野三女為夫人生二子長曰羅㬋羅次曰憍陳如又十二年因遊四門見生老病死之相乃忽驚恐憶念前因遂棄家踰城徑入雪山棲止阿藍花樹下修尹真人昔所授之道胡人因名其樹曰菩提中國譯曰道也備歷艱苦六年道成身相金色類佛陀像號曰釋迦牟尼至匡王四年壬子二月十五日解化時以建子為正月昔之二月乃今之十二月也西域呼佛滅為涅槃金光眀經曰云何如來壽命短促年方八十此之謂也或謂老君是周定王三年九月十四日生佛是周昭王二十四年生穆王十三年滅蓋謂佛生滅在老君出關之前欲證非老子化胡成佛也按劉向列仙傳云老子生於商時又世本云在商為守藏史在周為柱下史隋薛道衡制碑云在文王武王時居藏史柱史之職倘生於定王時豈得在商為西伯藏史乎釋迦之生滅亦今昔所共知不可易也按魏書釋老志隋書經籍志並云釋迦生當周莊王九年春秋魯莊公七年夏四月恆星不見夜明是也至魏武定八年一千二百三十七年又云齊王簡棲撰頭陀寺碑云周魯二莊親昭夜景之鑑漢晋兩明並勒丹靑之飾今寺與碑猶在鄂渚梁昭明嘗編入文選矣五臣注云佛生於周莊王魯莊公時佛法漢明帝時來晋明帝時興故云二莊兩明夫蕭昭明學佛者也使其言或非詎肯編入文選也哉後人學不師古妄起異端忽欲遷其生滅之歲月躋十有三王越三百四十餘年而先之欺罔甚矣且自東漢以來胡僧入中國者不為不多皆已據實吐露矣至姚秦時已歷三百餘歲其間未聞有乖異之論而好勝之徒一旦輒欲盡廢前人據實之言而從己之說人孰汝信哉如唐書藝文志子録首叙道德次述神仙東載釋氏總目為道家之流未嘗别立門類也歐陽文忠公修唐書其載老釋事甚略惟天竺傳載其貞觀中來獻異物土地圖請老君像或者不悟猶謂老君何不化胡成道而乃成佛耶殊不知天竺言菩提即華言道也釋書亦言釋迦入山修道又言六年成道則知佛道可以通稱也猶中國修道登真之士不言成道而言成仙耳今據法華經提婆達多品云佛言我於多劫之前嘗為國王為求法故捐捨王位奉事仙人經于千載仙人為說妙法蓮華經今我具足六波羅蜜慈悲喜捨三十二相八十種好紫磨金色成等正覺故古襌師述序分云釋迦自引昔為求經捨國捨榮奉仙學道故有提婆達多品張無盡合論亦云佛事仙人者示善知識之難遇也仙人教佛者法以口傳而佛以心證也夫瞿曇昔於多劫之前已事仙人則知仙道其來久矣仙人為說經令得六波羅蜜以至成等正覺則仙人足以為佛師矣佛為一大事因緣故出現於世而說是經必無誑語為其不欺心不叛師而直述其所自來此其所以為佛也雙林傅大士世稱彌勒佛也猶以道為尊而釋次之故冠道冠而披袈裟天台寒山子文殊之化身也文殊乃七佛之師有頌曰家住緑岩下庭蕪更不芟仙書一兩卷樹下讀喃喃又云寒山一倮蟲身白而頭黑手把兩卷書一道而一德常持智慧劍擬破煩惱賊又嘆世頌云埋著蓬蒿下晚日何冥冥遮莫咬鐵口無因讀老經竊觀前哲皆知尊老子而重道德後世學者不宄本原乃毁師叛道良可哀也釋迦寂滅之後上生三十二天升賈奕天居延真宫為種民天之長號善惠真人按本相經云結習已盡心識兼忘超出三界升入種民本始經云佛滅上生三十二天常在素天奎星之位奎有三十六星其中一星是也第三十二天乃種民天之界曰平育賈奕天其天中有别宫號曰延真賈奕天之氣下生奎宿也後魏釋老志亦云佛者昔於西胡成道今在三十二天為延真宫主唐李淳風注金鎖流珠云善惠真人乃天竺國佛之後身豈無所據而云哉混元聖紀卷之五
