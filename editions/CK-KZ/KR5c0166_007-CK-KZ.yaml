front:
  text: 太上混元聖紀卷之七老君憫周衰之末俗益澆訛乃分身住世以拯救時遯迹陜河之濱不顯姓字人因呼爲河上丈人亦曰河上公嘗以道授安期生安期生後授馬鳴生馬鳴生授陰長生陰長生授爾朱先生後莫知其所傳
