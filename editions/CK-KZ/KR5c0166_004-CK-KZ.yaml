front:
  text: 混元聖紀卷之四老君謂尹眞人曰子昔欲從吾遠遊今道已成可以遊觀八絃之外也乃吐八方隱文授之喜受奉訖卽致八景雲輿老君乘輿駕五色神龍建流霄黃天丹節蔭九光鶴蓋前導十二衞官神丁執麾後有九萬飛仙驂控飈輪獅子啟途鳳凰翼軒策空東遊眞人與四天王從焉至日窟常暘之山掇扶桑之丹椹散若木之朱華觀碧海挹東井過鬱池宮暘谷神王東海靑童仙眾陳丹椹朱實金津碧醴次登祖山觀芝田採養神草息蓬萊宮復南遊風山登靑邱過紫府太元夫人紫府先生獻九光甘液白文王英靑林白子此山一名蕭邱出九光芝英火浣之布登長離山越赤津入太丹宮南極夫人設瓊花玉酒赤靈火棗至絳山觀流火之鄕息朱陵之闕太和玉眞華蓋上公列炎岡朱髓飛丹紫桃雲浪之液而奉焉乃西遊龜臺入七寶園觀飛玄紫文過流精闕九靈金母太素元君進玉文之棗其實如瓶命侍女陳返魂靈日玄光碧桃金紫交棗次泛弱水登鳳山挹玉池息昆吾山白帝天君採七名石芝流精玉膏金光丹醴進焉北遊崆峒山過洞陰宮北極眞公獻千結神草玄雲李空洞瓜其瓜四劫一熟登玄邱觀朔陰八鍊池息廣寒墟太玄仙伯奉絳樹丹實三玄紫柰進焉復登中嶽崑崙山
