body:
  text: 此非人間之五嶽海上之神山也東嶽曰廣桑南嶽曰長離西嶽曰麗農北獄曰廣野中嶽曰崑崙遊玄圃瑤臺入閬風觀七寶瓊林聆九苞鳴鳳盼日月星辰交輝下覽四天下如指掌上有金臺玉樓七寶宮殿晝夜光明天帝神王之下遊處也一面有二百四十門有珠玉七寶之林紫華丹實碧葉瑤英琴瑟相和皆應律呂太玄九室眞人居焉皆自然天厨出入任意天伎雅絕樂難可勝實宇內之淸都神眞之盛觀也尹眞人初受童眞之任隨侍老君遊此宛利天下五嶽名山洞天宮觀及四海江河洞源水府其主者或稱聖帝或稱眞王或公或侯有所諮啟多論二儀三景陰陽氣候劫運賒促及帝王命錄修短安危興廢兆人禍福并學道進仙階級黜陟之事調和炁序抑消陽九百六災會之法或問道德宗源希夷之旨老君皆如所請酬答言辭隱奧不可測識爲西王母説常淸靜經亦此西遊龜臺之時葛仙公曰吾昔授之於東華帝君東華帝君授之於金闕帝君金闕帝君授之於西王母西王母皆口口相傳不記文字吾今於世書而錄之也老君謂喜曰吾將與汝上朝玉晨遊厯帝鄕作是語時靈音八會雲炁四合冉冉昇虛遂遍厯九天諸天帝君皆來迎老君老君入其宮宇設瓊英玉實月液雲漿靈芝仙果光華映席天樂繁會靈唱妙絕諸天帝眞皆禮拜請問自然無上玄妙至眞帝一之道己而上元大有眞公中元太極仙公下元太淸仙伯乘碧霞黃素雲輿駕蒼虬麒麟獅子張交渾流霞鸞鳳飛鶴之蓋仗日精命眞之斾月華命魔之節星光命仙之旗侍從神仙靈官十五萬謂上元七萬中元五萬下元三萬所乘駕及蓋斾旗節之類皆各有等降各持香花浮空而至稽首拜迎老君上昇上淸日闕丹城蘂珠宮老君乃命喜朝拜高上玉晨太上大道君於是道君賜喜環剛丹果隱伏龍芝珠英玉醴共一十二事乃從老君下降於天水之靈山遂之西域今秦州啟靈山也見有西昇臺聖容殿並在巖下初老君去周嘗西化大秦安息月氐烏戈竺乾等國號古先生其國王及臣民皆奉教行善變强獷之俗崇揖遜之風乃還中國按唐通典云大秦一名犁靬亦曰拂箖去長安四萬里其地平正有四百餘城小國役屬者數十其人長大有類中國其王無常人皆簡立賢者老君先已開化諸國世莫知之故傳記不載今因將尹眞人行化遂有記述流傳中國劉向列仙傳云老君好養精氣居周久之去入大秦至尹眞人傳云喜與老子俱遊流沙時然後得俱遊也葛洪丹序云洪少欲詣拂箖備聞海外諸國風境説大秦國淸淨奉道人民淳和王法甚正見商賈者皆目曰周人又唐時遣使入朝戴冠穿鞾嘗謁老君像捨錢修觀寫明皇御注道德經黃帝陰符經歸其國足騐老君嘗至其國今復與無上眞人尹喜至罽賓行化暫止於近郊山谷初淸和國王卽東極始老國也生天爲妙梵天王每遇老君遊行經厯卽遙拜發願云惟願慈尊濟度弟子於當來世常與弟子爲師於當來世得爲高眞其後享天福報盡降生人世尚以餘福得爲羌胡之主卽罽賓之煩陀力士是也旣生人間忘其宿命殺害無度頻出遊獵老君不忍違其前願乃於此教化之時王出獵至山有五色光炁貫日怪而尋之乃遇老君王問曰公是何人老君曰吾是修道之士至人通玄究微應諸天諸地異域方言以至異類音聲莫不洞解故與胡王問答皆隨其國之方言而與之言當時隨侍眾眞卽以正音紀錄之還傳中夏後人目曰化胡經也猶齊人能爲楚人言者遇楚人則操南音與之言及其紀之於冊則必用齊語矣事出一人之手不待翻譯也王曰道是何物誠爲我説之老君曰道者元炁虛無混沌自然無表無裏無有高下天地從之而生萬物資之而形不得而名故强爲之稱曰道也王曰吾自建國以來不聞有如是事公何所從來而居此乎老君曰吾是萬氣之靈根神仙之道元在天爲眾聖所尊在地爲萬國師君天上天下皆吾百官回神無極造化方圖分布日月星宿虛玄步天量地制作經文天地萬物係命道君有形之類皆從道生吾生於無形長於無名降爲帝師隨世教化今來自周也老君知王頑獷難化不達謙遜之辭故以直告之庶其警悟宿因耳王曰未審在彼國土以何法教人老君曰吾在中華常以道法開化王曰何謂道法老君曰道法者乃太上靈寶生於天地之先大無不包細無不納天不得此無以耀明地不得此無以表形神不得此無以入冥人不得此無以生成是以萬物芸芸以道爲根蛇得之爲龍禽得之爲鳳獸得之爲麟凡人得之爲仙人能修之逍遙太空改易五內變化形容役使鬼神隱顯無常上仙之道也王曰所説靈寶者固爲希有然我智力淺劣不任是事不知今於此國宜以何法設教老君曰觀王風俗人懷悖戾更相誅戮虐及含生邪淫貪慾日造惡業自取沉淪王欲生得全夀死無殃考宜修浮屠之法內外剪除而不傷形體故曰浮屠也王曰其法云何老君曰先去人我止烹殺眾生蠢蠢皆愛形命王今好獵殺害無度天道好生甚惡殺傷王欲保夀願勿畋獵王艴然變色曰異哉是欲亂我風俗乃疾我遊獵禁我殺生耶我自有國以來代代弋獵亦保天年公有所須當遣供給毋出此語亂我國人使之失業遂馳還後出獵復到屈山又遇老君問曰殺有何罪乃禁我獵身死空無將何受報老君曰王之好獵不問四時不避胎養是何逆天暴物法當減祿奪算天有司殺之神紀人過惡一朝命終地司追其魂神禁繫考掠永淪罪獄王曰未知殺外更有何罪老君曰殺罪至重積寃成業五道四生緣對不絕如驕恣暴逆酖酒淫色貪婪欺罔信用妖巫亦皆有罪死入地獄魂神受苦王欲改過信奉浮屠生則富貴康甯死則魂魄不拘喜悅無量不亦善乎王曰甚善公試爲我分別説之老君曰浮屠者削去鬚髮著壞色衣偏袒徒行以制其形持戒止惡中食悔過常習止觀以檢其心能修之者上可全身保國下可免離苦趣王曰善則善矣但我智識淺劣積習旣久未能持戒止觀又不能惡衣徒行然軍國事重猶希福祐請且修中食漸省殺獵以化國人可乎老君曰可王曰未解其方請公教之老君欲化其國令悉信向乃謂王曰今請爲王設中食願率羣臣眾庶悉來會食因觀法度王曰公縱神聖安能供給吾國之眾老君曰願王枉駕率眾俱來勿以爲慮王乃歸國尅日聚會老君散五雲於五方山各隨其方色化爲宮殿陳設帷帳飛仙百億悉爲給使天厨飲食不可稱數王密遣人覘之方大驚異遂舉國俱來就會七日滿散并以種種珍寶綵繒賜王遍及臣庶王啟老君曰我等已見儀法欲設中食願率徒眾皆來老君曰吾眾頗多恐王不能供給王訝曰我大國無所不有何以不能供給耶請尅期而會老君謂尹喜眞人胡性堅强心猶未服可因此會方便化之乃勅海內羣仙皆來赴會來者相續於路月餘不絕王倉庫將竭齋未及半乃生悔心王召羣臣謀曰道士徒眾何乃果多耶予設中食本祈益國今乃傾我倉庫恐是鄰敵姦謀故遣來害我國不然必是鬼魅若不早圖恐彌損國汝等急宜焚殺以全予國於是羣胡積薪外郊煙焰亘天乃將兵圍繞老君及隨侍仙眾驅逼入火老君與諸仙怡然赴火隨煙出没身更精明又令左右沉之深淵老君入水淩波越流身放光明王益發怒又燒大鑊令煎煮之老君忻然入沸湯中談笑自若胡王始驚知不可殺然業已行此恥不能殺乃急遣使以告鄰國曰有一妖魅或老或少變化不常處吾國山谷中我投之水火皆不能殺恐更興妖害及諸國請速興兵相共誅戮旬月之間胡兵並集共圍老君吹具扣革彎弓按劍四面合圍於時老君宴處圍中怡然不爲恤亦無怒意俄而風雷四合天地震動胡兵矢石皆自反中戈矛摧落金革無聲胡兵驚懼一時奔潰胡王戰慄謂羣胡曰其老翁等安知非大聖人今欲事之何如羣胡曰大王旣已燒沉煮射皆不能傷豈非聖人耶但恐其積怒將滅王國願王早爲之謀王曰誠然吾今正爾自詣其前求哀請命庶蒙赦宥於是面縛至老君前五體投地叩頭千百求乞哀宥是時老君欲堅其信心語之曰吾是太上老君生乎無極之先經厯塵沙劫運度人無量爲三十六天之尊統領三界制御萬靈報應罪福莫不由吾哀汝造罪故來行化汝恃貴驕不能遵依邀我中食返相折辱汝積惡鍾身萬悔何及諸天神兵將滅汝國絕汝種類語未竟胡王眾等皆見天丁力士神王甲卒不可稱計乘龍跨虎俱在空中怒聲震地王及庶等驚怖哀號叩頭出血跪伏謝曰我生邊戎受性狂愚不信道法凌辱天尊伏量此過萬死尚輕一國同誅不足償責惟乞赦罪重賜全活願受前法至死不悔舉國奉身不敢終怠老君曰且止且止雖叩頭泣血猶未可保恐汝後悔當何以爲質誓耶王曰若天尊大聖見赦我罪與我更始請以舉世男女一世不婚不娶髠剃鬚髮以奉教法若違誓約當身死爲證老君曰可矣汝今誓重諒可憫也然汝兇惡日久甚不足恤吾滅汝國土令入地萬丈化爲微塵猶彈指耳不足爲難但吾好生故赦汝當一如吾戒不得後負王拜曰敬奉命旣而神兵匿景天地淸甯老君乃戒王曰今釋汝罪汝宜奉浮屠法永世受福常生人道王及羣胡莫不懽喜頭面著地合掌禮謝老君於是注慈惠光降照王身王忽追省前因悔悟悲泣涕淚俱下再拜叩首曰我從無量劫來惡根未滅雖得超生旋卽墮落頭出頭没如汲井輪不遇天尊大慈仁者憫念宿緣特賜救拔終淪惡道無有出期今願棄國入山以奉大戒爲國人謝罪祈福終希度世永離輪迴老君曰善汝欲居山學道妻子羣臣任其去留留者令奉五戒十善隨入山者則奉六戒王曰唯唯是誠所願老君曰汝審欲聞法者可淸潔修齋齋竟同集當授汝法王禮謝而退卽捨王位傳授其子乃率國中臣民男女發善心者一萬二千五百人俱時來至稽首長跪以俟尹眞人適赴天帝中食而還頂負圓光足履蓮花諸仙玉童玉女香花天樂從空而下老君指尹眞人示胡王曰此吾之弟子無上眞人命爲汝師乃令王與偕來之眾先懴悔三業六根自從無始以來所造陰罪陽過十惡五逆信用邪見外道一切罪犯以至積世父母眷屬所造諸業悉皆懴悔懴悔已畢乃謂汝等各各攝念靜神諦聽吾言今爲汝授五戒十善五戒者一不殺生二不飲酒三不偷盜四不邪淫五不妄語能持此戒當有二十五戒神護之十善者一曰孝二曰忠三曰慈四曰忍五曰施惠六曰精勤七曰供養八曰信向九曰勸化十曰靜定能行此者當有十天善神衞之矣授已卽復爲王等説十戒十八戒二十四戒二百五十戒女人五百戒又令一嵗正月五月九月謂之三辰月齋又每月六齋初一初八十四十五二十八二十九日謂之四天王齋又每月十眞齋初一日念無量太華天尊免火車地獄之苦初八日念玄上玉晨天尊免溟泠地獄之苦十四日念度仙上聖天尊免鑊湯地獄之苦十五日念玉寶皇上天尊免風雷地獄之苦十八日念好生度命天尊免銅柱地獄之苦二十三日念玄眞萬福天尊免火翳地獄之苦二十四日念太靈虛皇天尊免屠割地獄之苦二十八日念太妙至極天尊免金剛地獄之苦二十九日念眞皇洞神天尊免普掠地獄之苦三十日念玉虛明皇天尊免三界寃報之苦是日十方諸天下降觀人善惡當一日一夜素食誦經可免九獄之苦三界寃報之罪不能齋者許食自死肉仍謂四眾曰王今已得受度我將行化諸國王復再拜啟曰天尊大聖今將遠遊覬集良難舉國受恩慨戀無所欲請天尊洎我師徒眾行道三十日然後送別唯垂許可老君曰善王遂與世子羣臣人民大建道場廣陳供養歌唱詠讚會日告滿猶欲延留眞人謂曰善哉善哉供養矣吾將侍師行化諸國弗可得而留也於是胡王攝衣而起跪行而進再拜長跪合掌白言我師將捨我去無所諮請願授要旨終身受持眞人謂曰吾語子夫戒律雖非至道誠爲入道之階能堅持不懈泰定從此生智慧從此起九層之臺起於累土合抱之木生於毫末千里之行始於足下又曰汝國風俗獷戾阿修羅之氣習未除我師立教柔弱處上汝惟不爭故天下莫能與之爭汝能無爭三昧則於見在世當爲人中第一未來世中當證善果王受教已稽首禮謝眞人重告王曰子來前子知身相虛假萬有非實乎汝欲求寂滅之樂當除垢止念見不可欲一塵有著卽累汝性王於言下開悟叩頭拜謝曰唯唯眞人遂偕諸仙眾侍從老君出罽賓境合境臣民俱哀戀拜送王卽與眾入山修道遞相訓導老君遂至條支國其國王奉事外道魔師曰謂是聖人其徒三千餘人皆從官供給凡十二年廣行幻術王敬信之一日語魔師曰國中大山當道妨人行路壅遏源流時作洪水師等能爲卻之否魔師曰可明日爲王卻之時老君適至坐於樹下觀諸魔師各作奇術兩手作訣山爲微動老君知王可化謂尹眞人曰魔師作法欲除此山山若果除王必信之謂眞神聖不可復化矣乃令尹眞人遙以神通制之山遂不動魔師自相謂曰向者已動今返不動莫有異術之人禁制之乎遂競上山巓四望尋覔遙見眞人乃急追捉送王王問曰汝是何人眞人答曰太上弟子王曰太上何人耶曰太上聖人王曰汝太上今安在曰自罽賓國行化至此近在山下王卽勑左右迎之卽至王宮王卽延坐問曰人言老翁是聖人吾國有一大山妨路萬民患之魔師卻之不能願聖者謂我除之老君曰諾王曰不知須幾人力曰此小事也何須人力魔師恐王因此不復信用更求自卻王曰善於是魔師三千人俱作法用盡其術終不能動王曰師法盡矣請老翁除之老君卽把九節之杖撥而去之如去塊土水乃順流地亦平正王叩頭再拜求爲弟子不復奉事魔師舉國臣民莫知敬仰咸願皈依受化老君還於樹下王請就館王宮老君不從王益加信仰於是匍匐膝行叩頭請問曰竊聞聖者不違人心伏願爲説妙法老君曰吾聞王者悉非常人德蔭萬物行合乾坤開化人天爲國之君君能行道國土長全寢甲休兵安濟萬民於世無道國土傾淪多嬰災難毒及臣民王宜盡心奉道求眞身無災害嗣續詵詵鄰國畏服姦惡不侵命夀長永與天相傾月不夜蝕日不晝昏父不哭子臣不背君王宜體之尊道敬天王曰願乞哀憫留神賜教示以道要老君曰恐王驕蹇易生退心未可輕付王於是召羣臣萬民七日七夜修齋供養各持綵繒黃金以爲信誓手持香花叩頭百拜慇懃三請伏聞大聖開化罽賓遠近諸國咸受正眞我今劣弱未蒙垂慈願剖大道開示愚民使舉國人民終世奉行老君知其心至乃謂曰吾已令弟子無上眞人與諸國王爲師演説經戒刳心制形生得安穩無有夭橫死得滅度不墮惡趣王能敬奉獲福無量王曰唯唯老君曰善王可還宮焚香作念於是眞人應見化身於王宮殿坐寶蓮花爲王授十八戒王歡喜合掌禮拜願棄國家不顧身世持如是戒不敢有違又爲王天人羣臣若男若女初發心者説三戒爲已伏心者説五戒王復問曰太上聖人先下東方不知以法教化莫亦如今所授乎眞人曰我師隨世設教昔在神州以神仙之道教化天下上自三皇次及五帝修之皆得神仙王曰浮屠神仙有何差別眞人曰浮屠者回心向道剪滅六根以空寂爲宗至於神悟性靈得證佛果然命過形亡終歸寂滅永爲陰靈而已神仙者修眞證道形神俱妙顯化飛昇出有入無長生不滅胡王曰何不以此教我外國使得同然耶眞人曰生道至重上天所祕非夙植道本安得易聞胡王禮謝遂建精舍造像供養老君乃與眞人行化諸國遂至于闐國于闐先聞老君將至卽率國奉迎於國南渠山之上一名檀特山營造精舍延請老君居焉老君宴處其間不飲不食王與近臣朝夕諮問求乞所聞老君授以齋戒之法王曰聖師所言止有齋戒還更有餘教耶老君曰吾道無量無邊順俗通時因機立化在中華時行無上正眞無極大道修習之者度行延年行備功圓克登仙果乘龍馭炁白日昇天説三洞眞經三十六部大乘次法萬八千篇上至帝王下及凡庶修奉之者隨其淺深受報登仙或爲上聖或證高眞品秩崇卑三十七等飛行自在變化不測又有金液神丹修鍊之道吐納咽景養炁之訣柔體調神導引之法三奔五鍊嗽御之經及採餌靈芝神草柔金水玉之方至於隱天藏月變景鍊形役使鬼神制御天地符圖寶篆玉璽金書萬術千經開化後學皆因宿根淸淨稟氣淳和好道樂眞精誠不退身心相應方堪付授如汝國人積生剛勁宜以浮屠之法制鍊身心如能精勤不懈命終之後受福生天道法玄妙深微縱教於汝亦難解了非吾所惜也良由眾生自無始以來慳貪嗜慾㗖食無厭養其膿血彌益罪根生老病死惡風毒炁百病來侵受生稟質各各不同日夜循環萬生萬死或居母腹不得出生或至分免卽便死亡或一嵗二嵗念念改張一日之中無少安樂良由廣食穢濁骨肉薰蒸損傷臟腑金玉化銷身形難久吾不飲不食抱道自然變化無方長生不死常説經教開度眾生凡夫愚迷不能信用吾常憂念憫痛在兹故使持齋減其病苦能行之者獲福無量王曰聞有佛陀近在罽賓出世傳法度人莫是聖師否老君曰此浮屠教法西域諸國國王人民咸已歸依止殺除淫調柔其性當得果報常生人天今汝奉行不得懈怠內外淸淨心照圓明罪旣不生福亦自長厯劫之中常得快樂王大信服敬禮受命
