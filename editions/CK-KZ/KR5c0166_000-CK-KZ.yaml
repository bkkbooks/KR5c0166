front:
  text: 重刋道藏輯要混元聖紀序懷英嘗爲舉子知推尊孔氏矣已而脱儒冠去爲道士以推尊孔子者尊老子於是爲書若干卷自開闢以來凡老子名迹變化及其遺事微言散見於百家者摭拾詮次無遺爲聖紀嗚呼何其專且博也則誠有功於道家者儒者嗜仕卽不得專志於書往往不暇崎嶇及世次年月也或有暇及此又不敢不務差擇則拘於六經而不得騁故吾夫子之道與天地相爲無窮夫人推尊之故未有如懷英此書者向使懷英幸卒舊業不去爲道士則此書將爲孔氏作其有功何如哉雖然昔太史公嘗作孔子世家蓋有志於此矣説者反曰夫子之道與天地相爲無窮豈必與戰國若漢封君較久長者則世家似不宜作而孔氏之子孫輯所逮聞作家語孔叢子二三書儒者亦弗甚稱道至墳羊楛矢稍欲以夸大聖人又或以其語神怪不取者然則使懷英不去爲道士將爲書尊孔氏則亦以六經斷百氏必不能騁其博如此余以是嘆息於懷英其不幸而不得自託於孔子也夫其亦幸而得自託於老子也夫因以爲序云懷英姓謝氏名守灝永嘉人余同舍生也紹熙四年八月日陳傅良序
  hash: sha256:12ad17d287c83b6c66acf966354bd0d5add51381b112f15f5ad59c9e02dcc936
