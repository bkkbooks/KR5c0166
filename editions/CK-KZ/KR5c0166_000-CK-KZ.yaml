body:
  text: 進表臣守灝言太淸顯蹟悉資信史之洽聞浩劫遺編必俟熙朝而大備時哉難得道不虛行臣守灝誠惶誠恐稽首頓首切以九霄之上素號帝鄕六合之外具存聖典三墳不存則羲農之迹熄六籍旣出而周孔之業興粤在漢唐之盛時咸尙黃老之至教聖賢間作元化誕敷世道交興斯文弗墜惟混元之上聖實妙道之大原生天生地而莫覩其端倪神鬼神帝而孰窮其畛域先延康赤明之劫旣厯代爲師洎有商蒼姬之時復分身應化有教無類則西胡成道至道不測則東魯見龍惟其知之者希無怪言之弗究舊傳第測管而窺豹後學益多歧而亡羊蔑聞藏室之全書兹實教門之闕典臣材非入室學愧專門詎能馳騁乎翰墨之場不過涉獵乎藝文之囿研精而髮半鶴染翰而手屢龜搜羅三教書編敘而爲聖紀稽考百家説訂正而合眞經計餘十萬言分爲一十卷抑亦古人之糟粕庶爲後學之筌蹄雖道不在於書而捨書則其道曷傳猶跡固出於履而索履者非迹何代然欲記久而明遠要當辯妄而歸眞希開海宇之昏蒙必藉風雷之號令恭惟皇帝陛下離明繼照天德出甯運陰陽不測之神行淸靜無爲之化祖禪父而父禪子振古無雙人法地而地法天與道爲一邁唐虞成周之盛見典章文物之隆矧片善之不遺苟寸長而必錄臣聿懷千載之遇輙効一得之愚藐爾涓埃儻容著丙部之錄美兹芹菽覬獲塵乙夜之觀臣所編太上老君混元聖紀謹隨表投進以聞臣守灝誠惶誠恐稽首頓首謹言紹熙二年三月日觀復大師高士臣謝守灝上表
  hash: sha256:55743d16309a4bc230402dfc7c1e5e2ac4153cffa1ab88a39e88fb1d42500da3
