  text: 混元聖紀卷之三與三
  hash: sha256:6016eb7f97f7f1101e86bee6bf0964de6a6283429c262a6697bfb6f0736279e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_SJB_003-170808c, image: sjb/17/170808c.png}
body:
  text: 宋觀復大師高士謝守灝編商王紂二十一年丁卯正月十有二日丙午老君鑑紂荒虐生靈塗炭周文王爲西伯有仁心將輔有德而拯斯民遂分炁化身乗飛飈之輪降于岐山之陽今鳳翔府東北十八里有啓聖宫乃其所降之地有西伯受道臺遺迹並存號燮邑子說赤精經教人以仁信之道西伯聞之召爲守藏史武王克商踐祚遷爲柱下史改號育成子作璇璣經在成王時號經成子說廣化經又以道授周公旦乃退而閑居因出遊西極大秦竺乾等國自號古先生至康王時還歸于周號郭叔子復爲柱下史按世本云在商爲守藏史在周爲柱下史蓋文王尚以侯服事商也老君潛龍卑秩以綏周道至昭王時老君知周室之將衰乃以八天隱文授王令保鎭國祚昭王自謂居自然之運稍怠於守成將縱心於巡幸不崇天文老君知王之將不令終也乃收天文歸休故里老君居周雖乆常以自隱無名爲務外和光同塵内實清虚不令名位之顯也後漢邊韶製老君祠碑云老君樂無名守不德危高官安下位其銘曰帷於元德抱虚守清樂居下位勢禄弗營浩然歷載莫知其情要以無爲大化周成進退無常錯綜其貞以智爲愚沛而不盈觀此銘則聖人之出處可見矣老君復欲開西域乃以昭王二十三年癸丑上天之無極元年也五月壬午駕靑牛之車薄板爲隆穹徐甲爲御將西度函關隋薛道衡撰祠庭碑銘云小兹五嶽隘此九州逝將高蹈超然遠遊靑牛已駕紫炁先浮玄門洞啓神化潛流蓋言將化西域也岀塞記云西度函谷李亢函關銘云尹喜邀老君留作二篇而藏之玄靜云西出隴關催浩云喜爲散關長秦圖經載散關傍有尹喜城亦疑周康王時喜嘗爲散關長蓋以史傳但言度關不言所度之處故後賢各以意言亦猶巢許飲犢之所非止一處夷齊首陽之山不知所定也但隴關散關皆在秦隴其函谷關即在陜州桃林縣南十二里有故關墟存焉考之圖經及古老相傳咸云老子所度正是函谷故關昔周武王居鎬京成王雖營洛邑猶返西周至平王東遷洛邑樓觀内傳稱周康王拜喜爲大夫尹喜内傳稱喜出爲關令若以康王時喜爲散關長昭王時老君岀關與喜相遇亦於文爲便但内傳云出關乃至喜宅喜宅在函谷關之西盭厔縣若出關則無喜宅矣蓋函谷關在鎬京之東老子又在函谷之東仙公本其西駕之意乃云去周西度言將去周故西度也若言老子見孔子然後岀關則度關在東遷之後此時隴關散關之地並已屬秦尤不得設函關而言散隴也按秦之遠祖非子始居太丘與戎雜處即岐州之地孝王使非子養馬於汧渭之間有功初賜邑於秦即隴西秦亭也厲王時西戎叛周秦仲誅西戎因賜之太丘之地秦仲不能有還處秦亭及襄公送平王東遷王賜之岐西之地秦又東獵至汧渭之間感其先得封之由乃卜居隴東穆公敗晋于韓原闢界東至于河獻公漸東而都櫟陽孝公乃營冀闕謂之咸陽由此推之秦自隴東而西居秦邑又從隴西而東處汧渭則孔子後隴散即秦之中地何事於此置關散關所以有尹喜城者蓋赧王時老君與尹眞人將昇崑崙取道於此秦昭王命於其處置城邑以表之故有老君停驛尹喜城也說者見此有尹喜城即疑散關是喜任官之處旣已周關在此則不得言過關乃至喜第也考之驗事尹喜爲令之所老君逢喜之地當以函谷關爲定唐天寳元年於此獲老君所藏天寳靈符詔改桃林縣爲靈寳縣於其地置靈符觀明皇親禮御製碑銘立于觀内宋朝眞宗皇帝亦嘗御製度關碑銘刻于石云初尹喜志慕道術少好三墳八索之書善天文緯候乃結草爲樓仰觀乾象精思玄道號爲樓觀喜於是瞻見東方有紫炁西邁天文顯瑞知有聖人當度關而西乃求出爲函谷關令王從之喜字公文康王朝爲大夫後召入東宫賔友按内傳稱喜母曾晝夢天絳霞流繞其身咽之及喜生靈光飛其側眼有日精少好墳索善天文秘緯仰觀俯察莫不洞徹雖鬼神無以匿其情大度恢傑不修俗禮損身濟物不求聞達逸響遐宣召爲東宫賔友出補關令劉歆七略云關尹子者關吏也名喜史記列仙傳皆言關尹喜未知尹是喜之姓是關之長如莊子云子列子問關尹則尹爲長也今有姓尹者當承喜之後則喜爲關之尹以官命姓尹乎然玄妙玉女降生於天水尹氏之家内傳及神仙傳皆云關令尹按周禮司關上士二人中士四人又云每關下士二人以此考之則下士掌啓閉之人司關爲諸關之長也莊子有門尹禮記有里尹國語云敵國賔至門尹以告是門長里長關長通謂之尹也但喜爲諸關之長故得迎候老君耳然周之關尹止是上士非大夫而劉向列仙傳云關尹喜者周大夫也善内學内傳云善天文秘緯按周禮有馮相氏保章氏皆掌天文秩並中士惟太史是下大夫亦總天文氣候之事喜善天文而爲大夫或是周之太史乎即其在朝常任大夫之職其出則兼上士之任蓋喜知老子將至關故求出爲令尹以候之也今終南山陰盭厔縣神龍鄉聞仙里中有草樓罽壇祠宇即其故宅也按樓觀先師傳及樓觀記並云周康王時爲大夫至昭王時遇老君得道遂侍雲輿西邁其後穆王敬尚遺塵乃爲建祠修觀故其碑文曰樓觀者周康王時大夫關令尹喜所立也以其結草爲樓故因以爲號又曰周昭王西巡秦文東獵並枉駕回輪親崇敬道始皇建廟於樓南漢武帝立宫於觀北晋宋謁版于今尚存秦漢廟户相繼不絶由是觀之足驗老君度關在昭王時也或云東周時也蓋後人但見孔子時老君猶在故爲此言不知老君化胡之後復還中夏其度關屢矣然無事可紀故略之今爲尹眞人授道之始且爲化胡張本故特書以表之耳喜至關曰夫陽數極九星宿值金歲月並王法應九十日内有大聖人經過京邑乃先勑關吏孫景曰若有形容殊俗車服異常者勿聽過喜即預期齋戒使掃路四十里夾道燒香以候天眞入境至七月十二日甲子果有老人皓首聃耳乗白輿駕靑牛而至關吏曰明府有教願翁少留乃入白喜喜曰道今來矣我得見聖人即具朝服出迎跪伏叩頭邀之曰願天人暫留神駕老君曰吾貧賤老翁居在關東田在關西今暫往取薪何故見留幸聽度此一試也喜復稽首曰天人豈是取薪乆承大聖人當來西遊勞神暴露少憩神駕老君曰聞開導竺乾有古先生善入無爲永存綿綿是以升車就道經歷子關子何苦而見留也此二試也喜又曰今睹天人聖姿超絶乃天上之至尊邊夷何足往觀願不託言少垂愍誨老君當成王之時嘗至大秦竺乾等國自號古先生西昇經云老君西昇開導竺乾有古先生善入無爲不終不始永存綿綿是以昇就蓋自道也沖玄子云竺乾國在崐崘之西赤水之陽又禀淳和之氣自然長壽而未明道本修煉之要故老君嘗昇西極往化導之老君初度函關欲試關尹先稱貧賤老翁而關尹知其爲大聖人堅欲延留老君又稱開導竺乾有古先生將往昇就而關尹謂其天上之至尊邊夷何足往觀此西昇經首章之㫖也凡先聖虔人必先歷試關尹旣三試皆過老君乃告以實曰古先生者吾之身也化乎竺乾今將返神還乎無名綿綿常存此西昇經末章之㫖老君曰子何所見而知吾此三試也喜曰去冬十月天理星西行而過昴斗中有天理四星主統理萬物老君居焉故混元聖德賦云或耀魄於勾陳或韜光於天理是也昴星正西方之宿也自今月朔融風三至東方靑氣狀如龍蛇而西度此大聖人之徴喜少好墳易及天文秘緯凡仰觀俯察未嘗不驗故知必有聖人度關夙夜存思未嘗暫息今以有縁果遇仙駕願垂愍誨開濟沉冥老君旣三試之皆過乃怡然含笑曰善哉子之知吾吾亦已知子矣子有神通之見當得度世也喜忻躍再拜叩頭曰敢問大聖人姓字可得聞乎老君曰吾姓字渺渺從劫至劫非可悉說吾今姓李字伯陽號曰老聃喜於是就官舍設座供養進盥櫛行弟子之禮甪里先生論曰觀老氏與尹生豈不警悟先機耶而猶如此執謙辭者欲教世耳老君之御者徐甲少賃於老君約日顧百錢至出關者計當七百三十萬錢甲見老君去官遠適亟來索錢老君謂曰吾欲往西海大秦罽賔天竺安息諸國令汝御車還當以黄金計直償汝甲如約及至關令飯靑牛于野老君欲試之乃以吉祥草化爲一美女行至牧牛之所輒以言戲甲甲惑之欲留遂負前約乃詣關令訟老君索顧錢老君謂甲曰汝隨我二百餘年矣汝已乆應死吾以太玄陽生符與汝汝所以得至今日汝奚不念此而訟吾言訖符自甲口中飛出丹篆如新甲即成一聚白骨喜憫甲違心至死乃爲甲叩頭請命願赦其罪得以更生乞爲出錢償之老君重喜慈捨曰善乃復以太玄陽生符投之甲即立生老君曰吾不責汝汝負本約道自去汝故死耳今償汝錢喜即以錢給甲而以禮遣之甲請留不許伏地搏頰曰已沐聖恩曲赦罪戾今此柘骨復見光明刻骨銘心願從雲駕老君竟不許老君爲喜留關下百有餘日喜齋戒叩頭再拜跪請曰塵凡孺子幸遇聖人投身委命願聞大道老君曰微哉子之問也夫大道守眞三品爲則以一爲度以正爲德喜曰道品有三要得昇仙其可乎老君曰子能知一萬事畢閉塞清慾入奥室煉金食炁爲第一子能知之守勿失喜踴躍稽首曰煉金奈何曰神方也自至眞上帝莫不由金丹而得道履九幽而入杳冥上下虚無因神明而俱昇喜復稽首曰願聞其㫖老君曰紅鈆黑汞大丹頭從紅入黑是眞修赤中取精黑取髓解取赤黑藥無比用赤入黑保長生用黑入赤天仙矣喜曰道則高矣妙矣未學未究願賜指示老君曰一者是鉛鉛爲君二者是汞汞爲臣若鉛不眞其汞難親若鉛是親不失家臣靑腰使者赤血將軍和合兩姓異族同群白汞作腦黄芽爲根化鉛爲粉煉汞爲塵陰居陽位陽數陰匀月盈日昃寒暑區分開設法象赫然有文唯吾此道天地常存喜拜曰藥物之㫖敬聞命矣鑪鼎之制水火之候奈何老君歌曰圓三五寸一分口四八兩寸唇長二尺厚薄均腹三臍坐垂温陰在上陽下奔首尾武中間文始七十終三旬内一百善調匀陰火白黄芽根來去遊不出門漸成大情性純即歸一還本原至一周甚殷勤密防護莫迷昏途路遠甚幽玄若達此會乾坤子午沾淨魄魂得長壽入仙村樂道者尋其文諦思之勿須論又歌曰日月本是乾坤精卦象周回甚著明前三五兮後三五五六三十還復生生兮滅兮周十二十二中分二十四二十四氣互推遷萬象爻銖都在此水銀一味互成二變化陰陽成旣未旣未却配爲夫妻始覺壺中有天地又歌曰金液還丹仙華流高飛雲翔登天丘赤黄之物成須臾當時雄雌紛亂珠可以騰變致行厨靈童玉女與我俱出入無間天同符其精凝霜善沉浮汝其震敬必來遊金液之訣盡於此矣丹成作金以爲食器亦得長生先試作金金成乃可服故曰金丹可作世可度也於是授喜太清八符經太清觀天經九都經神丹經金液經及八鍊九轉還丹伏火之訣焉老君復謂曰審欲神仙先當服還丹金液汝不能服還丹金液虚自苦耳爲風寒雨濕鬼炁所繫司命不能救也可不勉哉努力作丹早自防衛勿示愚人令謗毁神道益子之過嗟乎行屍雖富有萬物貴爲王侯不滿百年成土一簣甚可哀也合作神丹勞苦須臾一成便仙與天相畢恣心所欲樂何央哉喜曰煉金食炁道有二乎老君曰天地之精華陰陽之根本二氣之謂也陽龍陰虎木液金精二氣交會合而成者謂之外丹含和鍊藏吐故納新上入泥丸下注丹田循環不息朝于絳宫採於五石以哺百神此内丹也含和鍊氣修道之士得内丹者可以延年得外丹者可以昇天三一九思者内修之要也九丹金液者外丹之極也合而修之道成决矣漢天師撰金液神丹經序其略曰神仙之趣要妙之言無理之至理不然之大然已備載於淵宗非一毫之所宣也老子曰亦復暢此沖虚紀道者也其神德之狀感興所由以制經設教紀載異聞彌綸大道剖判三極先大明逆順然後蕩以兼忘咸稱有德統之以無待利用出入群生莫見其端百姓日用常善不知所以此其權見其於清明而爲萬物津梁者也其道焉其德焉推宗明本窮洲極妙總衆枝以眞根攝萬條於一要繼然而不絶矣至于金丹之功其神洞高冥體幽變龍化靈昭其含枯絶者返生挹生氣者無遼登景漢以凌邁遊雲嶺以逍遥迺至面生玉光身育奇毛吐水噀火無翮而飛分形萬變恣意所爲塞江川不以覆簣破山梁不煩斧錐其神難紀其妙叵遺大哉靈要不可具述喜重請曰煉金之法旣奉教矣敢問食炁奈何老君曰食炁固精受明玄經生道要妙出幽入冥上固雲門下固靈根知者甚易行之甚難夫形動德散氣越道叛精消魂損目動魄亂是以聖人靜形固氣畜精收視則道德虚凝魂魄固守形一神萬道乃成就常以半夜之後偃卧握固鼻納清炁口徐吐之復守三一入室九思神定炁安仙道近矣因授喜玉曆中經三十五章喜曰三一之㫖願賜指示老君曰三一之道神仙所重世莫得聞子其秘之兩眉間却入一寸爲明堂二寸爲洞房三寸爲泥丸上丹田宫也中有赤子字元先名帝卿心中爲絳宫中丹田也中有眞人字子丹名光堅臍却入三寸爲命門下丹田宫也中有嬰兒字元陽名玄谷皆長三寸同服赤幘赤衣赤履此三一也一云上紫中赤下黄衣皆是嬰兒之狀下一座金牀玉几常以金鑪玉匕攪精華以哺上一中一當晝夜存之也子欲長生三一當明子能守一一亦守子炁變爲精精變爲神神化爲嬰兒嬰兒上爲眞人眞人然后爲赤子此眞一也又曰僞道養形眞道養神神眞道通能亡能存神能飛形亦能移山形爲灰土其可識焉耳目聲色爲子留愆鼻口所喜香味是寃身爲惱本痛痒寒温意爲形累愁毒憂煩弗疾去之則志氣日耗壽命不延其來乆矣子當先損諸欲莫令意逸閑居靜處精思齋室丹書萬卷不如守一常以虚爲身以無爲心無身之身無心之心可謂守神守神玄通是謂道同其猶高山大澤非欲蟲魚鳥獸而蟲魚鳥獸歸之人能虚無無爲非欲爲道道自歸之矣餘見西异經乃授喜太陽金眞九鍊之法謂之九室存思第一無邪思第二正身思第三致政思第四大正思第五極正思第六身正思第七正眞思第八洞玄思第九大洞思入此九室行此九思即與太陽合形同臻於道喜皆得其秘再拜稽首敬佩玄㫖論曰聖言至簡元理不繁如上所述乃關尹累日懇請太上玄機酬答之言纂集其要以示來世非一朝一夕之談也喜於是力辭去官十二月二十五日奉邀老君歸其家他日請曰蠢愚不知所問願請益老君曰子欲修身養性行道紀形結氣成神終始無窮者莫先乎靜故天靜以爲定神靜以爲變人靜以爲生將靜之時反聽内觀心不妄念口不妄言形不妄動無色之色爲之見無聲之聲爲之聞無味之味爲之甘不言之言爲之教神景爲之降福德爲之臻和氣爲之應矣子欲靜神先沐浴齋戒二十五日然後精鍊己身魂魄和平乃可入室入室之后或丹蛇來著子心或王母來降或道身應現此皆身中之神試子耳但勿驚怖有問勿對有所傷犯亦勿爲懼但安心定意其物自去經二十五日四十五日六十日八十五日一百五日一百二十五日一百五十日一百八十日並有神來皆是試子但安心勿對不能爲害若生怖懼爲試不過則失道矣戒之愼之一百八十日後室内自明安危存亡之事無不預知身中宫府一一顯見二百八十日後衆病皆除一年之後瘢痕皆滅千日之后形神俱妙爲眞人矣即授喜妙眞内解並太清上清三洞眞經靈寳符圖太玄等法俾教至精仁者羽化神仙令母斷絶喜稽首禮謝乃謂喜曰吾重告爾古先生者即吾身嘗化乎竺乾今將返神還乎無名綿綿若存今吾逝矣亦返一原老君將欲西適喜叩頭乞請侍行老君曰吾遊乎天地之表戲乎玄冥之間四維八極上下無邊子欲隨吾烏可得焉喜曰入火入淵入地上天灰身没命願隨大仙老君曰得道之士目能洞視耳能洞聽變化不測隱顯莫定尚未能隨吾遠適子雖骨相合道法當成眞然受道日淺未能通神安得變化隨吾聖身喜再拜曰通神變化之道可得聞乎老君曰有生之氣有形之狀盡幻也造化之所始陰陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深故難窮難終有形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與語變化之道子能精修此道體入自然斯可與子行化諸國再越二十八日喜復焚香再拜請曰喜幸聞至道欣喜難言願賜著書闡揚道㫖以詔後世老君曰善汝應爲衆眞之長當於此宛利天下棄賢世界傳弘大道即以道德五千言授之曰吾此文未嘗輕以授人凡經千載方一傳爾子其勉之喜拜受欣躍持誦奉行道成矣遂傳後學云按劉歆七略劉向讎校中老子書二篇太史書一篇臣向書二篇凡中外書五篇一百四十二章除複重三篇六十二章定著二篇八十一章上經第一三十七章下經第二四十四章此則校理之初篇章之本者也但不知删除是何文句所分章何處爲限中書與向書俱云二篇則未校之前已有定本參傳稱老子有八十一章共云象太陽極之數道經在上以法天天數奇故有三十七章德經在下以法地地數偶故有四十四章而葛洪等不能改此本章遂滅道經常無爲一章繼德經之末乃曰天以四時成故上經四九三十六章地以五行成故下經五九四十五章通上下經以應九九之數嚴君平乃云陰道八陽道九以八行九故七十二章上篇四十下篇三十二其彼章全與河上公不合此又出自君平無所依據今檢類衆本有依文連寫者亦有分題八十一章若古詩之章句每章分别於文爲繁則其所擇科段可了不復每章皆題也謹按列子引谷神不死稱爲黄帝書曰則五千之字或有舊書故老子亦云古之所謂曲則全者豈虚言哉亦其義也是以孔子謂述而不作信而好古竊比老彭之嘆今檢他書所引老子或曰玄經及韓非之述謂老子與今見行之本文字微有不同猶論語之有齊魯尚書之有古今聞見異辭未足怪也唐傅奕考覈衆本勘數其字云項羽妾本齊武平五年彭城人開項羽妾塚得望安丘之本魏太和中道士寇謙之得河上丈人本齊處士仇嶽傳家之本有五千七百二十二字與韓非喻老相參又洛陽有官本五千六百三十五字王弼本有五千六百八十三字或五千六百一十字河上公本有五千五百五十五字或五千五百九十字並諸家之註多少參差然歷年旣乆各信所傳或以他本相參故舛戾不一史記司馬遷云老子著書言道德之意五千餘言但不滿六千則五千餘矣今道家相傳謂老子爲五千文蓋舉其大數矣唐陸希聲道德經傳叙云大道隱世教衰天下方大亂當是時天必生聖人聖人憂民之不底于治而扶衰救亂之術作周之末世其幾矣於是仲尼闡三代之文以扶其衰老氏據三皇之質以救其亂其揆一也蓋仲尼之術興於文文以怡情老氏之術本於質質以復性性情之極聖人所不能異文質之變萬世所不能易也易曰顯諸仁以文爲教之謂也文之爲教其事彰故坦然明白坦然明白則雅言者詳矣易曰藏諸用以質爲教之謂也質之爲教其理微故深不可識深不可識則妄作者衆矣夫老氏之術道以爲體名以爲用無爲無不爲而格於皇極者也楊朱宗老氏之體失於不及以至於貴身賤物莊周述老氏之用失於大過故務欲絶聖棄智申韓失老氏之名而弊於苛繳刻急王何失老氏之道而流於虚無放誕此六子者皆老氏之罪人也而世因謂老氏之指其歸不合於仲尼故訾其名則曰搥提仁義絶滅禮學病其道則曰獨任清虚不可以爲治於戲世之迷其來遠矣是使老氏受誣於千載道德不行於當時良有以也且老氏本源天地之始歷陳古今之變先明道德次說仁義下陳禮學之失刑攻之䌓言其馴致而然耳其秉要執本在乎情性之極故其道始於身心形於家國終於天下如此其備也而惑者尚多云云豈不謂厚誣者哉伏羲氏畫八卦象萬物窮性命之理順道德之和老氏先天地本陰陽推性命之理原道德之奥此與伏羲同其原也文王觀太易九六之動貴剛尚變而要之以中老氏察太易七八之正致柔守靜而統之以大此與文王通其宗也孔子祖述堯舜憲章文武道斯民以仁羲之教老氏擬議伏羲彌綸黄帝冒天下以道德之化與孔子合其權也此三君子者聖人之極也老子皆變而通之反而合之研至變之機探至精之歸斯所謂至神者矣而王弼以爲聖人與道合體老氏未能體道故阮籍謂之上賢亞聖之人蓋同於輔嗣豈以老氏經世之跡未足充其所言耶斯不然也嗚呼聖人之在世也有有迹有無迹故道之不行也或危身歷聘以天下爲其憂或藏名飛遯示世故不能累有迹無迹殊途同歸斯實道義之門非徒相反而已然則仲尼之所以出老氏之所以處老氏之所以默仲尼之所以語蓋屈伸隱顯之極也二子安能識之哉司馬遷統序衆家以道德經爲首可謂知本末矣班固作古今人表乃詘老氏於第三品雖其名可詘而道可貶乎哉且仲尼親見老氏嘆其道曰猶龍乎從之問禮誠無間然記傳後世不能探其意是以異端之說紛紛然蓋述之者不窮其源故作之者不盡其致噫斯傳之不作則老氏之㫖或幾乎息矣今故極其微使昭然與群聖人意相合有能體太道用其名執古以御今致理如反掌耳自昔言老氏術者獨太史公近之爲治少得其道惟漢文耳其他反傳詭說皆不足取也老君次年甲寅歲四月二十八日將於喜宅南山阜上辭决昇天喜悲戀請留老君所以未便適西復昇天者姑俟喜道成同往化胡也老君重告喜以除垢止念靜心守一之㫖戒喜曰千日之外可尋吾於蜀靑羊之肆矣言訖聳身空中坐雲華之上面放五明身現金光洞照十方冉冉昇空光燭館舍五色玄黄良乆乃没喜目斷雲霄涕淚攀戀其日江河汎漲山川震動有五色光貫太微徧及四方太微史記作紫微喜遂以老君所說理國修身之要去奢滅欲之言叙而編之爲三十六章以將昇西極之際所演故名西昇經焉論曰老君所乗薄畚車歷代寳之至今猶存其昇天臺在樓觀之南今人相傳呼爲老君陵爾雅云小山曰陵時俗不知謂爲陵墓且史籍之中並無老君死處唯莊子云有秦失弔之語蓋齊死生之寓言耳夫帝王之墓曰陵混元退身吏隱以慈儉爲本而此陵周回五里高逾十丈孰爲老君爲之乎蓋秦川謂陸地高敞曰原原曰陵蓋因混元於此陵昇天故以老君名也當昇天之時五色光貫太微徧及四方昭王問太史吉凶之證太史云當有聖人西去千年之外聲教返此昭王命誌郊壇焉此乃西化之兆也自昭王甲寅至漢永平果千年也喜乃草樓清齋屏絶人事三年之内修鍊俱畢心凝形釋無有饑渴不畏寒暑窮數達變之微形一神萬之㫖悉臻其妙乃自著書九篇號關尹子至丁巳歲即往西蜀尋訪靑羊之肆老君以甲寅年昇天至乙卯歲復從太微宫分身降生於蜀國太官李氏之家也已先勑靑帝之靑龍化生爲羊毛體華潔色如靑金常在嬰兒之側愛翫無斁忽一日失羊所主兒啼不止太官乃遣守羊童於市肆間尋覓得之尹眞人見而問之童子備言其故喜忽感悟曰聖師之約其在是耶即囑其童曰煩爲我告太官之子云尹喜至矣童子如其言入白兒即振衣而起曰令喜來前喜旣入其家庭宇忽然高廣湧出蓮花之座老君化數丈白金之身光明如日項有圓光建七耀之冠衣晨精之服按九色離羅之帔坐於蓮花之上舉家見之皆驚怪老君曰吾太微是宅眞一爲身太和降精耀魄爲人主客相因何乃怪耶尹喜匍匐歔欷悲啼踴躍喜慰無量稽首言曰不謂慶會復奉天顔未審慈尊出無入有起居安否老君從容告曰與子别後何得何喪汝存道守一亦有益乎喜稽首曰自奉秘要粗得其妙恩濟祖先咸受無量之慶老君曰善吾所以留子者以子居世深染恩愛初受經訣未克成功是以待子於此今子保形鍊氣三年功畢已造其妙心結紫絡面有神光金名表於玄圖玉札保於紫房炁參太微解形合眞矣喜再拜稽首謝曰聖師德重天地恩過父母天地能覆載喜不能令喜得道父母能生育喜不能令喜長存老君曰汝之玄分致然即令召三界衆眞時諸天帝君十方神王洎諸仙衆倏忽之頃浮空而至各執香花稽首聽命老君勑五老上帝四極監眞授喜玉册金文賜以文始先生之號以道德五千言自喜傳受方行於世故曰文始先生也位爲無上眞人賜紫芙蓉冠飛靑羽裙丹襡緑袖交帶霓裳羅紋黄綬九色之節及金童玉女各五十人居二十四天王之上統領八萬仙士喜降拜俯伏曰塵凡孺子得遇大聖使枯骨再肉千生慶幸俾居則執掃除之役行則衛僕御之徒喜之願也喜之榮也位號崇高禮文優渥顧何德以秪承敢辭老君曰子慕道積乆隱德昇聞修鍊勤勞玄功已遂非吾有私於子也子其勉之喜辭不獲乃再拜受命自此方得飛騰虚空叅侍龍駕遊行八方老君遂爲太官聖母說无陽經其家長幼二百餘口即時拔宅昇天老君以太官家世積功德昇聞上天縁合昇舉故託化於其家今成都府有靑羊宫及降生臺元陽臺之址存焉翰林學士承㫖知制誥樂朋龜奉勑撰其略曰原夫八十一天比太上之半壽六百萬歲當无始之初年道渺邈以難窮體希夷而莫宄在無象無形之内居太初太易之前二神贔屭以俱來鑿開造化三氣氤氲而互進朴散胚腪玄黄流而未凝清濁分而乍結道爲萬氣之祖德爲萬物之宗又云身駕德車輪轉於混茫之外手持壽柄指揮於開闢之前寂爾無爲淡然自得化其不化則萬物而皆成生其不生則群生之盡遂又曰當其幽原旣開九炁陶蒸而未已玄元大闢六虚流轉而勿休設不二之教門稽眞一之宗本前逍遥於靑運靑運旣周後出没於赤眀赤眀復畢九十九萬億歲貯在彈丸五千五百重天藏於卵殻殷高宗御極之際周文王演易之初神光流入於瓊胎瑞氣結成於金骨不柝不副誕彌於八十餘齡降瑞降生過期者二萬餘晝足蹈不滅之理手執長生之文俯窺溟涬之前下視渾淪之後隨機設教爲萬古之楷模應變無方爲百王之軌範故知大道者三教之冠冕上德者百王之宗元靑羊肆者按本紀則太上玄元天皇大帝第二降生之所也自殷道否閉周德陵夷歷藏史以同塵棄柱史而隱跡東離魏闕西度函關乗靑牛宛轉之車駕白鳳逍遥之輦徐甲執御從先帝以爰來尹喜占風知道君之必至暫别而三千甲子曾作赤童相逢而八百年齡永依黄老潜傳妙訣暗付微言重爲千日之期再結一時之會暫朝元始却上天中之天永奉宗師重歸象外之象是勑靑帝之靑龍化靑羊於蜀郡乗雲紫於紫府降紫氣於王宫將停不嗄之聲須及來斯之乳俄聞喜至頓止嬰啼爰從赤子之身却變白頭之士云云銘曰洪源肇開浩劫無際恍惚大道希夷象帝太初能隱太始來繼玄黄在殻清濁未蛻天地之前億千萬歲設教隨機應變無滯三皇益明五帝增睿率土皆泰群生咸濟樓觀發軌函關掛轊罽賔闡化身毒布惠無狀之狀無聲之聲去莫可送來莫可迎强字之字强名之名太虚之上黄金爲城杳冥之内白玉爲京煥赫亡極牢籠八紘萬國同酌百川成傾莫得而竭莫得而盈淺而行者長居利貞深而行者永致太平又曰鑿開天地刳剔胚腪把捉日月包裹乾坤萬象俱盡唯道獨存三教爭長惟道獨尊唐中和四年九月勑西川節度使立碑靑羊宫見今猶存混元聖紀卷之三
