front:
  text: 混元聖紀卷之八與八
  hash: sha256:4bbd1c01ec7967cef4883c78c59b03d331a356e3484c817daee8532ba94ae031
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_SJB_009-170853c, image: sjb/17/170853c.png}
body:
  text: 宋觀復大師高士謝守灝編周武帝建德三年五月丙子除浮屠教悉毁經像又下議欲廢道教詔道士嚴達問曰道與釋孰優達曰主優客劣帝曰主客奚辯曰釋出西域得非客平道在中夏得非主乎帝曰客旣西歸主無送耶達曰客歸則有益於胡土主在則無損中華去者不追居者自保不亦可平帝嘉其對然業已建議遂併斷之止留五嶽觀廟而已六月丙午帝將視朝忽見黄衣使者自空中持玉版丹書告曰太上有敕帝愕然不覺下拜使者以詔示帝曰告宇文邕大道經教亘古長存所以保制天地濟度牛靈何關爾事而輒行廢黜以爾爲世主乃蔑棄天命自絶於天非天棄汝胡爲稔惡將速厥辜帝覽之再三使者曰天命靡常不可乆稽即收詔騰空而去帝驚懼累日乃復建通道觀於都城命嚴達主之仍召諸山方士講道德經戊午下詔曰至道弘深混成無際體包空有理極玄幽但岐路旣分源流愈遠淳漓朴散形器斯乖遂使三墨八儒朱紫交競九流七略異說相騰道隱小成其來舊矣不有會歸爭祛靡息今可立通道觀於都城聖哲微言先賢典訓金科玉篆祕賾玄文可以濟養黎元扶成教義者並宜弘闡一以貫之俾夫翫培塿者識嵩岱之崇崛守磧礫者悟渤海之泓澄不亦可乎乃命裒九流之書摘其合於道者並付道藏隋大業七年辛未煬帝親駕征遼樓觀道士岐暉謂門弟子曰天道將改吾猶及見之不過數歲矣或問曰不知來者若何曰當有老君子孫治世此後吾教大與但恐微軀不能久保耳後數年隋果亂大業十三年丁丑老君降于終南山語山人李淳風曰唐公當受天命淳風由是歸唐出金鎻流珠唐高祖皇帝初起義兵於晋陽帝女平陽公主柴紹妻也亦起兵應帝屯於宜壽宫暉逆知眞主將出盡以觀中資糧給其軍及帝至蒲津關暉喜曰此眞君來也必乎定四方矣乃改名爲平定以應之仍發道士八十餘人向關應接帝嘉之乃下詔曰今東應義旗西開幕府設官分職本在忠誠道士岐平定鏟迹求眞銷名離俗恬淡榮利無悶幽閑而能徹損衣資以供戎服抽割菽粟以瞻軍糧忠節不嘉理須標授平定宜受紫金光禄大夫已下並節級授銀靑光禄大夫以酬其義平定力辭曰草莽之臣應接聖君心崇道本黄冠不貴金紫玄教豈向銀靑雖奉殊私理恐非愜帝曰師且受俟得京城别有進止時隋戒牙郎將宋老生屯霍邑以拒義師會霖雨積旬餽運不給高祖命旋師太宗切諫乃止有白衣老父詣軍門曰余爲霍山神大上老君使謁唐公曰八月雨止路出霍邑東南吾當濟師高祖曰此神不欺趙元䘏豈負我哉八月辛巳高祖引師趨霍邑斬老生遂平霍邑十一月初八日遣使詣樓觀設醮祈福是夕白雲如幕蔭覆壇場與香交映又有白鹿一雙來傍殿門長鳴數聲乃去馳驛以聞明日果克京城因改元義寧唐武德元年正月劉武周遣宋金剛舉兵十萬侵晋絳秦王世民擁塵絳州州民吉善行素朴直時避地於晋之臨汾縣大通堡衆令善行往羊角山探賊方行至西北嶺上柳柿兩株間望見坡上有人乗白馬來善行異之即走回到甘棠叢下其人已至從後呼善行住汝勿怖回頭乃見老人鬚髮皓白素衣烏冠執紅拂乗白馬騣尾及蹄皆赤有二靑衣年少裏巾赤鞾侍立左右老人謂善行曰與我語唐天子李果今得聖治社稷延長宜於長安城東置安化宫而設道像則天下太平言訖騰空而去至四月二十七日夜善行在家似有人召之明旦不覺至前所立處復見老人戴金冠衣服乗馬如前謂善行曰吾前語汝記得否答曰並記得老人曰汝即入奏天子道我所言善行曰貧無路糧又無文書如何得達老人曰前程自有汝不須憂善行曰見天子乃非細事未審到京將何爲信曰汝到京當有獻石龜者可以爲信言訖而隱善行往見晋州總管府長史賀若孝義言之時五月三日孝義即留善行至十一日引見秦王具言老人現所言事十三日秦王即差左親衛帥都督杜昂隨善行於所見處設祭拜欲起忽見老人如前現於紫雲之中舉鞭指昂曰汝是何人對曰秦王使者杜昂敬來奉祭老人曰吾不飲不食安用祭焉又指善行曰所有委曲此人知之昂還具言神人復現即具表令昂將善行馳驛入奏五月十九日纔至朝堂門果有知郇州侍中張達獻石似龜有文曰天下安子孫興千萬年乃同入奏高祖大悅七月六日詔授善行朝散大夫敕通事舍人柳憲於羊角山立廟八月二十五日善行至廟所復見老人在二樹間張大帳坐牙牀憑玉几珠花羅網垂覆其上二靑衣童子來侍後有黄衣力士控馬老人問曰天子喜否曰大喜但疑不知聖者姓名老人曰我是無上神仙姓李字伯陽號曰老君即帝祖也亳州谷陽縣有枯檜再生可以爲驗今年平賊後天下太平享國延永語已忽不見善行復以告賀若孝義孝義差襄陽縣主薄席通與善行馳驛入奏高祖賜善行御袍一領并束帛二年五月敕樓觀令鼎新修營老君殿天尊堂及尹眞人廟應觀内屋宇務令寬博稱其瞻仰并賜土田十頃及仙遊監地充莊仍於觀側立監置官檢校修造即以岐平定主觀事三年春帝親詣老君於祠庭平定率道衆迎駕仍具千人之食以獻帝召平定及法師吕道濟監齋趙道隆等並賜坐遂令百官悉就坐飲食謂曰朕之遠祖親來降此朕爲社稷主其可無興建乎乃降詔改樓觀曰宗聖觀賜白米二百石帛一千匹以供觀中修補宗聖觀乃尹眞人之故宅也按宣室志云尹眞人將上昇以石函付門弟子約之曰此函中有符籙不得輒啓大曆中有清河崔君爲犍爲守旣至郡聞有尹眞人函笑謂官屬曰辛垣平之詐見矣即詣觀且命破鎻道士顔申白曰眞人有遺教曰啓吾函者且有大禍幸君侯無犯眞人之約崔君怒曰尹眞人死向千歲安得獨有石函在乎命破其鎻堅不可動崔命以皮絙繫函鼻用數牛拽其絙鞭而祛之石函乃開中有符籙數十軸黄縑丹書炳然如新崔君觀畢曰吾向者意函中有奇寳故開而閱之今徒有符籙而已遂復緘鎻而去是夕暴卒後三日而蘇官屬悉詣謁且訊焉崔君曰吾甚戇未嘗聞神仙事前者開尹眞人石函果爲冥官追攝初見一紫衣吏語吾曰我吏於冥司者也奉命召君固不可拒拒則禍益大矣宜疾去吾始聞之憂欲以辭免然不覺已與使者俱去出郡城僅行五十里至冥司其官即故相吕公也謂吾曰子何爲開尹眞人石函乎今奉上帝命削君之禄壽果何如哉已而召掾吏令按吾禄壽之籍掾吏白曰有官五任有壽十七年今奉上帝符盡奪五任官削十五年壽今獨二年在矣於是聽還後二年果卒五年三月吉善行至羊角山廟前見老君坐堂上憑玉几仙官列侍神丁侍衛龍虎騎從幡幢旌節翳空滿廡傳呼善行前來謂曰亳州廟中枯檜已更生吾孫當王已遣周公旦將神兵助國討黑闥期在四月必破孝義差司兵叅軍馬敬卿馳驛入奏敕令善行乗傳往洛州軍前示諭至期果平黑闥出唐書七年甲申十月帝詣樓觀祀老君初高祖詔玉清觀道士王遠知授朝散大夫賜金縷冠紫絲霞帔以遠知嘗奉老君㫖預告受命之符也遠知陶隱居之弟子初隋煬帝爲晋王鎭揚州起玉清玄壇以處之使者繼至遠知遂來謁見斯須而鬚髮變白王懼而遣之尋復如舊唐太宗討王世充因與房玄齡微服謁之初不相識即迎謂曰方作太平天子願自愛太宗登極親受其法籙加銀靑光禄大夫貞觀九年固請還山敕於茅山置太平觀并度道士二十七人降璽書曰朕昔在藩朝早獲問道眷言風範無忘寤寐近覽來奏請歸舊山已有别敕不違高志所令置觀用表宿心師還山後謂弟子潘師正曰頃見仙格以吾往時誤損一童子吻不得昇天今見召爲少室仙伯將行在即翌日沐浴衣冠焚香而化年一百二十六歲詔贈金紫光禄大夫謚昇眞先生太宗貞觀元年七月丙午敕修太上老君廟於亳州宣尼廟於兖州各給二千户以供享祀九年二月丁卯于闐王遣子來朝貢語及其國土所有云西有毗摩伽藍相傳是老子化胡之所戎俗柔服遂白日昇天國人思慕之爲建伽藍也十一年正月二十五日詔曰老君垂範義在清虚釋迦貽則理存因果求其教也汲引之迹殊途窮其宗也弘益之風齊致然則大道之行肇於邃古原出無名之始事高有形之外邁兩儀而運行包萬物而亭育故能經邦致理返朴還淳至於佛教之興基於西域爰自東漢方被中華神變之理多方報應之縁匪一洎乎近代崇信滋深人覬當年之福家懼來生之禍於是滯俗者聞玄宗而大笑好異者望眞諦而爭歸始波湧於閭里終風靡於朝廷遂使殊俗之典鬱爲衆妙之先諸華之教番居一乗之後流遁忘返于兹累歲朕夙夜寅畏緬惟至道思革前弊納諸軌物況朕之本系出於柱史鼎祚克昌旣憑上德之功天下大定實賴無爲之德宜有改張闡兹玄化自今已後應齋供行立至於稱讚其道士女冠宜在僧尼之前庶厚本之俗暢於九有尊祖之風貽諸萬葉告報天下主者施行二十一年詔譯老子道德二篇爲梵文以賜天竺諸國初唐將受命老君嘗敕華山素靈宫仙宫馬周下佐聖孫創業而周沉湎于酒汩没風塵間二十年栖旅困餒聞袁天綱善相術因詣之以卜休咎天綱目之良久曰五神奔散尸居旦夕耳何相之有耶周大驚問以禳制之術天綱曰可自此直東而行當有老叟騎牛者不得迫而與語但隨其行此災可除矣周如其言未出都門果有老叟騎牛出城周默隨其後繚繞村徑登一大山至山巓叟顧見之下牛坐於樹下語曰太上命汝輔佐聖孫創業拯世何爲昏沉於酒自掇困餓五神已散正氣彫淪旦夕將死而不修省耶周亦懵然未曉叟曰汝本素靈宫仙官今太華仙王使人召汝即入宫闕至大殿之前羽衛森肅若帝王所理趨至簾前有宣言責之者以其受命不恭墮廢所委使還其舊署省愆自訟叟與所司數人送於東廡之外别院中視其門則姓名存焉啓鑰而入罏火鼎器床榻茵席宛如近所棲止沉思乆之忽有五人衣五色之衣立於前曰我等先生五臟神也先生酣酒流蕩濁辱於身我等乆歸此矣請閉目當復於神室也周瞑目頃之忽覺心志明悟頓憶前事二十餘年若旬日間矣復扃鐍所居出仙王之庭稽首謝過再禀其命來詣長安明日復謁天綱天綱驚曰子何所遇耶已有廖矣六十曰當一日九遷百日位至丞相勉自愛也時貞觀中勑武官各貢理國之策周因代郎將常何上封事太宗大悦即日召拜拾遺監察御史裏行自此累居大任至中書令數年一旦群仙降其室曰佐國功成可以退矣太一徴命無復留也翌日無疾而終並出唐史太平廣記所載正與此同高宗龍朔二年二月幸洛陽宫忽然有感因令詢問側近有何古聖靈跡父老奏曰皇城北山先有老子祠每祈請立有福應即勑洛州長史許力士就祠更建清廟掘基得石案及故碑碑題云眞人白君之表即仙人白仲理所立漢天師立北邙治之所也其石案長四尺廣二尺厚二寸高八寸兩頭各有二脚上面鎸太上老君字立殿畢建道場慶讚醮訖忽白光徧殿照耀階壇老君現於光中二眞人夾侍良乆方隱時監宫闈令權大力洛州録事叅軍楊護帥等一十三人同見列狀奏聞有㫖依狀圖寫爲老君瑞像百官表賀有云柱下靈姿散其光於壇宇棟間仙侍流異景於階庭允應至誠宜符睿德豈可與虞致榮光漢延嘉氣靈禽降祀膚葉興封者同年而語哉後至明皇朝命吳道子繪列聖御容於殿及徧畫廊廡宫墻杜工部洛城北謁玄元皇帝廟詩云山河扶繡户日月近雕梁仙李盤根大猗蘭奕葉光世家遺舊史道德付今王畫手看前輩吳生遠擅場森羅移地軸妙絶動宫墻五聖聯龍衮千官列鴈行冕旒皆秀發旂旆盡飛揚身退卑周室經傳拱漢皇谷神如不死養拙更何鄉即此廟也宋朝歐陽文忠公集古録有謁玄元皇帝廟詩跋云唐玄宗撰碑文并書予嘗見世有玄宗所書鶺鴒頌與此字法正同碑在北邙山上洛陽人謂之老君廟也考之此跋則明皇當有御製詩今未及見故不載乾封元年二月二十八日己未帝自東封岱嶽禮畢回駕亳州朝謁老君册上尊號爲太上玄元皇帝御製文曰大道混成先二儀而立稱至人虚己妙萬物以爲言粤若老君朕之本系爰自伏犧之始暨乎姬周之末靈應無象變化多方遊元氣以上昇感日精以下降或從容宇宙吐納風雲或師友帝王丹靑妙化譬陰陽而不測與日月而俱縣屬交喪在辰晦迹柱下大弘雅訓垂範將來雖心齊於太虚而理歸於眞宰若夫絶聖棄智安神寡欲寂寞杳冥之際希夷視聽之表淡爾無爲悠然自得酌之不竭用之不盈執大象以還淳滌玄覽而遣累邈乾坤而長乆跨陶鈞而亭育至矣哉固無得而名也況夫大聖所資克昌寳祚上德所履允屬休期朕嗣膺靈命撫臨億兆總三光之明而夙宵寅畏居四大之重而寢興祗惕盡孝敬於宗祧罄懷柔於幽顯行清靜之化承太平之業登介丘而展采坐明堂而受記飛煙結慶重輪降祥鶴應九歌山呼萬歲越振古而會休徴冠帝先而爲稱首大禮云畢回輿上京肅駕瀨鄉躬奠椒醑仰瑞栢而延佇挹神泉而永歌如在之思旣深敬始之情彌切宜昭元本之奥以彰玄聖之功可追上尊號爲玄元皇帝聖母爲先天太后祠堂廟宇並令修創置令丞各一員以供薦饗仍改谷陽縣爲眞源縣儀鳳三年戊寅四月四日敕遣道士鄭元隱於洛陽北邙山清廟與羅務先等二十四人建齋行道至五月一日丑時至殿東門乃見老君乗白馬朱𩦲并二靑衣童子降于壇上祥光照映顧道士寇義待與語良乆乃隱宫苑北面監朝散大夫孫瑞檢得壇上馬跡有實登即奏聞百官上表賀有曰玄元皇帝見於廟所金相玉毫彩奪夜明之景白駒丹鬛跡留天駟之衢靑童曉引應瓊鍾而降節紫云霄布籠銀漢而高昇固以克昌厥緒惟新景命恢我皇度光乎兆人所以道冠百王慶隆萬葉永綏寳祚克享無期者也帝大悅敕道士自今後宜隸宗正寺可班在諸王之次見朝散大夫孫瑞奏狀儀鳳三年五月詔自今已後道德經並爲上經貢舉人並須兼通則天文明元年甲申廢中宗爲廬陵王欲王諸武二月十八日豫章人鄔元崇以詔詣闕至虢州閿鄉縣龍臺鄉皇天原忽有六仙人皆乗赤龍著雜色衣二人執珠幢四人執霓旌錦傘從西北彩雲中來俯謂元崇曰太上老君來言訖便過須臾間異香芬馥乃見三靑衣童子執香爐雲中過又見二靑衣童子執紅拂如意微笑而過次有四仙人各乗靑龍手執旛節謂元崇曰太上老君來欲與君語言訖而過須臾五色雲中見一道士著淺黄衣鬢髮皆白頭戴花冠作金色乗白獸似騾髮尾皆赤俯謂元崇曰我是太上老君汝帝之元祖元崇即拜老君曰汝隨我來我與汝語元崇不覺已在雲中去地數丈老君令傳言天后說我國家曆數綿遠不得輒立異姓見後有六仙人並乗龍佩劍花冠大幘雜彩之衣光明燦燦手執别物皆不能識分侍左右後有雲車一乗雜彩莊嚴上有大寳蓋花旛垂下五色雲炁圍繞又有乗龍執節持幢侍從無數從人皆長大亦有音樂導從時往來人及閿鄉百姓官吏五百餘人同見莫不遥禮斯須元崇不覺已在地上旣至長安通具奏天后不悅遂遭禁錮尋以閿鄉行宫爲奉仙觀后亦終懼此言不敢立武三思竟復辟於中宗故改元神龍二年復改元景龍敕天下諸州各置景龍觀又改爲中興觀三年再改爲龍興觀至明皇開元中降敕曰洪州人鄔元崇往在文明年中傳玄元皇帝眞誥於天后曰我國祚無窮當千萬君遂遭禁錮因兹淪喪自非忠義之士感激過人孰能不避死亡之誅竟違神靈之命宜與追贈以慰泉壤其子瓊亦依資授一官制曰故洪州人鄔元崇往者來應嘉招次于虢略忽觀玄元皇帝俾之昇雲空中與言使戒天后表國祚中興之運示寳曆無疆之期遂能不顧其身來傳此㫖竟遭幽縶諒可傷嗟自非竭節本朝孰肯犯顔兹日宜加追贈用慰幽魂可贈棣州刺史萬歲通天元年丙申東都福先寺僧惠澄表乞除毁老子化胡經敕秋官侍郎集成均監弘文館學士詳議化胡經議太中大夫守秋官侍郎上柱國劉如璿議曰李釋元同未始有異法身道體應現無方降跡誕靈各行其化且老子發自東方遠之西域雖莫知其終而事見之前史謹按後漢書云老子入夷狄爲浮屠之化高士傳曰老子化戎俗爲浮屠皇朝實録云于闐國西五百里有毗摩伽藍是老子化胡之所建老子至是白日昇天與群胡辭决曰我昔遊天上簡定人鬼之録尋當下降因立此祠焉然則歷考經典煥乎可矚則知化胡是實爲經不虚浮屠即佛陀也化俗豈無經乎但聖人設教應物施行況復中人上士性分有殊道佛二門隨性開化洪通兩教不亦宜乎宣德郎行右補闕弘文館學士張思道議曰老君見形東土演教西方事著前書跡彰往諜化胡是實爲經不虚言包天地之先理起文範之表或則恂恂接物爰開柔弱之宗或則察察繩非乃挫剛强之力隨機設教妙㫖難量應病施方聖功莫測云云朝散大夫行太子宫尹兼弘文館學士張元簡議曰大道圓通隨方感應在胡在漢只轉我身居中夏則暢清淨之眞風適西戎則現神通之變化云云中散大夫行太子曲膳郎上柱國張太元議曰道本中華釋垂西域隨方設教同體異名且老君變化無方易形改號或在天爲帝或在世爲師隨物見形靈應難測縱使史籍無據釋教不異老君云云成均監大學士王方回議曰史記云老子過關爲尹喜說道德經五千餘言而莫知所終又劉向列仙傳曰老子好養氣重無名乆而入大秦乃知眞聖人也又西域傳云老子與尹喜俱至流沙莫知所終云云成均監大學博士吳揚昊議曰史記云老子楚人也生於商時爲守藏史孔子適周問禮於老子老子曰子之所言者其人骨已朽矣獨其言在耳吾聞之良賈深藏若虚君子盛德容貌若愚去子之驕氣與淫欲皆無益於子之身吾所以告子若是也孔子歸謂弟子曰吾今日見老君其猶龍耶老子出關尹喜曰子將隱矣願爲我著書於是作道德經五千餘言莫知所終或言老子一百六十歲或言一千二百歲罔知其然又劉向列仙傳云老子好養氣重無名乆而入大秦乃知其聖人也云云弘文館學士賜紫金魚袋員半千議曰謹按范蔚宗後漢裴楷傳魏略西域傳兼北史西域傳及周隋等十餘家書傳並云老子西入流沙皆稱化胡云云弘文館大學士仍守諸王侍讀崔元悟議曰據佛普曜瑞應長阿含等經并中元記高士傳及晋宋齊梁周隋等十餘家書傳並云佛生周莊王九年癸已歲四月八日云云萬歲通天元年六月十五日敕㫖老君化胡典誥攸著豈容僧輩妄請削除故知偏辭難以憑據當依對定僉議惟允倘若史籍無據俗官何忍虚承明知化胡是眞非謬云云按唐書藝文誌丙部載議化胡經狀一卷云萬歲通天元年僧惠澄上言乞毁老子化胡經敕秋官侍郎劉如璿等議葉法善處州人也年七歲時嘗溺於水中其家以爲死也後三年而還父母問其故曰靑童引我飲以雲漿復引朝太上老君老君領而留之故乆耳弱冠身長九尺性淳潔不茹葷常獨處幽室或遊林澤自仙府歸還已有役使之術遂卜居卯酉山其門近山巨石當路師投符起石須臾飛去衆共驚異嘗遊括蒼白馬山石室内遇三神人皆錦衣寳冠謂師曰我奉太上老君命以密㫖告子子本太極紫微左仙卿以校録不勤謫於人世速宜立功濟人佐國功滿當復舊任以正一三五之法今授於子宜勉之焉言訖而去自是誅蕩兇妖所在以救人爲志高宗召至京拜上卿不就請度牒爲道士則天召至神都中宗復位武三思尚秉國權師以頻察妖祥保護中宗相王及玄宗爲三思所忌竄於南海歲餘入洪州西山養神修道景龍四年辛亥三月九日括蒼三神人又降傳太上之命云汝當輔我睿宗及開元聖帝未可隱迹山岩以曠委任言訖而去時二帝未立而廟號年號皆預以告其年八月果有詔赴闕後平韋后立相王睿宗玄宗繼統凡吉凶動靜必預奏聞會吐番遣使進寳函對題曰請陛下自開毋令他人知機密朝𨑳默然唯法善曰自是凶函宜令番使自開玄宗從之函中弩發中番使死果如法善言俄授銀靑光禄大夫鴻臚卿員外置越國公景龍觀主按太平廣記所載與此正同中宗景龍四年庚戌六月韋庶人旣害中宗復擅朝政又將不利於睿宗明皇時爲臨淄王謀平内難疑不能决老君乃化身爲一白衣老叟賣卜於春明門外王請筮之俄有蓍一莖突然飛出挺立空中老叟笑曰此卦宜取天下爲君吉餘並凶利在三日内王乃與劉幽求鍾紹京入定謀誅韋后立睿宗即命搜訪賣卜老叟莫知處所亦不知其爲老君也遂於其地立廟號阿父神親制碑詞及書之長安之人至今祀之洛中紀異玄宗開元三年二月十五日丁卯以老君降生之辰爲玄元節御製玄元皇帝讚曰爰有上德生而長年白髮垂相紫氣浮天含光默默永劫綿綿萬教之祖號曰玄元東訓尼父西化金仙百王取法累聖攸傳函谷關右經留五千道非常道玄之又玄親以紅粉版八分書置老君殿寳帳額上詔改羊角山爲龍角山改廟爲慶唐觀御製碑文塑高祖太宗高宗中宗睿宗玄宗六聖御容列侍焉帝東封迴謁老君於亳州舊宅親札道德經鎸石作大憧造八角樓覆之於虚無殿之前元年辛酉亳州舊宅枯檜歲乆道士欲斫去之隨所斫木柹上有朱書乾元亨利貞五字點畫精妙片片有之具事上奏詔曰瑞木表靈奇文自現用彰大慶以福洪圖配五德於易經迎萬葉於休運宣誠告謝仍付史官其柹藏於内庫兼賜諸王宰輔及道衆三月置石幢於景龍觀命天台山道士司馬承禎依蔡邕石經三體書寫老君道德經鎸之今有漆版本在天台山崇道觀亦子微親札也十一年癸亥蒲州奏因建玄元廟開地獲玉石形如半月後有仙人搗藥之狀扣之其聲清越敕送至太原府玄元觀號偃月磬非齋醮不得擊後東都留守張琦奏汝州魯山縣修仙居古觀獲玉瑛扣之聲聞數里命置於太清宫聖祖殿齋壇中用今雲版之類也又衢州建觀穿地獲一魚長三尺狀如鐵微紫碧色其光瑩如玉雕琢殆非人工扣之甚響其魚亦不能名遂獻于朝帝宣示百僚莫能辨者帝命呼爲瑞魚磬命置於太微宫遇齋講則擊之於是諸宫觀競以木石模之以代集衆宫觀有木魚自兹始也十四年九月制曰玄元皇帝仙聖宗師國家本系昔草昧之始告受命之期高祖應之遂於神降之所置廟改縣曰神山近日廟庭屢彰嘉瑞虔荷靈應祇慶載深宜令本州擇精誠道士七人於龍角山廟中潔齋焚香以崇敬奉十七年四月八日蜀州新津縣新興尼寺設齋有一道流後至就坐僧衆輕之不爲設食道流徐起入殿中乆而不出齋罷衆人入殿尋求無復蹤跡忽現形像在殿柱中隱起分明以刀削之益加精好眉鬚鬢髮細如圖畫雲冠霞衣冠上有物如鴛鴦足下方頭履下有蓮花花後有荷葉葉上有龜左肘後雲片蓮焰光中有龍首右肩之前有虎形回顧於左周身光焰雲葉天花上有大花如蓋覆蔭其身益州大都督府長史張敬忠奏云當管蜀州新津縣新興尼寺佛殿柱上自然木文隱起爲一老君聖像頂上有華蓋足下前後各有雲葉天花一十三處謹差判官王大鍾驗覈得與蜀州刺史李忠詢别駕盧昉縣令李韶道士僧尼等一百三十人同狀云自然木文眞容隱起神迹殊妙洗削愈明非圖書所能成非雕刻所能及伏以太上老君先天大聖變化不常潜現難測又云瑞花旁繞知芳輝之不歇華蓋上浮明魄寳之常貴現於殿柱杳疑作史之年照彼佛祠緬若化胡之日雖鳳巢軒閣麟伏周庭豈若仙祖降靈聖孫膺運伏望册歡九廟昭配兩儀編付史官布告天下表奏五月二十四日差内侍林昭隱就蜀迎取像柱令作寳輿立安至京就大同殿禮謁三日大齋訖令衛尉移於東明觀陳設奉安許士庶瞻禮次令兩街諸觀各供養七日却進入内敕曰道體無方元宗有應形標柱史名叶新興宗廟垂休生靈蒙福宜付史館宣示四方十八年十月命集賢院學士陳希烈等於三殿講道德經侍中裴光庭等奏曰堯舜以揖遜而理湯武以干戈而興或勞神以苦形且役志而焦慮有生之類雖亦聞於小康無爲之風故未臻於大道今陛下化成天下與道玄同小其有爲之迹弘此不言之教將以去華歸本削僞存眞其唯道德之鄉固在老莊之術遂命集賢院學士中書舍人陳希烈諫議大夫王迥質侍講學士宗正少卿康子元贊善大夫馮朝隱等於三殿侍講敷暢眞文演襄城之七聖及姑山之四子理之於國惟清惟靜之風修之於身乆視長生之道聖化玄運寰瀛樂康咸日用而不知實曠代之未有臣忝職司望編入史策宣示天下帝手詔報曰朕虔守宗祧祗膺曆數夙夜兢惕懼不克勝求賢臣而委之謀獻延學士而咨其博洽用扶不逮雅致咸和旣内平而外成且刑清而訟息端拱多暇留意典墳以爲道者玄妙之宗德爲教化之本講諷微㫖稽詳秘文庶無爲而政成不宰而物應豈敢比德堯舜論功禹湯者哉然必先正其心深思逮於遐邇務惟齊俗亦欲申於兆庶必若同歸清靜共守玄默所陳編示良用多慙十九年二月十五日夜帝夢神人謂曰吾是九天使者受玄元正眞玉皇帝命帝即汝祖太上老君也命我爲隨運採訪九天九地十方三界總司九天司命居舒之潜山九天丈人居蜀之靑城吾居江之廬山皆可立廟五百年後福及生靈帝晨興焚香望空禮謝忽復見於雲端衛從靄空即命吳道子依所見圖之遣使齎本於三山創立祠宇二十一年癸酉春正月庚子朔制曰老子道德經宜令士庶家藏一本每年貢舉人量减尚書論語策一兩條准數加老子策俾尊崇道本弘益化源今之此敕亦宜家置一本每須三省以識朕懷侍中裴光庭等奏曰伏見昨日一敕教示百僚爰及兆庶聖恩溥洽德澤如天亦旣生成載加誨朂莫不遷善咸知向方臣忝在樞衡未有弘益忽承天奬曠若發蒙雖羲軒上皇堯舜至德無以加也天下幸甚望編入國史以示將來從之詔答曰玄元之教家國是資匪爲先宗貴申道本所以首歲元日因行春令清靜之政期諸相國乎爲官擇才可以先淳素也十二月侍講學士陳希烈等講書畢黄門侍郎同中書門下平章事裴耀卿等奏曰臣等伏承陛下講讀尚書周易道德莊列畢聖心弘道國訓崇儒玄風遠被更自兹始況以事因四海念切萬方日旰罷朝旣披文於内殿風迴開俗亦函丈於行宫漢皇一夜無以過此悟老莊之㫖齊物而仁恕以行運堯舜之心稽古則憲章攸備鉤深致遠不疾而速陶鈞庶類品物之歡幸寳深弘奬大猷簡策之輝光載遠臣等叨陪獻納竊奉徽音慶耀之誠倍百常品伏望宣布史官騰芳盛烈帝手詔報曰尚書雅誥周易精微朕幼奉師資未窮奥義故時令講及道德經遞爲表裏詳其所指觸類繁多旣問廣成之道復得方明之相況之今日千載一時故弘斯義以喻卿也文武百官尚書右丞相集賢院學士蕭嵩等奏曰伏見去年以來有敕令集賢院學士工部侍郎陳希烈諫議大夫王迥質膳部郎中馮朝隱等每日侍講玄元皇帝道德經及周易尚書莊子等以今月二十四日講畢臣聞堯收上代之文以成其聖舜觀古人之象以著其明是知道有可尊禮忘於貴不唯聚學將以軌人伏惟皇帝陛下明實天聰舉惟聖作道風允洽文教克成尚猶以廣生知以從積學事必稽古書皆造微尊祖而習老經體天而觀易象追廣成之說則問以莊篇考唐郊之舊則詳於堯典日者北祠后土東幸温泉或地涉風沙或天將寒雪而講筵必集帳殿如初足以知好學之志彰克勤之德雖庖羲畫卦夏禹受書曷以臻兹臣等忝在朝列預聞帝道伏請宣付史官頒示天下帝手制答曰爰聞集賢引進儒道退朝講讀蓋亦其常歲月周旋頗尋章句其雅誥則稽之於古以質于今其道德經則取之於眞不崇其教理國之要可不然乎宣付史官依卿所請二十三年三月癸未親注老子並修疏義八
