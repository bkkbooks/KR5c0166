body:
  text: 宋觀復大師高士謝守灝編老君憫周衰之末俗益澆訛乃分身住世以拯救時遯迹陜河之濱不顯姓字人因呼爲河上丈人亦曰河上公嘗以道授安期生安期生後授馬鳴生馬鳴生授陰長生陰長生授爾朱先生後莫知其所傳馬鳴生一作明本姓和字君賢爲縣吏捕賊被重傷垂死遇太眞王夫人以藥活之君賢念無以報乞備役使意欲求其治金瘡之方耳不知爲神仙也服勤歲乆夫人見其敬仰靈氣廉謹如初乃謂之曰吾所行之道非高眞不可傳不可以教初學者安期生有金液還丹之法明日生來吾當以汝付之汝隨之乆當得其道也明日安期果至夫人遂以君賢囑之君賢隨安期生去事之幾二十年遂授以丹訣鍊成服之白日昇天陰長生後漢陰皇后之親屬少好道術聞馬明生得度世之道乃乆執奴僕之役十有餘年明生不教以道而但談俗事同事之者十二人皆怨恚辭去獨陰君禮敬彌篤明生乃告之曰子是眞得道者乃立壇歃血授以神丹之訣後於忠州平都山修煉服之白日昇天其自序云惟漢延光元年新野山之北受神丹要訣道成去世則藏名山如有得者列爲眞人行乎去來何爲俗間不死之道要在神丹行氣導引俯仰屈伸服食草木可得少延不得永度以致神仙子欲聞之此是要言積學所致不爲有神上士爲之勉力劬勤下士大笑以爲不然能知神丹乆視長存於是以黄素及金簡寫丹經三通各藏於嵩華及綏山縑書一通付弟子世世常有所傳云安期生又嘗别授毛翕公毛翕公授樂瑕公樂瑕公授樂巨公樂巨公授蓋公按史記曰樂毅之族有樂巨公善修黄老言其本師曰河上丈人不知其所出河上丈人教安期生安期生教毛翕公毛翕公教樂瑕公樂瑕公教樂巨公樂巨公教蓋公蓋公教於高密膠西爲曹相國師又曰惠帝元年曹參相齊盡召長老諸生問所以安集百姓諸儒以百數言人人殊參未知所定聞蓋公善治黄老言使人厚幣請之公爲言治道貴清靜而民自定推此類具言之參用其術相齊九年齊國安集漢孝文皇帝及竇太后皆好老子言詔諸王大臣悉令誦習史記儒林傳云孝文帝好刑名景帝黜儒術竇太后好黄老漢書外戚傳云竇太后好黄帝老子之言景帝與外戚不得貴尚之據此乃景帝好之今言文帝何也豈非竇后之所以好者亦由文帝好之歟班固揚雄傳讚云老聃著虚無之言二篇薄仁義非禮學然後世好之者尚以爲過於五經自漢文景之君皆有是言則文帝亦好老子但不如好刑名爲切耳每搜訪遣逸之士解其義者或告曰河濱有老人人莫知其姓名呼爲河上公嘗誦道德二篇詣試咨之帝聞之乃遣使問以經㫖老人曰道尊德貴非可遥問帝乃命駕詣之帝降輦致恭公倨坐於草廬之中帝不懌因謂曰普天之下莫非王士率上之濱莫非王臣域中四大王居其一子雖有道猶朕民也不能自屈何太高乎公撫掌大笑坐躍去地數十丈止於太虚之中俯而答曰予上不在天中不累人下不居地何民之有帝乃知其爲神人即稽首禮謝曰朕以寡德纂承先業材小任大懼不克堪雖治世事而心勤道德直以愚昧厥未燭禮惟蒙道君有以教之公乃授帝素書二編曰熟硏此則所疑自决無事多言余著此書以來一千七百餘歲凡傳三人并子四矣言畢雲霧四合天地晦㝠失公所在出史記及抱朴子神仙傳今有河上公廟在陜府之北并文帝望仙臺遣迹並存神仙傳謂河上公騰虚又言起霧而去或以此言爲誕因爲老子說經當周昭之時至文帝之日無千七百年併以爲非然漢邊韶作老子祠堂碑稱老子自義皇以來世爲帝者作師而内傳載舜時爲師號尹壽子作道德經即是經其來乆矣尹喜雖請老君著書何妨老君重述舊典乎公所授素書二編即道德正經也旣蒙惠光加被則心靈自悟何假詮說今世所傳河上公注老子者蓋後人誤以著爲註遂依放而託之者唐劉之幾修三教珠英亦謂老子無河上公注蓋秦漢以前經典並無注解況云吾道甚易知又安用自加詮釋耶孝武皇帝好道慕仙徧祀名山冀有所遇而黷武不已縱欲無厭老君命西王母與上元夫人同降其庭察其精誠隨機而開誨之王母謂之曰夫欲脩身先當營其氣太仙眞經所謂行益易之道益者益精易者易形也能益能易名上仙籍不易不益不離死厄行益易者常思念靈寳靈者神也寳者精也子但受精固氣氣化爲血血化爲精精化爲神神化爲液液化爲髓行之不倦神精充溢爲之一年益氣二年益血三年益精四年益脉五年易髓六年易筋七年易骨八年易髮九年易形形易則變化變化則成道成道則爲仙人矣上元夫人謂帝曰汝好道乎聞汝數招方術祭山嶽祠靈禱河亦爲勤矣勤而不獲實有由也汝胎性暴胎性淫胎性奢胎性酷胎性賊五者截身之刀鋸刳命之斧斤也雖復志好長生不能遣兹五事徒爾自勞但得小益以自搘拄耳若自今已往寫汝五性反諸柔善明務察下兹念務寬惠貧恤寡薄賦愛身常爲陰德救濟死厄去諸淫養汝神放諸奢處至儉勤齋戒節飲食鳴天鼓飲玉漿蕩華池叩金梁按而行之當有冀耳乃遣侍女紀羅容到扶廣山勑靑眞小童出三天太上所撰左右六甲靈飛致神之方欲以授帝靑眞回報曰阿昌言受教承阿母相邀詣劉徹家不意天靈至尊下降於臭濁不審起居比來何如侍女紀羅容至云尊母欲得金書祕字六甲靈妃左右策精之文十二事欲授劉徹輒封一通付信且徹雖有心寔非仙才詎宜以傳泄於行尸乎昌近在帝所見有上言之者甚衆云山鬼哭於叢林孤魂號於絶域興師歸而族有功忘兵勞而縱白骨煩擾黔首淫酷自恣罪已彰於太上怨已見於天氣囂言互聞必不得度世也奉尊見敕不敢違耳王母笑曰言此子者誠多然帝亦不必推也夫好慕仙道者精誠志念齋戒思愆輒除過一百克己反善奉敬眞神存眞守一行此一月輒除過一千徹念道累年心亦勤矣累禱名山願求度脱校計功過殆已相掩但自今已去勤修志誠奉上元夫人之言不宜復奢淫暴虐使萬兆勞殘冤魂窮鬼有破掘之訴流血之尸忘功賞之辭耳夫人乃起立執玉笈鳳文之藴仰天而呪曰九天浩洞太山耀靈神照玄微清虚朗明清靈者妙守氣者生至念道臻寂感眞成役神形辱安精年榮授徹靈飛及此六丁左右招神天光策精可以步虚可以隱形長生乆視還白留靑違犯洩漏禍必旋傾反是天眞必沉幽冥爾其戒禍敢告劉生言畢夫人以一手摘所施用節度以示焉王母授以五嶽眞形圖帝拜受併以寳函奉安於栢梁臺帝自受法六年意氣清暢自謂神眞見降必當度世恃此不修至德更興臺館勞弊萬民殺伐不休路盈怨歎至太初元年十一月乙酉天灾栢梁臺眞形圖并靈飛經籙十二事及自撰所授凡十四卷并函並失累祈王母不復降矣至天漢二年八月壬辰老君復遣衛叔卿來見帝時帝閑居殿上忽見羽衣星冠乗雲車駕白鹿而至驚問爲誰答曰中山衛叔卿也帝曰子若是中山人乃朕臣也可前共語叔卿忽然不知所在帝甚悔恨即遣梁栢至中山推求之不得見但將其子度世還見帝帝問云汝父今何在對曰臣父少好仙道不交世事委家而去已四十年矣云當入太華山也帝復遣梁柏與度世共至華山尋之至絶巖之下望見叔卿與數人博戲於巖上紫雲覆之白玉爲牀又有數仙童持幛節立其後度世望而再拜叔卿曰汝何爲來度世曰帝甚恨前日倉卒不得與父言今故遣使者梁柏與度世共來願更得見父也叔卿曰我前爲太上所遣欲告以大灾之期及救危厄之法國祚可延而强梁自貴不識眞道而反欲臣我不足告語是以去耳今當與中黄太一共定天元吾終不復往也梁柏還奏帝悔之太史公司馬談尤明老子之道嘗論六家之書要指著于史記曰道家使人精神專一動合無形贍足萬物其爲術也因陰陽之大順采儒墨之善撮名法之要與時遷移應物變化立俗施事無所不宜指約而易操事少而功多爲陰陽者使人拘而多畏爲儒者博而寡要勞而少功爲墨者儉而難遵法家嚴而少恩名家苛察而善失眞唯老氏之教稱爲大道焉曰無爲又曰無不爲其實易行其辭難知以虚無爲本以因循爲用無成勢無常形故能救萬物之情不爲物先不爲物後故能爲萬物主有法無法因時有爲有度無度因物與合賢不肖自明白黑乃形在所欲用何事不成乃合大道混混冥冥光輝天下復反無明凡人所生者神也所託者形也神太用則竭形大勞則弊形神離則死死者不可復生離者不可復反故聖人重之由是觀之神者生之本也形者生之具也不先定其神而曰我有以治天下何由哉是以先黄老而後六經焉出史記前漢藝文志云道家者流秉要執本清虚以自守卑弱以自持此君人南面之術也趙榮歐陽文忠公崇文總叙云道家者流本清虚去健羡泊然自守故曰我無爲而民自化我好靜而民自正雖聖人南面而治不可易也或不宄其本棄去仁義而歸之自然以因循爲用則儒者病之孝元皇帝初元五年丁丑四月三日老君以天皇大帝命賜仙人茅盈神璽玉章盈字叔申咸陽南關人生於景帝中五年丙申年十八委家學道入常山採芝术而食常誦道德經及周易六年聞西城總眞王君有道徑往求師登高涉峻超榛冒險卒遇之遂得執巾履之役凡十七年不敢懈怠王君使盈主領衣書圖籙後三年乃將盈同乗九蓋之車造白玉龜臺謁西王母王君稽首而退王母曰總眞今乃挾肉人以登靈臺不亦勞平王君笑而不答因目盈起拜請乞奇要盈乃叩頭再拜曰盈小醜賤生枯骨之餘敢以朝菌之質竊求積朔之期是以負笈幽林貪師所生王君哀盈艱若見授治身之要服氣之法師重見告宜更訪求長易之益豈圖今日遭遇一睹聖姿願賜長生之術警悟於行尸之身王母授以玉珮金璫之經太極玄眞之法修習三年王君又賜以九轉還丹一劑謂之曰子道已成可以返矣後當授爾仙任於吳越也君乃辭歸侍父母其鄉里先有枉死雖乆葬者皆敕地司令其還生在家晦迹五十三年後父母俱終行喪如禮二弟固衷並仕漢朝固爲武威太守衷爲上郡太守同日之任餞送者車馬塞途盈時已得王君密㫖報以昇舉之期因徧告送客曰吾雖不作二千石亦當有神靈之職來年四月三日諸君能來顧如今日否衆皆欣然相諾時元帝初元四年也明年送客如期而集數倍於前是日老君以天皇大帝命遣逸域宫繡衣使者冷廣子期授盈以神璽玉章太微天帝君亦遣三天左宫直御管條賜盈以八龍錦輿紫羽華衣太上大道君遣協晨大夫石叔門賜盈以金虎眞符流金之鈴金闕聖君命太極眞人使正一上玄玉郎王忠鮑丘等賜盈四節燕胎流明神芝長曜靈飛夜光洞草使拜而食之佩璽服衣正冠北首帶符握鈴而立四使者告盈曰食太極四節隱芝者位爲眞卿食金闕燕胎玉芝者位爲司命食東宫流明金英者位爲司録食長曜靈飛者位爲眞伯食夜光洞草者主總左右御史之任子已盡食之矣壽同天地當爲司命上眞東嶽卿君都統吳越之神仙綜帥江左之山源也言畢使者各去須臾五帝君各乗方面色車從群官來下受大帝之命授盈司命東嶽上卿之册加九錫以紫玉爲版黄金刻之文曰惟盈虚挺遠朗幽耽玄妙爰自童蒙散髮北山靜心林澤精思求神登峻履谷艱尋師門擲形絶堮投軀萬津丹誠率任肆其天然遂造明匠乃授靈篇翦髮祝𧵥音去殘首截身帶索自樂不恥饑寒所適唯道所保以眞情昭上帝感激太玄今故授盈位爲太元眞人領東嶽上卿司命神君君平心正格秉操金石丹心矯衆棲神高映今故報盈以玉鉞緑旌八威之策使盈征伐源澤折衝萬神君寒凍林谷味玄仰眞思激窮岫啓心精誠今故報盈以紫髦之節藕敷華冠使盈招驅萬靈封山召雲君棄家獨往離親樂仙契闊嶮巇冬祖山川今故報盈以繡羽紫帔丹靑飛羣使盈從容霄階携命玉眞君步驟深藪足履危仞心耽志尚曾不愆憚今故報盈以班龍之輿素虎之軿使盈游宴太空飛輪帝庭君披榛併景寒凌霜雪心求明眞不戰不慄今故報盈以曲神寳蓋瓊幃玉室使盈遊盻九宫靜神温密君遠利遁榮無疲於心潜形幽嶽靜思萬林今故報盈以流金火鈴雙珠月明可以上聞太極通音上清君貞心高靜淫累不經素挺皓映内外坦平今故報盈以錦旌繡旛白羽玄竿可以呼召六陰玉女侍軒君慈向觸物陰德萬生蠢動之毛皆念經營今故報盈以鳳鸞之簫金鐘玉磬可以和神虚館樂眞舞靈君饑渴養神艱辛求眞萬物不能致其感千邪不能毁其淳今故賜盈紫林之腴玉漿金甖可以壽同三光刻簡丹瓊也君標領清玄紫緯八映心輝重離神躍太霞實眞人之長者故以太元爲號君九德旣備感積太微天人虚白不期同歸今酬九事以報往懷盈心神方期四靈所棲丹誠啓煥秉眞不回正任全固鑑無照微今屈宰上卿總括東嶽又加司命之任以領録圖籍給玉童玉女各四十人以出入太微受事太極也治宫赤城玉洞之府盈其蒞之動靜以聞時年百二歲君旣受策將駕龍輿顧謂人曰眞道隱跡不應表顯動耀視聽吾今所以爾者欲以誘勸二弟令其追慕也且令天下有心者皆知向道耳二弟聞吾此去或釋官委禄來尋我今當權停江水之東句曲山也言畢乃登羽車旌幢鬱鬱參駕龍虎浮空而去二弟聞君昇仙皆棄官還家永光元年渡江尋君於句曲君教以變枯潤骨之法二君精勤備至積二十四年盈又啓王君賜以九轉還丹服之成道至成帝永始三年丁未乃將二弟同詣金闕下請聖君受書於是太上遣朱宫使者齎紫策中君曰太上天眞書言咸陽茅固家于南關厥字季偉受名當仙位爲定録兼統地眞使保舉有道年命相關勤恭所蒞四極法令宫館洞臺治丹陽句曲之山固其勗之動靜察聞又曰盈固弟衷挺業該清雖晚反正思微徹誠斷馘六天才穎標明今屈司三官保命建名總括岱宗領死記生位爲地仙九宫之英勸教童蒙開導方成教訓女官授諸妙靈蒞治百鬼典崇校精開察水源江海流傾封掌金谷藏録玉漿監植龍芝洞草夜光治于良常之山帶北洞之口鎭陰宫之門使者授書訖盈與二弟辭金闕而歸所治之鄉至哀帝元壽二年庚申八月十八日己酉司命君與二弟别曰吾今去當任職不復數相往來要當一年三月十八日十二月二日期邀吾師及南嶽太靈赤眞人來過此山有好道者待我於是吾自當有以教訓之乃與王君並駕同之赤城玉洞舊傳載司命受錫飛昇並在二弟金闕受書之後竊疑傳誤且如之句曲登羽車杖紫髦之節文武官數百人未受錫命安得有此己未飛昇如何將得二弟詣金闕耶孝成皇帝河平二年甲午老君化身下降遊于琅耶郡曲陽淵今閏州有曲陽山有神溪水定州亦有曲陽山有神溪水海州有曲陽城北有羽潭水壽州有曲陽城又有北溪水而干吉與其弟子宫崇並琅耶人必海州曲陽也時北海人干室後改名吉世好道術忽得痼疾經十餘年百藥不能愈乃晨夕焚香哀告上天願賜救度老君感其精誠乃令仙人帛和爲賣藥翁於市中吉往問之帛謂曰卿審欲得疾愈者明日雞鳴時來大橋北木蘭樹下當教卿愈疾之方明日雞鳴吉往到其處而帛已先在怒曰不欲愈耶去明日夜半時來於是吉初夜便往候之乆而帛至乃出素書二卷赤界靑首朱目號太平靑領書以授吉曰此太上老君太平經也卿得此書非但愈疾而已當得長生化行天下吉拜受訖踴躍悲感其疾頓愈老君復降親授其㫖遂編前經成百七十卷出後漢書按後漢書云初順帝時琅耶人宫崇詣闕上獻其師干吉於曲陽淵水上所得神書一百七十卷皆縹素朱界靑首朱目號太平靑領書言吉親受於老君今道家太平經也其經以甲乙丙丁戊己庚辛壬癸爲部每部一十七卷縹靑白也素縑也以朱爲界道首幖也目題目也太平經曰吾書中善者悉使靑首而丹目合乎吾之道也廼丹靑之信也靑之者主生仁而有心赤之者太陽天上之正色也吉得其㫖遂以修身養性消災治病無不驗者其要曰夫人之生也天付之以神地付之以精中和付之以炁人能保精愛神護炁内則致身長生外則致國太平又曰人臣之行當上愛其君欲以長生爲人子者當念父母畏其將老風化其意使之入道常爲求索奇方殊術以奉君親爲人弟子者當念緑師恩夫人生於父母成道德於師得尊榮於君每念君父師將老無以復之或行學更事賢明求奇方異法而資益之此乃應太古上皇最善忠臣孝子順弟子也人皆爲之則天下太平矣有心之人所作皆善言行精實心自尅責洒心易行感動於上受天施恩輒言報謝精專不怠得致神仙其方曰吾字十一名爲士丙午丁未爲祖始四口治事萬物理子巾用角治其右潜龍勿用坎爲巳人得見之壽長乆居天地間活而已治萬百人仙可待善理病者勿期紿樂莫樂乎長安市使人壽若西王母比若四時周反始九十字策傳方士蓋神丹奇策可以奉君父師者焉又出科戒祭酒之法以付吉吉後奉經行道分布弟子置男官女官廣化人民四方歸嚮後漢章帝元和二年老君復降詰責吉曰吾前授汝道助國扶命憂念萬兆而頃以來諸男女弟子託吾位號貪財縱欲驕倨自大嫉賢妬才更相是非皆不當爾故來語汝吉稽首伏地叩頭百下曰唯唯願太上赦旣往之罪容臣修將來之善從今日已往不知當何以救諸男女弟子之譴謫老君曰汝善聽汝善聽人生雖壽萬年不持戒律與老木乆石何異寧一日持戒爲道德之人而死不忍犯戒而生持戒者上補天官尸解昇仙世人雖爲王公上至帝皇脱有重罪無益魂神可以痛耶明奉吾戒以教授之乃爲說一百八十戒訖又語吉曰往古仙聖皆從此得道道本無形從師得成道不可廢師不可輕吉稽首受命再拜而謝按後漢裴楷傳云楷孝桓帝時復上書言前者宫崇所獻神書專以奉天地順五行爲本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國嗣不興楷言多切直帝不能用章懷太子注引太平經興帝王篇曰眞人問神人曰吾欲使帝王立致太平其可聞耶神人言但順天地之道不失銖分則立致太平元炁有三名爲太陽太陰中和形體有三名爲天地人天有三名爲日月星北極爲中也地有三名爲山川與平土人有三名爲父母子政有三名爲君臣民此三者常相得腹心不失銖分使其同憂合成一家立致太平延年不疑也靈帝即位以楷言爲然太傅陳蕃舉楷方正不就鄉里宗之每太守至輒致禮清平中與荀爽鄭元或作玄字俱以博士召不至范曄論曰古人有云善言天者必有驗於人而張衡亦云天文曆數陰陽占候今所宜急也郎顗裴楷能仰瞻俯察參諸人事禍福吉凶旣應引之教義亦眀此蓋道術所以有補於時後人所當取鑑者也吉後寓居會稽孫策平江東見士民事吉如神遂招爲客留軍中將士多疾疫請吉噀水輒差將士咸崇仰吉旦先拜吉而後朝策策怒乃收吉責數曰天乆旱水道不能君安坐船中作鬼態束吾將士敗吾部曲今當相除即縛吉暴使請雨若能感天今日日中大雨者當相原不者加誅俄而雲興雨大注策竟殺吉將士涕泣欲收葬俄失其尸策尋爲許貢伏客所傷覽鏡見吉在鏡中策大驚擲鏡大呼創裂而死吉尚周旋人間百餘年然後仙去已上元未注所出此略見太平經序太平經本文安帝永初三年己酉二月老君降于泰山遣泰山使者雅羽以車騎召江夏善士劉圖欲使校定天下簿籍圖至見老君當殿南面而坐太上居東西向九天仙君居南北向八極天君居西東向命圖與官屬校定天下名籍三日而畢老君欲示圖以罪福報應乃令羽將圖入地獄凡至八十一重圖見父在獄受苦出告老君爲父哀求乃命釋之又令將圖至天堂見大清宫中金臺玉殿音樂自然仙眞多著靑衣執金簡歌誦經文觀畢遣回圖因此得道遂爲道士後亦仙去見唐史紀聖賦及應元圖順帝漢安元年壬午正月十五日老君乗雲車群仙侍衛降于蜀之臨卭鶴鳴山張陵修鍊之所敕神人呼陵至前謂曰子祖張良積功致德垂福後嗣子命應爲道士即授以新出正一盟威秘籙俾除蕩六天故炁以清化天下及朝拜日月高奔鬱儀結璘之訣令修習之自是百姓翕然奉之爲師弟子至數萬民有疾患官灾隨事輸米絹絲綿雜器紙筆樵薪之屬以贖罪并疏其過惡而懺謝之誓不敢復犯灾難隨解由是民皆樂從莫敢爲非初陵後名道陵字輔漢以光武建武十年甲午正月十五日生於餘杭之天目山七歲能誦道德經後爲書生博綜五經通河洛象緯之文章帝元和二年乙酉以博士召不起時年五十二自謂儒學無益於年命乃歎曰人生幾何老死將及不能復經生死之苦遂散其門人行學長生之道隱居于雲錦山今信州龍虎山是也和帝永元四年壬辰就拜諫議大夫辭疾不拜帝復以三品印綬駟馬車徴爲太傅封冀縣侯陵語使者曰爲我謝天子九霄之上無何有之鄉金闕帝君某已爲之臣矣惟清靜寡欲天下自治何以陵爲遂轉入嵩山齋戒念道常誦道德經積九年精感老君遣神人告云中嶽石室中有上古三皇天文黄帝九鼎大丹經五嶽眞形圖子可往受之乃入石室中果得天文寳經黄帝九鼎丹法而陵家素貧無貲可鍊聞蜀人朴厚可教化且多名山乃將弟子入蜀於鶴鳴山隱居旣遇老君遂於隱居之所備藥物依法修鍊三年丹成未敢服餌謂弟子曰神丹已成若服之當沖天爲眞人然未有大功於世須爲國家除害興利以濟民庶然後服丹輕舉臣事三境庶無媿焉老君尋遣清和玉女教以吐納清和之法修行千日能内見五藏外集萬神乃三步九跡交乾履斗隨罡所指以攝精邪戰六天魔鬼奪二十四治改爲福庭名之化宇降其師爲陰官先時蜀中魔鬼數萬白晝爲市擅行疫癘生民乆罹其害自六天大魔摧伏之後陵斥其鬼衆散處西北不毛之地與之爲誓曰人主於晝鬼行於夜陰陽分别各有司存違者正一有法必加誅戮於是幽明異域人鬼殊途今西蜀靑城有鬼市並天師誓鬼碑石天地石日月存焉其誓蓋指此爲約謂天地合日月明乃許汝出也五月一日老君再降授陵以太清中篇經目九卷金液丹經三十六卷太清中經室
