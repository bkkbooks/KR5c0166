  text: 混元聖紀卷之一
  hash: sha256:f254730ac2a40f78d5bd49506df30c2ef0f26f34eedeb7e969fe2ff7854ffee7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_HFL_001-001a, image: hfl/0551/0551-010.png}
body:
  text: 宋觀復大師高士謝守灝編太上老君者大道之主宰萬教之宗元出乎太無之先起乎無極之源經歷天地不可稱載終乎無終窮乎無窮者也其隨方設教歷劫爲師隱顯有無罔得而測然垂世立教應現之迹昭昭然若日月其可無記述乎夫何紀傳率多疏略如司馬遷史記班固古今人表劉向之載列仙嵇康皇甫謚之叙高士與夫葛稚川之神仙傳暨集仙總仙等傳例皆蔑裂百不具一尹文操編聖記八百二十章賈善翔傳猶龍析爲百篇雖記述頗詳而枝蔓旁引首尾失次其間取舍未免乖違二三其說覽者滋惑每一披卷爲之感慨誠教門之闕典也今不揆愚陋編考三教經典傳記究其源流仍序歷代崇奉之事編爲聖紀冠以年譜若夫五太之初九皇之始眞文未兆載籍叵詳今始纂書史所載老君應世之歲月述其年譜於左天皇皇甫謐三五歷云天地初立有天皇氏十二頭木德王歲起攝提兄弟十二人立各一萬八千歲徐整三五歷紀云元炁肇始有神人號天皇時老君降世號通玄天師一號玄中大法師唐翰林學士承㫖樂朋龜撰靑羊宫記云太上玄元老君應運降跡與天皇爲師上清下濁之初開相離未遠六合八紘之乍坼相去未遥正方圓上下之形定洪荒朴略之狀川新融而水仍晦土始結而石未堅配四海於四神付五行於五帝地皇老君下降爲師號有古大先生唐紀云是時乾象猶低坤形仍薄立極定位敷化建功我太上老君屑跡下降與地皇爲師分配剛柔制定寒暑地增博厚天益高明聖力無窮神功靡測萬木甲坼萬草勾萌羽族毛群區分於兑離之位介蟲鱗類支分於坎震之宫人皇春秋緯作九頭紀老君下降爲師號盤古先生三五歷紀云天地混沌如雞子盤古生其中天地開闢盤古在其中後乃有三皇此三才之始也唐紀云已踰靑海之年又離靑海之歲二聖旣理四表生光我太上老君博施濟衆與人皇爲師三百六十之川初分血脉一萬五千之策乍配偶奇三壬三乙之神離胎於水木六丙六辛之將出孕於火風一百五十六代四萬五千餘年始稱通玄天師再號金闕帝君三名盤古先生五龍紀五姓玉皇通一歷勾龍紀連通紀六姓或作連遥紀春秋緯及河圖五皇歷皆作連通紀合雄紀三姓春秋緯作含雄紀初置天地經作合雄紀五姓紀河圖云通紀五姓是謂五姓紀春秋緯有攝提紀而五姓紀又序次羌一紀叙命紀四姓置天地經作厚紀玉皇歷作玄命紀修飛紀九姓河圖作居方氏因提紀河圖作提挺紀禪通紀七十二姓河圖作通姓紀流訖紀史記索隱三皇紀云流訖紀當黄帝時制九紀之間按河圖代姓紀太古者生民之始也男女姤精以女生爲姓始三頭謂之合雄紀生號三世合雄氏没子孫相傳記其壽命是謂叙命紀通紀四姓生子二世男女衆多群居連通是謂連通紀生子一世通紀五姓是謂五姓紀天下群居以類相親男女衆多分爲九頭各有居方故號居方氏生子三十二世强弱相凌欲生吞害中有神人提挺而治故號提挺氏生子三十五世通紀七十二姓故號通姓氏通姓氏之後有有巢氏天下九頭咸歸而尊事之有巢氏生燧人氏燧人氏生伏犧河圖及三五歷云自人皇已後有五龍氏燧人氏大庭氏柏黄氏中央氏卷須氏栗陸氏驪連氏赫胥氏尊盧氏渾沌氏昊英氏有巢氏朱襄氏葛天氏陰康氏无懷氏而不知其姓氏世次三墳載天皇伏犧氏策辭云皇曰命子襄居我飛龍之位生我圖文代我咨告於四方上下無或差忒後昊英氏進曆於君曰曆起甲寅皇曰甲日寅辰木王於卯二月乃集衆於傳教臺告民示始甲寅后女媧氏无懷氏輔君之右上相共工下相皇亘飛龍朱襄氏潛龍昊英氏居君左右栗陸氏居北赫胥氏居南昆連氏居西葛天氏居東陰康氏居下九州之牧各統其人群居於外皇曰栗陸子居我飛龍之位主養草木開道泉源毋或失時曰大庭子主我屋室視民之未居者喻之借力同創其居無或寒冷曰陰康子主我水土俾民居處無或漂流勤於道陸曰混沌子居我降龍之位惟主於民曰昆連子主我刀斧無俾野獸犧虎之類傷殘生民皇曰四方之君咸順我辭則世無憂惟愛於民則位不危又曰子無懷安惟安於民民安子安民危子危其子念哉以三墳之書考之則伏犧氏爲後天皇氏女媧无懷其后也朱襄昊英其子也共工皇亘其相也栗陸赫胥昆連葛天大庭陰康混沌皆其神也居内則其六卿分職以治其國在外則爲四方君長以牧其民所謂九頭者是也然皆一時人初無世代之異而歷代典籍所載多列爲先後何也意者伏犧氏没其后嗣及其九頭之臣皆享遐齡曰迭爲君主耶不然則其臣之子孫咸祚有國因祖命氏耳韓詩外傳以爲自古封泰山禪梁甫者萬有餘家仲尼觀之不能盡識管子亦曰古封泰山七十二家夷吾所識十有二焉其首有無懷氏則知其伏犧之前帝王世代先後不可得而識者蓋亦多矣春秋緯稱自開闢至於獲麟凡三百二十七萬六千歲分爲十紀一曰九頭紀二曰五龍紀三曰攝提紀四曰合雄紀五曰連通紀六曰叙命紀七曰修飛紀八曰因提紀九曰禪通紀十曰流訖紀蓋流訖紀當黄帝時制九紀之間今自周敬王之三十九年春秋魯哀公之十二年庚申西狩獲麟逆數至黄帝元年丁亥纔三千九百三十歲自黄帝推而上之至於開闢當有三百二十七萬二千餘歲其間帝王年代莫得而考雖間見於諸子圖緯之書然疑相傳無所折衷今姑存而不論伏犧太昊姓風木德初造曆元年起甲寅女媧繼之子孫相承四萬五千六百年河圖代姓紀云伏犧氏燧人子也因風而生故風姓龍馬負圖始畫八卦命飛龍氏造六書命潛龍氏作甲曆伏犧制牛冶金成器教民炮食易九頭爲九牧因龍出而紀官因鳳來而作樂天下之民號曰天皇太昊伏犧時老君降世居荒野號鬱華子唐紀云庖犧氏之王天下也我太上以道弘濟降跡爲師教之以畫八卦指之以分三才助之以造書契之文製之以代結繩之政祝融炎帝姓姜火德起丙辰始教民陶冶故號炎帝按禮記謚號記先祝融後神農餘注則先神農後祝融切謂祝融爲炎帝之祖以火德王必不後於神農今當以禮記爲正其高陽氏之子黎爲火正故亦號祝融至今爲南方司火之神月令曰其帝炎帝其神祝融則祝融爲火德之祖明矣時老君降濟陰號廣壽字神農連山氏況融之後始教民耕種百谷故號神農子孫相承五百三十年河圖代姓紀號爲人皇時老君降于濟陰號大成子唐紀云連山氏之王天下也我太上救時屈己下爲帝師付之於五運分之於四時助之以正萬機明之以辨百穀變飲血茹毛之化移塊桴土鼓之音毁穴焚巢上棟下宇範金合土燔黍擘豚製耒耜以濟兆民作陶冶以利萬物天雨粟以呈瑞地芒稼而彰稔黄帝有熊氏姓公孫士德起丁亥子孫相承共一千五百二十年河圖代姓紀號爲地皇時老君降世居于崆峒山號廣成子唐紀云有熊氏之王天下也我太上隱身於崆峒之中放心於杳冥之外帝乃親降輦輅禮展師資旣摳衣以趨隅遂屈膝而問道當是時也榆岡凌虐蚩尤作亂化魚鱉爲兵士以助王師變雲霞爲神衹潛扶軍陣能弭兵於涿鹿偃戈於阪泉東遊靑丘之鄉北到洪隄之境受丹經於玉室登蒼冥於鼎湖屈軼旣生蓂莢復出若非大道孰可致斯按玉緯經有三種三皇有前中後之異故稱九皇洞神大有經云三皇治各三千六百年又小有經云三皇治各萬八百歲詳此二說大有經止論一代三皇每一皇治三千六百年小有經乃統論三代三皇每一皇治萬八百歲也若通論三代九皇則共經三萬二千四百年矣或言萬八千者蓋百字誤爲千耳今據老子内傳所明正與大有小有相符又前三皇中三皇各經九千九百億萬歲者乃計一劫之大數非止言三皇之身也所言後三皇者傳記所載亦多不同如洞神經與項峻止以天皇地皇人皇爲三皇而三墳書以伏犧爲天皇神農爲人皇黄帝爲地皇而皇甫謐注春秋運斗樞鄭玄高誘注吕覽以庖犧女媧神農爲三皇禮記謚號記以伏犧祝融神農爲三皇孔安國韋昭陶隱居以伏犧神農黄帝爲三皇尚書大傳應邵譙周以燧人庖犧神農爲三皇聊氏以有巢燧人伊祈爲三皇帝系譜中經岀塞記瀨鄉記以伏犧神農祝融爲三皇所見不同難遽加雌黄也而梁武帝以伏犧神農燧人爲三皇以黄帝少昊帝嚳帝摯帝堯爲五帝謂舜非三五亦非五帝與三王爲四代其說尤所不通歷世紛紛莫有定論也少昊金天氏黄帝之後金德起辛未子孫相承共四百年老君復降于崆峒號隨應子一號太極先生唐紀云金天氏之王天下也我太上乗九龍之輦降以爲師號太極先生說莊敬之典教之順時迎氣昭配神明羽族呈休命之鳥官理分九鳸以統百師景合璧以表靈鳳銜圖而示貺悉由至道彰此帝謨顓帝高陽氏姓姬水德在位七十八年元年辛卯老君降于衡山號赤精子唐紀云高陽氏之王天下也我太上教之解紛塞兑治國安民滌蕩九黎陟明八凱有龍野紫髯之兇醜有蛇身赤髮之渠魁力拔不周首觸山碎天低西北致日月之西行地亞東南使江海而東注追呼六甲役御百靈訓之以微言之經教之以大順之道乗蒼虬之迅駕或適幽陵御素螭以遐遊或臻蟠木帝嚳高辛氏黄帝之後木德在位七十年元年己酉老君降世居于江濱號録圖子唐紀云高辛氏之王天下也我太上敷道布化濟代爲師談黄庭之妙言隱日遁月稱録圖之嘉號返邑移城制九州之命作六英之樂封勾芒以佐蒼帝敕蓐收以翼白方封岱嶽而印金泥照寰區而開玉鏡飲太活之井遊不夜之鄉帝堯陶唐氏姓伊祈火德在位七十年元年戊戌老君降世居姑射山號務成子唐紀云陶唐氏之王天下也我太上暫垂至理下降爲師講玄德之經道以匡於玄化應丹陵之瑞名冀列於丹丘披鹿裘以食糲饌端拱於土階掛鶴氅而飲流霞凝思於瑶圃帝舜有虞氏姓姚士德攝位三十年在位五十年元年戊申老君降世居河陽號尹壽子唐紀云有虞氏之王天下也我太上談無爲之理講離合之經三苗克悛四罪咸服百揆時序五典謹微懷明神之珠賜照華之玉按孔子家語季康子問曰舊聞五帝之名而不知其實請問何謂五帝孔子曰昔丘也聞諸老聃曰天有五行水火木金土分時化育以成萬物其神謂之五帝古之王者易代而改號取法五行五行更王終始相生亦象其義故其爲明王者死配五行是以太皥配木炎帝配火黄帝配土少皥配金顓帝配水也康子曰太皥之始以木如何孔子曰五行用事先起於木木東方也萬物之初出焉是故王者則之而首以木德王天下其次則以所生之行轉相承也康子曰吾聞勾芒爲木正祝融爲火正蓐收爲金正玄冥爲水正后土爲土正此五行之主而不得稱曰帝者何也孔子曰凡五正者五行之官名五行佐成上帝而稱五帝太皥之屬配焉故亦云帝從其號也少皥氏之子曰重爲勾芒曰該爲蓐收曰修及熙爲玄冥顓頊氏之子曰黎爲祝融共工氏之子曰勾龍爲后土此五者各以其所能業爲官職生爲上公死爲貴神則稱五祀不得同帝也康子曰陶唐有虞夏后商周獨不得配五帝意者德不及上古耶將有限乎孔子曰古之平治水土及播植百穀者衆矣維勾龍氏兼食於社而棄爲稷神歷代奉之無敢易者明不可與等也故自太皥以降逮爲顓頊應五行而王數非從五而配五帝是其德不可以多也宋朝劉道源通鑑外紀於舜紀叙曰六經皆不稱三皇五帝三王易下繫辭曰庖犧氏没神農氏作神農氏没黄帝堯舜氏作繼世更王而無三五之數或以庖犧至舜爲五帝孔子未嘗道者不可附會臆說也管子稱明一者皇察道者帝通德者王謀得兵勝者霸孔穎達謂管子書或是後人所録非本書也或謂莊子列子皆寓言誕妄秦漢學者宗其文辭論議故競稱三皇五帝而不知古無其人其論辯雖若可取然考之實故亦未爲通論又其所載帝王世數歲月考之歷代紀傳及長曆皆抵捂不合推之甲子又參差抑傳寫者之誤與其固欲求異於人與抑第宄其大體而不暇計其細與特未可知也且如宰我問孔子以上世之傳孔子猶曰略聞其說而已況去古逾遠而才不逮聖人者乎至於季康子五帝之問則對以昔聞之老聃云未嘗敢謂古無其人也此亦見聖人信而好古之意唯司馬遷帝紀表曰學者多稱五帝尚矣然尚書獨載堯以來而百家言黄帝其文不雅馴縉紳先生難言之孔子所傳宰予問五帝德及帝繫姓儒者或不傳余嘗西至崆峒北過涿鹿東漸于海南浮江淮矣至長老皆各往往稱黄帝堯舜之處風教固殊焉總之不離古文者近是予觀春秋國語其發明五帝德帝繫姓彰矣願第弗深考其所表見皆不虚書缺有間矣其軼乃時時見於他說非好學深思心知其意固難與淺見寡聞者道也夫太史公博極群書歷訪古迹其爲良史宜矣夏禹姒姓金德元年戊戌建寅正月子孫相承共四百三十二年老君降世居商山號眞行子唐紀云夏后氏之王天下也我太上克匡王道爰作帝師談德行之經行爲國之法商湯子姓水德元年庚戌建丑正月在位一十三年子孫相承共六百一十三年老君降世居于潛山號錫則子唐紀云成湯之王天下也我太上權離左極下爲王師說長生之經體自然之道以上事迹互見于帝系譜帝王世紀洞神大有經玉歷經出塞記地理志譙周古史考神仙傳郡國圖經云老君雖分身下降隨世立教事竟則隱故在世未有誕生之迹外丙元年癸亥在位二年仲壬元年乙丑在位四年太甲元年己巳在位三十三年號太宗亦號祖甲沃丁元年壬寅在位二十九年太庚元年辛未在位三十五年小甲元年丙午在位一十七年雍己元年癸亥在位一十二年太戊元年乙亥號中宗在位七十五年仲丁元年庚寅在位一十一年外壬元年辛丑在位五年河亶甲元年丙午在位九年祖己元年乙卯在位二十一年祖辛元年乙亥在位一十六年沃甲元年辛卯在位二十二年祖丁元年癸丑在位二十二年南庚元年乙亥在位二十九年陽甲元年甲辰在位一十八年十七年庚申老君自太清境分神化炁託孕於玄妙玉女盤庚元年壬戌在位二十九年小辛元年辛卯在位二十一年小乙元年壬子在位二十年武丁元年壬申在位五十九年號高宗九年庚辰二月建寅十五日商之二月望今之上元節也通鑑外紀云自夏之前皆以建寅之月爲正月湯革夏命乃以建丑爲正月也老君降生自陽甲十七年託孕至此八十一年劉向列仙傳云老子生於商時嵇康皇甫謐云生商末唐朝以生日爲眞元節樂朋龜記云商高宗御極之世周文王演易之初神光流入於瓊胎瑞彩結成於金骨不拆不副誕彌於八十餘齡降世降生過期者二萬餘晝四十三年甲寅老君降乗白鹿登庭檜之杪而飛昇今有昇天鹿迹在亳州太清宫祖庚元年辛未在位一十七年祖甲元年戊子在位一十七年亶辛元年乙巳在位六年庚丁元年辛亥在位二十一年武乙元年壬申在位四年侮慢上天暴雷擊死太丁元年丙子在位四年帝乙元年庚辰在位二十七年辛紂元年丁未在位二十七年終癸酉二十一年丁卯老君降于岐山之陽號燮邑子周文王爲西伯召爲守藏史世本云老子在商爲柱下史鄭玄注論語云老彭商之賢大夫也孔穎達疏言老是老聃周武王姬姓木德建子爲正月起癸酉滅商即位九十六年子孫繼立者八百六十五年遷老君爲柱下史史記及劉欽七略皆云爲周守藏史葛洪及内傳云文王時爲守藏史武王時爲柱下史唯劉向列仙傳云生於商時爲周柱下史轉爲守藏史旣生於商其爲兩史故當在文王之世然或先或後特未定爾按揚雄方言云嘗聞伐輶軒之史秦籍之書皆藏於周秦之室又莊子云孔子將西藏書於周室子路謀曰由聞周徵藏史有老聃者藏室云者皆考證於老子故曰徴藏夫子欲藏書則試往因之蓋仲尼將藏書以老子嘗爲史官諳知藏室前言往行故先訪之也按周禮王太史内史外史御史凡五史諸侯亦有國史故禮記君動則左史書之言則左史書之左史視禮内史太史爲諸史之長掌四方之志三皇五帝之書藏之於室故謂之守藏史周幽王時有伯陽父唐固注云周柱下史老子也烈王有太史儋儋亦老子也太史爲周下大夫謂五史之任總之太史記言記事嘗在君前柱下即史官所立之處因爲曹局之名而韋昭云伯陽爲大夫者謂職爲太史官即下大夫也史記稱張蒼好書歷秦時爲御史大夫主柱下方書據周禮御史掌贊書及贊教凡其方書及内史所掌此秦官不與周同也世本云在商爲守藏史在周爲柱下史蓋文王以侯服事商未得稱一周耳則先爲守藏後居柱下無疑矣劉向之言謂先聘爲太史以其靜退却爲他史當老子時復更免歸烈王之時又爲太史一居周世時歷數王故亦遍叅諸史是以守藏柱下先後不同班固云老聃者周之老史遊於柱下以宄高年據固之言則爲累代史官故稱老史隋内史薛道衡撰祠庭頌其序云爰自伏犧至於周氏綿紀歷代見質變名在文王武王之時居藏史柱史之職市朝累易容貌不改成王元年戊寅在位四十七年老君仍爲柱下史號經成子授道周公乃遊西極大秦竺乾等國號古先生按老子内傳云伏犧時號鬱華子神農時號傳豫子祝融時號廣壽子軒轅時號廣成子顓帝時號赤精子帝嚳時號録圖子唐堯時號務成子虞舜時號尹壽子夏禹時號寧眞子作眞行子商湯時號錫則子又文王武王凡爲十二帝師梁黄門侍郎簫子雲撰清虚館碑亦云太虚遼廓迹絶言象應感攸通縁物致稱伯陽降娠垂髮皓素堯曰務成舜曰尹壽赤精當生於顓帝録圖出自於神農得一含元百王資始又曰遨神九天之上遊精魏闕之下巍巍蕩蕩莫得而名云舊記並以老君在神農時爲大成子帝嚳時爲録圖子此碑獨謂録圖出自神農而内傳又謂神農時爲傳豫子諒未能無少誤要當以經傳爲正抱朴子葛洪作神仙傳疑歷代爲帝師謂皆見碎書不出仙傳正經又謂不應背澄清而入臭濁棄天官而受人爵且曰有天地則有道術道術之士世世有之何必常是一老子耶皆由晚學之徒好奇尚異欲推尊老子故有此說耳唐昊天觀主尹文操嘗著論駮之曰抱樸撰傳意在顯述老君起自修成將以訓誘後人令其勉力故云若謂老子是得道之人則人必勉力競慕若謂是神靈則非可學也斯其臆見耳殊不知開闢之始因學而得道者必有自然聖降而爲師隨機傳受焉定志經云昔天尊造大慈之初行應自然暗與理合自然玄悟本無文字撰集成經以教將來爾由是觀之則老君自然學道而世世爲師亦何疑焉旣爲大慈之父亦何辭捨尊就卑和光臭濁乎老子謂關尹子曰上世以來所更如沙塵動則有載却自惟甚苦勤太玄經亦云老子積學輪轉位登上聖應接無方不可稱述近世出化生乎殷末虞宣出塞記云老子凝神太玄之卿分靈散景世世下教鶴山崔元瀨鄉記云老子應見代代有之葛仙公云開闢以前下爲國師世世不休文始鬼谷張輔漢並云老君生乎太無之先經歷天地不可稱載此豈謂碎書與晩學淺見道歟稚川特未之思耳康王元年乙丑在位二十六年老君復歸于周號郭叔子復爲柱下史昭王元年辛卯在位五十年老君去官歸亳二十三年癸丑五月壬午老君西過函谷關度關令尹喜或謂老君出關雖在周癸丑歲五月壬午恐非昭王時有言幽王時者今檢幽王庚申年立十一年爲犬戎所滅其時無癸丑歲也或謂宣王四十年癸丑五月十八日壬午者推其歲月四十三年丙辰老君在渭川告宣王以周將衰幽王二年三川震老子曰周將亡幽王即宣王之子若宣王四十年出關則四十三年不得尚在渭川幽王時亦不得見三川震也平王四十三年歲亦在癸丑而五月又無壬午姚長謙年帝記謂景王十年丙寅爲孔子師敬王三十二年癸丑度關夫孔子生於靈王之庚戌至景王丙寅年方十七未應往師老子也況穆王西遊已聞尹眞人遇老子得道飛昇由是欽慕遺風遂修樓觀置道士以奉祠事則知老子度關决不在穆王之後也惟内傳之文與仙公之言符合自餘紛紜之論終於理義乖違固不可摭以爲實二十四年甲寅老子傳道尹喜授以道德五千言即於喜宅南小山上昇天是時有五色光貫紫微井水皆溢自商高宗九年至此凡二百七十四歲也二十五年乙卯老君復分身降生於蜀國李太官家前漢劉向列仙傳云老子生於商時爲周柱下史轉爲守藏史時稱爲隱君子仲尼見之知其聖人乃師之乗靑牛車去入大秦關令尹待而迎之嵇康皇甫謐皆云老子生於商末葛孝先乃謂周時託神李母者正謂降生於李太官家之時也或爲商祚將盡周祚已興所以商末時生亦何言周時託化此胎未必然也二十七年丁巳老君會尹喜於靑羊肆將去化胡故唐紀云靑羊肆者太上天皇大帝第二降生之所也自商道否閉周德陵夷歷藏史以同塵棄柱史以隱迹東離魏闕西度函關又云重爲千日之期再結一時之會將離蜀土欲化胡風遠適流沙長移獷俗及身毒罽西胡毳布纖毛爲之賔之國教煩陀阿柱之王又魏明帝製老君贊云深憫後世託下於陳爲周柱史經九百年無極之際言歸崑崙化被胡域次受罽賔後及天竺於是遂遷又魏略西戎傳北史西域傳並云于闐國西五百里有毗摩寺云是老子化胡之所也出見唐通典二十八年戊午老君同尹喜眞人降于天水啓靈山今秦州有西昇臺聖容殿俱存穆王元年辛巳在位五十五年壽一百有五歲老君化胡已即昇天四年甲申老君復降於中國東遊扶桑會大帝校集群仙遂遊西海至蘇鄰國號爲大光明使尋即復昇天穆王聞尹喜眞人得道上昇乃爲修樓觀立道士七人以奉祠事見穆王内傳及樓觀先生傳共王元年丙子在位一十二年懿王元年戊子在位二十五年孝王元年癸丑在位一十五年夷王元年戊辰在位一十六年老君與玄古三師降于蜀綿竹之三學山授李眞多以飛昇之道今號眞多治厲王元年甲申在位三十六年二十一年甲辰老君降于樓觀授道士宋倫以中景之道通眞之經并靈飛六甲素奏丹符周召共和起庚申時厲一流于彘太子幼相和協共理國事十四年厲王崩乃立太子是爲宣王宣王元年甲戌在位四十七年四十三年丙辰老君降于渭川告宣王以歲星北遷言周將衰後二年而幽王立今渭側有伯陽川是其處見地理志時有採薪行歌者人莫能識以問老君老君曰此活國人修習無上正眞之道也唐歷代應見圖幽王元年庚申在位一十一年第二年辛酉地動涇渭洛皆震老君言周將亡矣不及十年數之紀也後果爲犬戎所滅出史記平王元年辛未在位五十一年東遷洛邑三十三年癸卯十二月老君復出關開化諸國遂至西海流麟等洲考校群仙事訖復還中國出西昇經威王元年壬戌在位三十三年莊王元年乙酉在位一十五年九年癸巳四月建卯初七日夜釋迦佛生釋氏瑞應經云四月八日夜半生此用周正也又過去見在經云二月八日生此用夏正也老君時年六百一十四歲釋迦生於周莊王九年乃春秋魯莊公之七年當夏四月常星不見夜明是也至魏武定八年凡一千二百三十七年云出魏書釋老志及隋書經籍志頭陀寺碑云周魯二莊親昭夜景之鑑見梁昭明太子文選齊王巾作粱邵陵王上表云常星不見周鑑娠徵滿月圓姿漢感宵夢見唐僧法苑珠林僖王元年庚子在位五年惠王元年乙巳在位二十五年襄王元年庚午在位三十三年項王元年癸卯在位六年匡王元年已酉在位六年四年壬子佛入涅槃釋氏金光明經云壽命短促方八十歲是也定王元年乙卯在位二十一年王問老君以在世神仙老君對以中嶽有古先生即予是也出望祠宫張僧鑑潯陽記簡王元年丙子在位一十四年靈王元年庚寅在位二十七年二十一年庚戌十月二十一日孔子生景王元年丁巳在位二十五年悼王立五月敬王元年壬午在位四十三年十七年戊戌孔子謂南宫敬叔曰吾聞老聃博古該今通禮樂之原明道德之歸則吾師也今將往矣明年遂與敬叔俱至周見老子按莊子云孔子行年五十乃南之沛見老子計是此年也其問禮及藏書等事雖見禮記孔子家語及史記而皆不繫年月故莫知其先後也然家語所載子夏問於孔子曰商聞易之生人及萬物各有奇偶氣分不同惟達德者能原其本也天一地二人三三三爲九九九八十一一主日月數十故人十月而生八九七十二偶以從奇奇主辰辰爲月月主馬故馬十二月而生其餘各從其類也鳥魚生陰而屬陽故皆卵生魚遊於水鳥遊於雲故立冬燕雀入海化爲蛤介鱗夏食而冬蟄齕吞者八竅而卵生齟者九竅而胎生四足者無羽翼戴角者無上齒晝生類父夜生類母敢問其然乎孔子曰然吾昔聞之老聃亦如所言由此觀之則孔子謂老聃博古該今故無所不就學焉何止問禮及五行五帝而已乎四十一年建壬戌孔子卒見孔子家語及左氏傳老子時年八百二十四歲北王元年乙丑在位八年正定王元年癸酉在位二十八年哀王立三月思王立五月考王元年辛丑在位一十五年威烈王元年丙辰在位二十四年安王元年庚辰在位二十六年十八年丁酉秦獻公立夷烈王元年丙午在位七年二年丁未老君還秦秦獻公授館致禮問於歷數老君遂出散關出史記顯王元年癸丑在位四十八年八年庚申秦孝公立老君東還遊赤城蒙山重過扶桑較集群仙已而隱于景山太室少室出王子年拾遺記愼靚王元年癸丑在位六年赧王遷都西周元年丁未五十九年乙巳盡獻其邑於秦西周遂亡九年乙卯秦昭王立老君與尹喜諸仙西遊女几鷄頭天柱復出散關遂昇崑崙還紫微上宫昭王聞之乃於老君所經遊處爲置城邑以表聖跡故立老君停驛尹喜城謹按老君本記并諸史傳記並云老子以商武丁庚辰生於亳尋乗白鹿而昇天後一百八年帝辛丁卯降于岐周今以長歷推之武丁元年壬申九年即庚辰也傳記云老君以周文王時爲守藏史武王時遷柱下史推武王以癸酉受商自武丁庚辰至此癸酉凡一百七十四年也傳記云老子以周昭王癸丑五月壬午將去周七月十二日到函谷關度尹喜推昭王元年辛卯二十三年癸酉自癸酉至癸丑凡一百有一年通前凡二百七十四年乃西度也傳記云老子甲寅年四月於樓觀昇入太微次年乙卯分身生於蜀後二年丁巳與尹喜會於靑羊之肆遂同往西域至穆王元年復還中夏東過扶桑大帝之所較集群仙自昭王二十三年癸丑至穆王元年辛巳凡二十八年則老君化胡訖復還中夏之時也史記云周幽王二年辛酉三川震老子言周必亡自穆王辛巳至此辛酉凡二百二十年通前凡五百二十二年也平王二十三年癸卯老君復出關遊西海較集諸仙魏書釋老志云釋迦生時當周莊王九年春秋魯莊公七年四月辛卯常星不見是也按莊王元年乙酉即九年癸已也自幽王辛酉至此癸巳九十二年通前凡六百一十四年而後佛生至匡王四年壬子入滅周靈王二十一年庚戌冬十月二十一日庚子孔子生自莊王癸巳至此庚戌凡一百三十七年通前凡七百五十一年也景王十五年辛未南宫敬叔生時孔子年三十五歲敬王十一年壬辰魯定公即位始命敬叔爲大夫辭以先人遺命使事孔子至定公七年戊戌孔子年五十乃南之沛見老子即老君應化諸方訖復還中夏之時也自靈王庚戌至此戊戌凡四十九年通前凡七百九十九年也傳記云秦昭王聞老子過爲散關修城邑據昭王立五十一年乃滅周推周赧王元年丁未九年乙卯乃秦昭王即位之歲是時老君將昇於崑崙還紫微之時也自敬王戊戌至此乙卯凡一百九十七年通前計九百九十六年也老君應感無方變化莫測或昇或降莫能究悉今考傳記并長曆推計自商武丁庚辰至周赧王乙卯凡出入隱顯綿歷九百九十六年在商一百七十四年在周八百二十二年正與史傳及諸經典相符魏明帝讚云爲周柱史經九百年唐大學博士吳楊昊亦云老君變通靈應難測旣生商日又仕周時計其始終乃立千載此皆舉其成數也史記稱或百六十歲或云二百歲者是據孔子時人斟酌老子之歲數云爾不能知其實是以每事言蓋言或也又列仙傳云去入大秦又云與尹喜俱遊流沙莫知所終皇甫謐云西之流沙作浮屠經以化戎俗文始内傳云老子出關周遊八十一國後至罽賔化胡劉向讚曰德合元炁壽同兩儀據諸傳記說雖不同莫不讚其長壽蓋儒者以長生昇天之說爲怪誕故但云莫知所終說其未嘗死也唐尹文操論云老君乃積劫得道之大聖人也故能寄惠人間和光幽顯千變萬化今古常存惟莊子假設秦失參號之說將以逆蕩凡淺執生者耳而梁武帝遂以老君爲尸解之仙謬矣遍尋老子始終竟無解蛻之迹而莊周獨云爾者亦猶雲將鴻濛之類並傲吏之寓言若以爲實則孔子見盜跖亦可爲實事耶按王子年拾遺記云老子至周之末居干景室之山嘗云我常在人間不去須臾或爲凡或爲聖但流俗之人不知之人行善惡各有罪福如影之隨形響之應聲若能思眞念善自可與我相遇以此詳之尤明其不死審矣又按龍蹻經云老子於大羅天明霞觀中告九天丈人曰吾今應相境界通身上顯諸天下應萬象歷劫演化開度兆人有道上賢降爲師授或生下界與物混冥託質通凡浮沉莫辯與道通化應接有縁潛行救度不恃有恩旣其神通自在世世隨機降應何生死之能累乎兒曹以管窺天果不足怪或云老子受學於容城或問道於常樅此蓋至人好賢樂善以多問寡亦將造端於師資以垂世立教耳豈眞有所授受耶舊傳記其子孫顯仕繼世不絶者此又至人不欲索隱行怪以驚世駭俗故示幻迹以和光同塵耳今慮後世貪縱之夫認幻爲眞而託道爲姦者將授以藉口故皆删之至十六變之說事迹隱晦亦無述焉秦始皇帝元年乙卯在位三十六年庚辰初并天下爲皇帝二十八年壬午封襌泰山乃建老君祠於樓觀之南躬行饗祀老君降于祠授帝以鬼林經策使鬼神之符出樓觀傳前漢文帝元年壬戌老君先降于陜河之濱號河上公亦曰河上丈人帝親訪之老君授以道德經也今陜州府北有河上廟并文帝望仙臺存焉出史記及抱朴子神仙傳或作景帝誤矣成帝河平元年癸巳河平二年甲午老君降于琅琊郡曲陽淵授干吉太平經出後漢書後漢明帝佛法初入中國章帝元和元年甲申元和二年乙酉老君再降授干吉眞人一百八十戒安帝永初元年丁未永初三年己酉老君降于泰山召江夏史劉圖較定天下簿籍因示罪福報應之事見唐記聖賦及應現圖順帝永建元年丙寅後六年改元陽嘉又四年丙子改永和又六年壬午改漢安又二年甲申改建康漢安元年壬午老君降于蜀之鶴鳴山授天師張道陵正一盟威秘籙五月再降賜秦清中經九百三十卷符文七十卷建康元年甲申老君再降于閬州雲臺山授天師三洞衆經及超度九祖齋直之法見天師傳及蜀圖經桓帝建和元年丁亥後三年庚寅改和平又一年辛卯改元嘉又二年癸巳改永興又二年乙未改永壽又三年戊戌改延熹又九年丁未改永康永壽元年乙未老君降于成都授天師北斗削死注生之法今成都府玉局化即其地又降于鹿堂山授以制六天斬邪又見天師傳及蜀圖經延熹八年帝遣使詣陳祀老君命邊韶撰碑文九年帝親祀老君於濯龍宫用郊天樂並見後漢記靈帝建寧元年戊申後四年壬子改嘉平又六年戊午改光和又六年甲子改中平光和二年己未老君降于天白山授仙人葛玄上清靈寳大洞等經及三籙七品齋法勸戒法輪轉神入定等經見天台山記及太極仙翁傳魏陳留王咸熙元年甲申老君降于隴右臨洮郡謂王始曰天下不乆當大平見晋書晉安帝隆安元年丁酉後五年壬寅改元興又三年乙巳改義熙元興元年壬寅姚秦洪始五年也老君下降按行山嶽至華山敕仙人成公興令移居嵩山仍賜以仙藥見後魏書後魏眀皇帝永興元年即位十五年改元神瑞又二年改元泰常神瑞二年乙卯晋安帝義熙十一年也老君降于嵩山授道士寇謙之雲中音誦新科之戒泰常二年丁巳老君再降賜寇謙之符籙七十卷見後魏道釋志太武皇帝太平元年老君降于嵩山命寇謙之授帝以太平眞君之號遂改元太平眞君出魏書隋煬帝太業元年乙丑太業十三年丁丑老君降于終南山語山人李淳風以唐公受命之符出金鎖流珠記唐高祖武德元年戊寅武德二年己卯老君降于羊角山語吉善行令奏聞云我帝祖也今唐得聖治社稷延長出唐記五年壬午老君再降于廟所告以破賊之期出唐記高宗永徽元年庚戌後七年丙辰改元顯慶又五年辛酉改元龍朔又三年甲子改元麟德又二年丙寅改元乾封又二年戊辰改元總章又二年庚午改元咸亨又四年甲戌改元上元又二年丙子改元儀鳳又三年己卯改元調露又一年庚辰改元永隆又一年辛巳改元開耀又一年壬午改元永淳龍朔二年壬戌帝幸洛陽宫建清廟於北邙治以祠老君設醮慶讚老君降于殿上二眞人夾侍光耀階壇衆咸瞻仰宫闈令權大力等列狀奏聞照依所見圖寫爲瑞像見洛陽録事楊護師奏狀乾封元年丙寅帝封岱嶽駕至亳朝謁老君御製册文上尊號曰玄元皇帝聖母爲先天太后出唐書儀鳳三年戊寅帝敕建齋於陽清廟時老君降于壇上祥光照映乗白馬履壇石皆有跡衆所瞻仰登時奏聞賀表云金相玉毫彩奪夜明之景白駒丹鬛跡留天駟之庭見朝散大夫孫瑞奏狀則天武后嗣聖元年甲申二月改元文明九月又改光宅攝位二十二年乙巳改元神龍元一十八年文明元年甲申老君降于虢州皇天原命鄔元宗令傳言武后不可草命出唐畫景龍四年庚戌爲平内難疑决老君爲白衣老父賣卦於春明門外象曰宜取天下吉利在三日内後於其處立廟出洛中記異玄宗明皇開元元年癸丑後二十九年壬午改元天寳又三年甲申改年爲載開元十七年老君降于蜀州新興寺隱景於佛殿柱中宛如刻畫削洗愈現本路文武官及道僧俗尼同狀奏聞有云現於殿柱杳疑作史之年照彼佛祠緬若化胡之日見於益州長史張敬中奏狀表開元二十九年老君降于丹鳳門外語田同秀曰我昔日入流沙藏一金靈符在尹喜舊宅可奏帝取之帝遣使求得之於函谷關故墟出唐書天寳二年癸未正月上老君尊號曰大聖祖玄元皇帝十二月帝幸華清宫老君降現于朝元閣上遂改朝元閣爲降聖閣見唐史天寳七載戊子上老君尊號曰聖祖大道玄元皇帝九載庚寅老君降于太白山語山人王玄翼以寳仙洞有妙寳眞符上命刑部尚書王倕等往求果得之出唐書十三載甲午二月癸酉帝朝獻太清宫加上老君尊號曰大聖祖高上大道金闕玄天元皇大帝出唐書十五載丙申帝幸蜀老君降于漢中郡黑水之側帝命刻石像於所見之處又乗白鹿降于利州昌嶺上以示收山之兆詔於所現之處立自然觀並出唐書肅宗天寳十五年丙申改元至德又三年戊戌改乾元又二年庚子改上元至德二年丁酉老君降于通化郡雲龍巖自地接天儀相炳然詔圖其本明皇御讚曰晝現珠相空浮瑞色道釋人天作禮瞻奉申命藻繪示諸郡國見唐太上皇瑞讚序敬宗寳曆元年乙巳寳曆二年丙午老君降于太清宫前御路指示長安縣鄭剪陷井之處見柳公權書韋處厚所撰碑懿宗咸通元年庚辰咸通十年己丑龐勛領三千餘人欲劫奪太清宫時士庶數百餘家在宫避難咸見老君乗空而行須臾黑霧昏曀賊迷路自相蹂踐龐勛亦溺水死見汴州節度李尉奏狀宋眞宗皇帝祥符元年戊申大中祥符七年甲寅駕幸亳州謁太清宫親奉册寳上尊號曰太上老君混元上德皇帝出宋朝事實徽宗皇帝政和元年辛卯政和二年壬辰老君乗白馬駕祥雲降于茅山玉晨觀授梁光映加句天童經其餘降現事迹紀傳不繫時代者不述與夫放光見瑞示夢傳言靈驗等事非化身下降者亦復載于譜也混元聖紀卷之一
