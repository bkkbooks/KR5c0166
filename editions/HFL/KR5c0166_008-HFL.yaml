front:
  text: 中祕要二十四卷玄女祕妙經素眞經始陰經九鼎變化鍊眞玄洞之法開明大經玉策山紀圖籙山海大戒河洛圖讖内外黄庭内外太清玉策幽經五行精微東井沐浴經天鏡地鏡明鏡山鏡等經變景經合景内視經九天元譜九天元洞九眞中經五老寳經丹簡黑籙上下齋品戒文太一金液經眞一守玄經三元中胎素靈中經金闕帝君靑童内經洞玄眞經三皇内文宣化思道成敗觀戒三五飛步魁罡玄經遁甲山圖明禁地籙鬼曆諸法凡九百三十卷符文七十卷合一千卷老君復命陵驂侍龍駕至崑崙閬風金墉七寳臺時玉晨大道君遊處其間老君將陵朝禮玉晨於是敕靑童付陵天師印綬使按千二百官仍賜雌雄二劍二儀交泰冠驅邪帔魚鬛服符籙契令經戒法律使助國扶命養生制惡陵拜畢復還建康元年甲申天師徙居閬州雲臺山十月十五日老君再降授以正一盟威經三業六通之訣及三洞衆經歲月二齋法皆披靈寳五篇自然天書大字爲㫖要妙經今宣教十方天人并甲子庚申八節三元五臘三會皆當沐浴齋戒設獻禮念祈謝愆犯落滅黑簿超度九祖齋值之法已上見天師傳及蜀圖經桓帝建和二年戊子正月七日天師納趙昇爲弟子又降十二神女化鹹泉爲鹽井後因名郡爲陵以旌其功後改爲仙井鹽今爲隆州也永壽元年乙未歲正月七日老君再降命陵同遊成都老君駕龍車陵乗白鶴頓下五雲至太昊玉女修丹之所地祇湧出同捧一玉局高可丈餘以爲寳座爲說北斗削死注生之法至十五日又說南斗陶魂鑄魄之功
