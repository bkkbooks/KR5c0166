body:
  text: 南北二斗經乃二侍眞人叙述其事而爲經也老君旣去玉局尚存地陷爲井今在成都子城内號玉局觀後又至鹿堂山授陵以制六天斬邪之文永壽三年丙申陵一百二十三歲也九月九日日中老君遣五帝使者持玉策降雲臺山授陵正一眞人號繼有五色雲龍來迎遂與弟子王長趙昇同昇天見南北二斗經序延熹八年乙巳八月甲子帝夢老君乗華蓋寳車降于殿庭乃遣使詣陳國苦縣致祠禮焉敕陳相邊韶撰碑文其詞云老君爲周守藏室史當幽王時三川實震以夏殷之季陰陽之事監喻時主孔子以周靈王二十一年生問禮於老聃計其年紀聃時已一百餘歲孔子卒後百二十九年謂周太史儋爲老子莫知其所終其二篇之書稱天地所以能長且乆者以不自生也厥初生民遺體相續其死生之義可知也或有谷神不死是謂玄牝之言由是世之好道者觸類而長之以老子離合於混沌之氣與三光爲終始觀天作讖昇降斗星隨曰九變與時消息規矩三光四靈在旁存想丹田太一紫房道成仙化蟬蛻度世自羲黄以來世爲聖者作師班固以老子絶聖棄智禮爲亂首與仲尼道違述漢書古今人表檢以法度抑而下之與楚子西同科二者論之殊矣所謂道不同不相爲謀也延熹八年八月甲子皇上尊德弘道含弘光大存神養性意在凌雲是以潜心黄軒同符高宗夢見老子而尊祀之于時陳相邊韶典國之禮材薄思淺不能測度至人辯是與非按據書籍以爲老子玄虚守靜樂無名守不德危高官安下位遺孔子以仁言辟世而隱居變易名姓唯恐見知夫日以幽眀爲節月以虧盈自成損益盛衰之原倚伏禍福之門天道惡盈而好謙蓋老子所以見隆崇于今爲時人所享祀乃其逃禄處微損之又損之顯虚無之清寂先天地生乃守眞養性獲五福之所致也敬演而銘之其辭曰於惟玄德抱虚守清樂居下位執禄不營爲繩能直屈之可縈三川之對舒憤散呈見機而作需郊出坰肥遁之吉辟世隱聲守一不失爲天下平處厚不薄居實含榮楷式爲重金玉是輕絶嗜去欲還歸於嬰浩然歷載莫知其情要以無爲大化用成進退無恒錯綜其貞以知爲愚沖而不盈大人之度非凡所評九等之叙何足累名同光日月合之五星出入丹廬上下黄庭背棄流俗舍景匿形包元神化呼吸至精世不能原知其死生天人秩祭以昭厥靈羨彼延期勒石是旌十二月再遣中常侍管霸詣苦縣祀老君九年建濯龍宫於芳林園以文罽爲壇飾淳金釦音口器設華蓋之座用郊天樂帝親祀老君以浮圖釋氏配享焉並見後漢書按東漢西域傳云天竺國一名身音乾毒其國修浮屠道和帝時遣使貢獻至威帝延熹二年四月頻從日南徼外來獻世傳明帝夢見金人長大項有光明以問群臣或曰西方有神名曰佛其形長文六尺而黄金色於是帝遣使之天竺問佛道法於中國圖畫形像焉靈帝光和二年己未正月朔旦老君敕太極眞人三洞法師徐來勒等同降於天台山老君乗八景玉輿從官千萬正一眞人侍焉老君自號太上玄一眞人眞定光爲洞經高玄法師命侍仙玉郎王思眞披九光玉韞出洞玄大洞靈寳經凡三十六部以授仙人葛玄及上清齋法二等其一絶群獨宴靜氣儀刑冥心之齋入聖昇虚之法也其二清壇肅侣依按眞儀先拔九祖次及家門後謝己身也並三籙七品齋法三籙者金籙齋調和陰陽保鎭國祚玉籙齋保佑后妃公侯貴族黄籙齋拔度九玄七祖永辭長夜之苦七品者曰明眞齋超度幽爽解諸寃對也曰自然齋普爲衆生請福謝罪學仙修行之法也曰三元齋自謝犯戒之罪解考於三官也曰八節齋謝玄祖及己身之罪滅黑簿之法也曰洞神齋以精簡爲上求仙保國之法也曰指教齋以清素爲貴救疾禳灾之法也曰塗炭齋以苦節爲功悔過請福之法也并勸戒法輪經四十五卷無量通妙轉神入定等經以授玄俾行化於世曰子應常思虚無眞人高上大法王大千世界號曰老子是玄中大法師焉玄字孝先威帝延熹七年甲辰四月八日月父漢爲尚書玄始生有支道紀者高道之道謂其父曰吾昨聞通玄眞人從大羅天下也君家當爲神仙宗伯非常兒比其父曰仙人變化不可測願得壽考以爲宗嗣足矣玄大而秀穎性識英明經傳子史靡不該覽年人餘歲俱失恃怙忽歎曰天下有常不死之道何不學焉因遁迹名山參訪異人服食芝术得從仙人左慈受九丹金液仙經玄勤奉齋科善治病劾鬼兼吐納導引精思念道故感老君親降授之經法又示以天府所定世人罪福條目即太上感應篇又曰功滿三千白日昇天修善有餘坐降雲車弘道不已自致不死玄稽首禮謝今天台山桐栢觀有法輪院三眞經之處及仙公役鬼所築受詰壇存焉吳赤烏二年戊午十月朔日甲子日中老君命九天帝釋持太上三天金簡錫文賜玄爲太極左仙公其文曰揚州丹陽郡句容縣葛玄先世苦行累劫立功損身布施濟度危亡轉輪聖域鍊神守精志竭道源事師恭肅勤修匪懈積感太上注名玄都上仙定籍是故英明智惠誕降德門所以才質玉秀馨蘭清發天姿逸穎卓然挺抜道謨淵偉獨步群萃高辭世榮抱朴尚質注心眞仙含元守一散髮林藪倚若爲室得意山林觀此蓬蓽過中不餐齋不虧日燒香誦經拜禮靡缺慈心度人經營不輟志窮微賾大法周悉教世賢愚莫不解說謙謙和顔常懷欣悅今錫子以丹錦繡帔飛羅之裙天寳羽服芙蓉晨冠金眞神虎仗命魔旛所爲在意役海召山玄索隱繙經長齋靜念才思專精苦而不倦今錫子以八景玉輿駕龍乗雲項生圓光金章玉文以酬昔德世爲道門後賢仰止秉持法輪太上尊教三天所詮矣玄體德弘遠訓化道俗溥濟群品大度妙覺功成得名高眞信伏巍巍上聖皇皇穆穆恩盈十方各得所欲也今錫子位爲太上玉京太極左仙公總統三界六天大魔王之官屬給眞仙玉童玉女各五百人侍直左執九曜之香華右擎太上洞玄之經龍騎二千遊行上清九宫一年三朝太上玄都玉京金闕太上錫命天帝承書奉行依法啓行如三天舊典時有沙門釋道微竺法蘭者遠聞仙公得道故來求師焉作禮請問曰我聞道無先後無古今不審太上老子與悉達太子其道同異仙公曰本無高下貴賤形名之殊乃於天台山立壇授道微法蘭五嶽眞形圖告曰太上傳命之信執之遊八方名山三界奉迎又以太上金丹經靈寳自然五稱寳曜文三皇内文大有妙經天師㫖教金書玉字等凡十卷並太極龍謄芝草一莖告盟仙官各令佩身命入室弟子鄭思遠具宣口訣又惠以仙藥一粒令辟穀除五味之類可以遠遊名山道微等旣受寳經靈藥不饑不渴願得少留侍奉聖尊仙公曰子心存我我即可見不必依戀子應登嵩高彼山諸眞後五年復當傳子祕訣成子道矣仙公嘗謂諸儒各講明經論張昭問述而不作信而好古竊比於我老彭其㫖如何仙公曰老子演自然之道化行天下孔子歷聘諸國仁及齊民其歸一揆太子登嘗問仙公莊周云六合之外聖人存而不論六合之内聖人論而不議何也仙公曰六合之内囿於形象陰陽之數猶可致詰六合之外人所希見渺茫之中太虚之表聖人罔述故存而不論也登稱善七年甲子歲仙公年八十一八月十五日太上命從官乗龍麟執九光之節景雲之符驂駕九龍八景雲輿垂蔭華蓋龍旛虎旗來迎仙公仙公飛轡雲間停駕太虚作五言歌詩三篇以遣世人其一曰眞人昔遺教愍念狐疑子嬖邪不信道禍亂由斯起身死而名滅悔恨何所以罪大不可揜流毒將誰理冥冥未出期劫盡庶當已轉輪貧賤家或復爲役使六根或不完蹩躄行乞市不知積罪報怨天神不恃大道常無爲弘之由善始吾今巍巍尊立功所得耳三界稽首禮從容紫宫裏停駕虚空中控龍飛鳳峙臨訣屬素翰粗標靈妙紀其二曰我今便昇天依依諸儒英大道體虚無寂寂中有精觀者皆云昧窈窈中昭明莫言道虚誕所患不至誠奚不登名山誦是洞眞經一誦而一詠玄音徹太清太上輝金容衆仙齊應聲十方散香花燔煙旃檀馨皇娥奏九韶鸞鳳儀哀鳴龍駕翳空迎華蓋耀杳冥蕭條劫仞表帝釋欻降庭八王奉丹液挹瀨身騰輕道遥有無間流朗人形名神童夾侍側自然朝萬靈其三曰飄飄八景輿飛輪涉天京優游七寳宫相與樂未英七祖昇福堂先賢亦獲生王侯能信謹終爲天下貞大人體至德一切蒙其成散誕遊山水吐納和靈津練氣同希夷靜詠道德篇一心栖玄漠冥感今乃宣飛駕轡九龍飄飄乗紫煙暫迂蓬萊宫倏忽已昇天偉偉衆眞會眇眇凌虚玄體固無終劫金顔隨日鮮若人弘衆妙輕舉昇神仙歌畢雲輿冉冉昇天而去魏陳留王時咸熙元年甲申老君降現於隴右臨洮郡襄武縣身長三丈著白衣垂素髮戴金冠告縣人王始曰天下不乆當太平及武帝受禪果天下一統帝乃令於所現處造太平觀即李宗之故居也見晋書吳興戴洋年十二時死五日而蘇說死時天使爲酒吏授符籙給吏從旛麾將上蓬萊混崙積石太室常廬衡等諸山旣而被謫遣歸洋自此好道術妙解占候卜數吳末爲臺吏知吳將亡托病不仕嘗至瀨鄉經老子祠追思境物皆是洋昔死時所見處因問守藏應鳳曰去二十年前嘗有人乗馬東行過老君祠不下馬未達橋而墜馬死者不鳳言有之所問之事悉與洋同蓋洋由此被譴而謫還人世也道士梁諶修道於樓觀精思積年晋惠帝永興二年乙丑五月五日老君命太和眞人尹軌降其室授以鍊氣隱形之法日月黄華上經水石還丹六甲祕符等經諶遂能飛行變化三年丹成白日昇天後魏道武皇帝好老子言誦詠不倦數召諸王及朝臣親爲說之天興中儀曹郎董謐因獻服食仙經數十篇於是置仙人博士晋安帝天興元年壬寅姚秦之洪始五年仙人成公興因行秦土遇道士寇謙之遂師事之乃隱居華嶽山神忽見告公興曰老君將下按行山嶽子可加齋勤修公興惕然加勤香火仰候天文十一月二十三日戊子夜北斗魁中紫陽文昌赫然而開乃見老君乗白麟冉冉而下足躡蓮花雙幢舉高三丈侍從仙人玉女甚衆老君臨駕顧敕公興曰汝今遊處中嶽可得仙度公興再拜起已不見明年癸卯二月乃依所敕上曰其師寇謙之遂同過關往嵩高少室居焉老君又降河南穀水里停駕空中語公興曰吾去歲於華山東崖今汝來居嵩鎭子自到此意復如何公興稽首禮謝老君曰嵩少河洛集仙之府遊龍之淵不可遠去即敕玉女取藥賜公興公興再拜跪而服之老君曰子服吾藥補塡五臟神心開朗無不通鑑矣昔以張道陵繼天師並代干吉道陵昇天之後鬼魔復作中國統絶非子師誰可任也見後魏書按後魏釋老志云世祖時道士寇謙之字輔眞南雍州刺史讚之弟寇恂之十三世孫早好仙道有絶俗之心少修張魯之術服食餌藥歷年無效幽誠上達有仙人成公興不知何許人至謙之從母家傭賃謙之嘗覲其姨見公興形貌甚强力作不倦請回賃公興代己使役乃將還令其開舍南棘田謙之樹下坐筭公興懇發致勤時來看筭謙之謂云汝但力作何爲看此二三日後復來看之如此不已後謙之筭七曜有所不了惘然自失公興謂謙之曰先生何爲不懌謙之曰我學筭累年而近筭周髀不合以此自愧且非汝所知何勞問也公興曰先生試隨公興語布之俄然便决謙之歎伏不測公興之深淺請師事之公興固辭不肯但求爲謙之弟子未幾謂之曰先生有意學道豈能與公興隱遁乎謙之欣然從之公興乃令謙之潔齋三日共入華山令謙之居一石室自出採藥還與謙之謙之食藥不復饑乃將謙之入嵩山有三重石室令謙之住第二重歷年公興謂謙之曰公興出後當有人將藥來但得食之莫爲疑怪尋有人將藥至皆是毒蟲臭惡之物謙之大懼出走公興還問狀謙之具對公興歎惜曰先生未便得仙止可爲帝王師耳公興事謙之七年忽謂謙之曰公興不得乆留明日中午當去公興亡後先生幸爲沐浴自當有人見迎公興乃入第三重石室而卒謙之躬自沐浴明日日中有叩石室者謙之出視見兩童子一持法服一持鉢及杖謙之引入至公興尸所公興欻然而起著衣持鉢執杖而去先是有京兆灞城人王胡兒其叔父亡頗有靈異曾將胡兒至嵩高别嶺同行觀望見金室玉堂有一館尤珍麗空而無人題曰成公興之館胡兒怪而問之其叔父曰此是仙人成公興館坐失火燒七間屋被謫爲寇謙之弟子七年始知謙之精誠遠通公興乃仙者謫滿而去公興事謙之凡七年而仙去謙之守志嵩高精專不懈元魏明元皇帝神瑞二年十月乙卯忽有二神人衣翠羽之衣冠紫金之冠乗龍持節告謙之曰太上老君至矣須臾聞音樂之聲漸近仰望見玉衡車一乗金剛爲輪驂駕九龍威儀赫奕神仙導從彌滿虚空集止山巓仙官五人侍立於前謙之見有五宫門忽然而開仙樂交奏坐白銀花之座敕仙伯王方平引謙之前立謂曰往辛亥年吾得嵩嶽鎭靈集仙宫主趙洪政等表云自天師張道陵去世以來地上曠職修善之人無所師授以卿立身直理行合自然才任軌範堪處師位故來觀汝授汝天師之任賜汝雲中音誦新科之戒吾有經戒自開闢以來不傳於世今運數應出汝宜宣吾新科清整吾教佐國扶命以化群生除去三張之弊租米税錢及男女合氣之術時老君停駕雲中三日賜謙之經戒凡九卷專以禮度爲首而加之以服氣閉鍊又遣玉女長容等十二人教以服氣導引之訣自是氣盛體輕顔色殊麗太常二年丁巳正月十五日老君再降賜以新科符籙七十卷號曰並進八年癸亥歲十月十五日又遣玄孫上師眞人牧土宫主李普文降嵩嶽延謙之入仙宫授以天宫太眞太寳九州眞師治鬼師化民師繼天師等四籙及賜仙冕天衣符籙圖文并壇治又授以太平素經一百卷皆眞文大字上師手書令以甲子年奉經入國行化又賜以天果六枚食之遂絶火食見後魏釋老志按後魏釋老志云李普文老君之玄孫昔居代郡桑乾以漢武之世得道爲牧土宫主領治三十六土人鬼之政地方十八萬里有奇蓋歷術一章之數也其中爲方萬里者有三百六十嵩嶽所統廣漢平土方萬里以授謙之作誥曰吾處天宫敷演眞法處汝道年二十二歲除十年爲童蒙其餘十二年教化雖無大功且有指授之勞今賜汝遷入内宫太眞太寳九州眞師治鬼師化民師繼天師四籙修勤不懈依勞復遷賜汝天中二眞太文籙劾召百神以授弟子文籙有五等一曰陰陽太官二曰正府眞官三日正房眞官四日宿宫散官五曰並進籙生壇位禮拜衣冠儀式各有差品凡六十餘卷號曰籙圖眞經付汝奉持輔佐北方太平眞君出天宫靜輪之法能興造克就則超眞仙矣又地上生民來劫垂及其中行教甚難但令男女立壇宇朝夕禮拜若家有嚴君功及上世其中能修身鍊藥學長生之術即爲眞君種民藥别授方銷鍊金丹雲英八十三漿之法皆有訣要上師李君手筆有數篇其餘皆正眞書曹趙道覆所書古文寫迹篆隸雜體辭義約辨婉而成章大㫖與世禮相准擇賢推德信者爲先勤者次之又言二儀之間有三十六天有三十六宫宫有一主最高者無極至尊次曰至大眞尊次天覆地載陰陽眞尊次洪正眞尊姓趙名道隱以殷時得道牧土之師也牧土之來赤松王喬之倫及韓終張安世劉根張陵近世仙者並爲翼從牧土命謙之爲弟子與群神仙結爲徒友幽冥之事世所不了謙之一一告焉太武皇帝始光元年甲子歲師遵教敕奉其書獻之四方翕然歸向而朝廷猶未全信司徒崔浩博達之士也奇其言因師事之遂上疏曰臣聞聖人受命則天瑞應而河圖洛書皆寄言於蟲獸之文未若今日神人對接手筆燦然辭㫖深妙自古無有昔漢高祖雖復大聖四皓猶不屈節今清德隱仙不召而至斯誠陛下侔蹤軒黄應天之符也豈可以世常談而忽上靈之命乎臣切懼之帝欣然嘉納即命有司詣山奠幣因迎致其餘弟子在山中者帝見師不食甚加禮敬又見符籙心彌欽信乃建玄都壇起靜輪天宫依儀大會師與弟子皆服仙衣天冠光儀璀璨帝欲授師洎弟子以高爵皆確辭不受乃處以方外之禮敕師及門弟並列在王公之上不聽稱臣於是顯揚新法宣布天下大闡清靜無爲之化别擇大家子弟有德業者一百二十人爲道士十七年庚辰師於高嶽立壇行道爲帝祈福老君命授帝太平眞君之號賜冠服符籙師還具奏遂改元爲太平眞君大赦天下三年壬午歲謙之奏曰今陛下以眞君御世建靜輪天宫之法開古以來未之有也應登受符書以彰聖德帝從之遂親至法壇受符籙備法駕旗幟皆向靑以從道家之色自後諸帝每即位皆受籙焉出後魏書混元聖紀卷之七
