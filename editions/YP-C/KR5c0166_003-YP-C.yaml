front:
  text: 混元聖紀卷之三商王紂二十一年丁卯正月十有二日丙午老君鑑紂荒虐生靈塗炭周文王爲西伯有仁心將輔有德而拯斯民遂分炁化身乘飛飈之輪降於岐山之陽今鳳翔府東北十八里有啟聖宮乃其所降之地有西伯受道臺遺蹟並存號爕邑子説赤精經教人以仁信之道西伯聞之召爲守藏史武王克商踐祚遷爲柱下史改號育成子作璇璣經在成王時號經成子説廣化經又以道授周公旦乃退而閑居因出遊西極大秦竺乾等國自號古先生至康王時還歸於周號郭叔子復爲柱下史
  hash: sha256:7d9db6f47aba68c7d7bee14097a9e4601cb37a7143bddcb522d3b00628ec7c5c
