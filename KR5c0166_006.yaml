front:
  text: 混元聖紀卷之六與六
  hash: sha256:0484d1e4db79ae6dfcbd5757476a4ffe129465968ce19c46d32a3170d87746a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0166_HFL_006-001a, image: hfl/0552/0552-076.png}
body:
  text: 宋觀復大師高士謝守灝編老子之門人辛鈃一名計然范蠡之師也道號文子其著書號通玄真經其先晋公子也嘗請問於老君曰何謂道德仁義禮老君曰無為無形內以修身外以治人功成事立與天同鄰道也畜之養之遂之長之兼利無擇與天地合德也於大不矜於小不偷兼愛無私久而不衰仁也為上即輔弱為下即守節達不肆意窮不易操一度順理不私枉撓義也為上恭嚴為下卑遜退謙守柔為天下雌立於不敢設於不能禮也故修道則下歸服修德則下從令修仁則下不爭修義則下平正修禮則下遵敬五者皆修則家國安定此聖人之所以御萬物也無道則下叛無德則下怨無仁則下爭無義則下暴無禮則下亂五者不立而不危亡者未之有也文子復問曰治國之本何如老君曰未嘗聞身治而國亂者也夫靜以修身儉以養生則下不擾而民不怨是以天覆以道地載以德四時不失序風雨不為虐日月清明五星合度矣故為治之本在於安人安人之本在於足用足用之本在於勿奪勿奪之本在於節用節用之本在於省事省事之本在於無為夫無為者非謂引之不來推之不去迫之不應感之不動堅滯而不流捲握而不散也謂其私志不入公道嗜欲不枉正術循環而舉事因時而立功任下責成舉無過事名各自命類各自用事由自然莫出於己故事成而身不伐功立而名不有猶水行用舟山行用橇因高而田因下為池非吾所謂有為也古之立帝王者非以奉養其欲也聖人之踐位者非逸樂其身也為天下之人强掩弱衆暴寡智欺愚勇侵怯懷才不以相教積財不以相分故立天子以齊一之為一人之明不足以遍照海內故立三公九卿以輔翼之為絶域殊俗不得被其澤故立諸候以鎮撫之是以天無不任時無不應官不隱材國無遺利矣是以先王之法不殺胎不麛卵不涸澤而漁不焚林而畋豺未祭獸置罘不得通於野獺未祭魚網罟不得入於水鷹隼未擊羅罘不得張於谷草木未落斧斤不得入於林昆蟲未蟄不得以火畋孕育不殺鷇卵不探魚不尺不得取犬豖不期年不得食是故萬物之發若蒸氣此先王所以得時修備富國利人之道也夫水濁則魚噞政苛則人亂上多欲則下懷詐上多求則下交爭智詐萌生盜賊滋彰不理其本則求之於末無異鑿渠而止水抱薪而救火也聖人事省而治求寡而贍不施而仁不言而信不求而得不為而懷保真抱道而天下從之如影響故曰無為也文子曰無為之治既聞命矣敢問不言之教可得聞乎老君曰天致其高地致其厚日月照星辰朗非有言也正其道而物自然陰陽四時非生萬物者也雨露時降非養草木也神明接陰陽和而物自生矣夫道者藏精於內棲神於心靜漠恬淡悅穆胸中廓然無形寂然無聲官府若無事朝廷若無人無隱士無逸民無勞役無寃刑天下莫不仰上之德象主之指絶國殊俗莫不重譯而至非家至而人喻之推其誠心施之天下而已故賞善罰惡者政令也其所以能行之者精誠也政令雖明不能獨行必待精誠精誠形乎內而外喻於人心此不言之道也聖人在上懷道不言而澤及萬方故不言之教芒乎大哉是以人主之思神不馳於胸中知不出於四域懷其誠行之於心則甘雨以時五穀蕃殖養人以公威厲不試法省不擾囹圄空虛天下一俗莫懷姦心故精誠動於天景星現黃龍下翔鳳至醴泉出嘉禾生河不溢流海不湧波矣若逆天暴物則日月薄蝕五星失行四時相乖晝冥宵光山崩川涸冬雷夏霜天文變異國將危亡天之與人有以相通夫神明之事不可以智巧為也不可以强力致也惟聖人與天地合德與日月合明與鬼神合靈與四時合信懷天心抱天氣執沖含和不下堂而行四海變易習俗人皆遷善若生諸己謂之神化者蓋行不言之教也文子復再拜而問曰治國之本敬聞命矣治身之本奈何老君曰來吾語汝太上養神其次養形神清意平百節皆寧養生之本也肥肌膚充腹腸閉嗜欲養生之末也人能養其本節寢處適飲食和喜怒便動靜在內者已得邪氣無由入夫人受天地變化而生一月而膏二月而血三月而胚四月而胎五月而筋六月而骨七月而成形八月而動九月而躁十月而生形骸已成五藏乃官肝主目腎主耳脾主舌肺主鼻膽主口頭圓法天足方象地天有四時五行九解三百六十日人有四肢五臟九竅三百六十節天有風雨寒暑人有取與喜怒人與天地相類而為之主耳目者日月也血氣者風雨也日月失行薄蝕無光風雨非時毁折生灾五星失行國受其殃天地之道至闊以大尚猶節其章光愛其神明人之耳目何能久燻而不息精誠何能馳騁而不乏是以聖人守內而不守外夫血氣者人之華也五藏者人之精也血氣專乎內而不外越則胸腹充而嗜欲寡嗜欲寡則耳目清而視聽聰達五臟能屬於心而無離則意氣勝而行不僻精神盛而氣不散以聽無不聞以視無不見以為無不成是以飾其外者傷其內快其情者疲其神見其文者弊其真須臾不忘自賢者必困其性百步之中不忘其容者必纍其形故羽翼美者傷其骸骨枝葉茂者害其根荄是以靜漠恬淡所以養生和愈虛無所以據德外不亂內即性得其宜靜不干動即得安其位養生以經世抱德以修年可謂體道矣夫道者陶冶萬物修治無形寂然不動大通混冥深闊廣大不可為外折毫剖芒不可為內始於柔弱終於剛强治於短寡成於衆長故十圍之木始於把百仞之臺始於下是以真人體之故虛無平易清靜柔弱純粹素朴不與物雜得天地之道故謂之真人夫虛無者道之舍也平易者道之素也清靜者道之鑑也柔弱者道之用也純粹者道之幹也嗜欲不載虛之至也無所憎愛平之至也一而不變靜之至也隨時為宜柔之至也不為物散純之至也是以聖人輕天下即神不纍細萬物即神不惑齊死生則意不懾同變化則明不眩靜與陰同德動與陽同波亦無所疏亦無所親與道為際與德為鄰倚不杌之柱行不闕之途禀不竭之府學不死之師故無往而不遂無之而不通也文子再拜受教周平王問於文子曰聞子得道於老聃今賢人雖有道而遭淫亂之世以一人之權而欲化久亂之民其庸能乎文子對曰夫道德匡邪以為正振亂以為治化淫敗以為朴淳使德復生天下安寧要在一人故積德成王積怨成亡堯舜以是昌桀紂以是亡平王用其言而天下治文子復從老君授神丹之方遂證品仙階矣士成綺自楚來見老君曰吾聞子大聖人也吾故不辭遠道而來願見百舍重趼而不敢息今觀子非聖人也鼠壤有餘蔬而棄妹不仁也生熟不盡於前而積斂無涯老君漠然不應士成綺退明日復見曰昔者吾有剌於子今吾言信而心屈直吾形而立矣吾心正郤何故耶老君曰夫巧智神聖之人吾自以為脫矣昔者子呼我為牛而我為之牛呼我為馬而我為之馬苟有其實人與之名而弗受則受其殃吾服常服也吾非以服有服也於是士成綺鴈行避影履行遂進而問修身奈何老君曰爾容崖然而目衝然而顙頯然而口闞然而狀義然似繫馬而止也動而持發也若機察而審智巧而睹於泰凡以為不信近境有人焉其名為竊成綺慙而退老君西遊於秦陽子居邀於郊至梁而遇老君老君中道仰天而歎曰始以汝為可教今不可教也陽子居不答至舍進盥漱巾櫛脫履户外膝行而前曰向者大人仰天而嘆弟子欲請問大人行不間是以不敢今間矣請問其過老君曰睢睢盱盱而誰與居大白若辱盛德若不足陽子居蹴然變容曰聞命矣其往也舍者將迎家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣他日再見老君老君曰虎豹之文猿猴之捷所以致射也子居曰敢問明王之治老君曰功蓋天下而似不自已化被萬物而不恃有德而不稱其名立乎不測而遊乎無有者也老君之弟子庚桑楚即亢倉子也偏得老君之道北居畏壘之山其臣之畫然智者去之其妾之挈然仁者遠之擁腫之與居鞅掌之為使居三年畏壘大壤其民相與言曰庚桑子吾日計之而不足歲計之而有餘庶幾其聖人乎胡不尸而祝之社而稷之乎庚桑子聞之南面而不釋然曰春氣發而百草生正得秋而萬寶成豈無得而然哉吾聞至人尸居環堵之室而百姓不知所如往今以畏壘之細民而竊竊然欲俎豆豫於聖人之間吾是以不釋於老聃之言南榮趎問曰趎之年已長矣將惡乎託業庚桑子曰全汝形抱汝生無使汝思慮營營趎曰目之與形吾不知其異也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而誑者不能自得形之與形亦以闢矣而物或間之欲相求而不相得今謂趎曰全汝形抱汝生無使思慮營營趎勉聞此道達於耳矣庚桑子辭盡曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣雞之與雞其德非不同也有能與不能者其材有巨細也今吾材不足以化子子胡不南見老子耶南榮趎乃籯糧七日七夜至老君所老君曰子自楚所來乎趎曰唯老君曰子何乃與人偕來之衆也趎懼然顧其後老君曰子不知吾所謂乎趎俯而慚仰而嘆曰今者吾忘吾答因失吾問老君曰何謂也趎良久復問曰不知乎人謂我朱愚知平反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我已我安逃此而可乎此三言者趎之所患願因楚而問之老君曰向吾見若眉睫之間吾固已得汝矣今汝又言而信之何規規然若喪父母揭竿而求諸海也汝亡人哉罔罔乎汝欲反其情性而無所自入可憐哉南榮趎請就舍召其所好去其所惡十日自愁而復見老君老君曰汝自洗濯孰哉鬱鬱乎然而其中津津乎猶有惡也夫外韄者不可繁而捉將內揵內韄者不可謬而捉將外揵外內韄者道德不能持而況放道而行者乎趎曰里人有病里人問之病者能言其病然病猶未病也若趎之聞大道譬猶飲藥以加病者也趎之願聞衛生之經而已老君曰而能抱一乎能勿失乎能無卜筮而知吉凶乎能止乎能已乎能舍諸人求諸己乎能翛然乎能侗然乎能兒子乎終日號而嗌不嗄和之至也終日視而目不瞚偏不在外也終日握而手不掜共其德也行不知其之居不知所為與物逶迤而同其波是衛生之經也已趎曰然則至人之德已乎曰非也是乃所謂冰解凍釋者也夫至人相與交食于地而交樂于天不以人物利害相攖不相與為怪不相與為謀不相與為事翛然而往侗然而來是謂衛生之經已曰然則是至乎曰未也吾故告汝曰能兒子乎兒子動不知所為行不知所之身若槁木之枝而心若死灰若是者禍亦不至福亦不來禍福無有烏有人灾趎再拜致謝而去精神曉靈十日不食如享太牢智略天地察分秋毫定王問老君曰方今在世神仙可得知乎老君曰東嶽有展禽先生南嶽有匡續先生西嶽有尹喜北嶽有皇人中嶽有古先生即余是也續字子孝老君之弟子也修道於盧山七百年至烈王時白日登仙王聞其名遣使徴之使者詣其所空存靖盧因奏請以南嶂山為靖盧山復以先生姓呼為匡阜按爾雅釋名云土山曰阜此山本名南嶂言上有三天嶂也古祀潜山為南嶽而以南嶂為儲福故亦呼南嶽漢武帝元封五年巡狩祀名山大川射蛟潯陽江中顧問此山何神主之劉歆奏曰匡續先生得道於此帝因命立祠於虎溪舊隱列于祀典至東晋桓伊守九江好奉釋氏乃從鴈門僧慧遠之請徙先生祠於山口而以其地為僧居今東林寺是也先生上升之後老君授以真人之位令主吳楚水旱乃賜以主瘟之印統攝八部瘟神俗因號為和瘟匡阜先生宋朝建中靖國元年九月勑封靖明真人遇祈禳例降御前視版遣郡官詣觀行禮敬王十七年戊戌孔子謂南宫敬叔曰吾聞老聃博古該今通禮樂之原明道德之歸則吾師也今將往焉敬叔曰謹受命乃言於魯君曰臣受先君之命云孔子聖人之後滅於宋其祖弗父何始有國而授厲公及正考父佐戴武宣三命益恭載諸鼎銘臧孫訖有言聖人之君若有當世則必有明達焉孔子少而好禮其將在矣屬臣必師之今孔子將適周觀先王之遺制考禮樂之所極斯大業也君蓋以乘資之臣請以往公曰諾乃遺孔子車一乘馬二匹僮一人與敬叔俱明年至周見老君老君曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未也老子曰子惡乎求之哉孔子曰求之度數五年而未得也曰子又惡乎求之曰求之陰陽十有二年而未得也老君曰然使道而可獻則人莫不獻之於其君使道而可進則人莫不進之於其親使道而可以告人而人莫不告其兄弟使道而可以與人則人莫不與其子孫其不可者無他也中無主而不立外無正而不行由中出者不受於外聖人不出由外入者無主於中聖人不隱孔子退無何復見老君拜而問曰今者宴間敢問大道老君曰君子得時則駕不得時則蓬纍而行吾聞之良賈深藏若虛君子盛德容貌若愚去子之驕盈梁多欲態色與淫志皆無益於子之身吾之所告子者若此而已他日又見老君而語仁義老君曰夫播糠眯目則天地四方易位矣蚤虻潛膚則通夕不寐矣吾子使天下無失其朴則天地固有常矣日月固有明矣星辰固有列矣禽獸固有群矣物植固有立矣吾子欲放德而行循道而趨已至矣又何偈偈乎揭仁義若擊鼓而求亡子焉意吾子其亂人之性也夫鵠不日浴而白烏不日黔而黑黑白之朴不足為辨名譽之觀不足以為廣泉涸魚相處於陸相詬以濕相濡以沫不若相忘於江湖孔子歸三日不談子貢怪而問曰夫子見老聃亦將何規哉孔子曰為吾知其能飛魚吾知其能游獸吾知其能走飛者吾可以增游者吾可以綸走者吾可以網至於龍合而成體散而成章垂雲氣而上天吾所不能測也今見老聃其猶龍乎吾口張而不能嗋神錯而不知所居吾又何規老聃哉楊傑序老子記云老子先天地而生不知而華皓壽以久也弱而能言非習教也莊而能嬰專致柔也胎于尹母降于仁里子孫繼之與人同也指李為姓無所係也聃耳廣目日角月淵二柱三門握十蹈五神人表也受學容成問道常樅無常師也伏羲時為鬱華子神農時為大成子祝融時為廣壽子商陽時為赤精子帝嚳時為録圖子唐堯時為務成子夏禹時為真行子商湯時為錫則子周文時為燮邑子又曰太史儋在天為金闕帝上景君神寶丈人無常名也藏史柱史不擇仕也周衰度關退以時也道德妙藴洞神靈章天人法也旋斡造化呼吸陰陽陟降星斗消息九變飛煉金石役使鬼神躡景凌雲遁形隱耀長生久視佑善濟厄超萬化也世莫知其然否而以隱君子稱之孔子曰鳥吾知其能飛魚吾知其能游獸吾知其能走至於龍則合而成體散而成章乘風雲而上天吾所不能知也吾見老子其猶龍乎古今言老子者多矣未有如孔子之所言也子貢請問於孔子曰人固有尸居而龍見雷聲而淵默發動如天地者賜亦可得觀乎孔子曰夫白晏遊蕩衆人莫不欲見隆然而天冥然而雷勃然而雨各捧其首賜汝何能觀乎子貢遂以孔子之聲見老君老君方據牀而應微曰豫年運而往矣子將何以戒我哉子貢蹴蹴然立不安老君曰小子可歸矣汝之師名丘相諫三年而後可教矣子貢反孔子曰汝已震矣子貢懷慙無以答焉孔子見老君弟子從焉老君曰前者為誰對曰仲由勇且多力者也次曾參孝者也次顔回仁者也次顓孫師武者也老君曰吾聞南方之鳥其名為鳳戴聖纓仁左信右賢力在足而勇在前斯為下矣老君助葬於達巷黨人孔子從焉日有食之老君曰丘止柩就道左止哭以聽變既明反而後行反葬孔子問曰夫柩不可以反也日有食之則豈如行哉老君曰夫柩不蚤出不莫宿見星而行唯罪人與奔父母之喪者乎日有食之安知其不見星也孔子問曰下殤用棺殮禮歟老君曰吾昔見史佚有子死下殤也而墓遠召公謂之曰何以不棺殮於宫中佚曰吾敢乎哉言於周公公曰豈不可佚乃行之下殤用棺殮自佚始也孔子問曰三年之喪卒哭金革之事無辟禮歟老君曰昔魯公伯禽有為為之也徐戎作難故也孔子曰古者行師必遷廟主而行何也老君曰君去其國太宰取群廟之主以從禮也祫祭於祖則祝迎四廟之主主出入廟必蹕禮也孔子問曰聞古之祀天有五帝之神尸之有諸老君曰天有五行木火金水土分時化育協佐上帝生成萬物真神謂之五帝孔子曰敢問何謂五帝老君曰東方靑帝威靈仰執規以司春南方赤帝赤熛弩執衡以司夏西方白帝白昭矩執矩以司秋北方黑帝叶光紀執權以司冬中央黃帝含樞紐執繩以司四季故古之王者易代改號取法五行五德更始終始相生故其為明王者死配享於五行是以太皥配木炎帝配火黃帝配土少皥配金顓頊配水也孔子問曰甚矣道之難行也丘比執道委質於當世之君而不我受也道之於難行也老君曰說者流於辨聽者亂於辭知此二者則道不可委矣子之所言者其人與骨皆已朽矣獨其言在耳詩書禮樂先王之陳迹也豈其所以迹哉夫迹履之所出而迹豈履哉夫白鶂相視眸子不運而風化蟲雄鳴於上風雌應於下風而風化類自為雄雌而風化性不可易命不可變時不可止道不可壅苟得其道者無自而不可失焉孔子退就舍三月不出復見老君請曰丘得之矣烏鵲孺魚傳沫細腰化有弟則兄啼久矣夫丘不與化為人安能化人老君曰可丘得之矣孔子一日又往見老君老君新沐方將被髮而乾慹然似非人孔子便而待之少焉見曰丘也眩歟其信然歟向者先生形骸掘若橋木似遺物難人而立於獨老君曰吾游於物之初孔子曰何謂也曰心困焉而不能知曰闢焉而不能言嘗為議其將至陰肅肅肅肅出乎天至陽赫赫赫赫發乎地兩者交通成和而物生焉成物之紀莫見其形消息盈虛一晦一明日改月化有所為而莫見其功生有所乎萌死有所乎歸始終相反乎無端而莫知其所窮是非也且孰為之宗孔子曰請問遊是老君曰得是至美至樂也得至美而遊乎至樂之謂至人孔子曰願聞其方曰食草之獸不疾易藪水生之蟲不疾易水行小變而不失其大常者也喜怒哀樂不入於胸次夫天下者萬物之所一也得其所一而同焉則四肢百體將為塵垢死生終始將為晝夜而莫之能汩而況得喪禍福之所介耶棄隸者若棄泥塗之身貴於隸也貴在於我而不失於變且萬化而未始有極也夫孰足以患心哉為道者解乎此矣孔子曰大人德配天地而猶假至言以修心古之君子孰能脫焉老君曰不然水之於汋也無為而才自然矣至人之於德也不修而物不能離焉夫天之自高地之自厚日月之自明夫何修焉孔子出以告顔回曰丘之於道其猶醯雞歟微夫子之發吾覆吾不知天地之大全也孔子將反魯老君送之曰吾聞富貴者送人以財仁者送人以言吾既不能冨貴竊仁者之號請送子以言凡今之士聰明深察而近於死者好譏議人者也博辨宏達而危其身者發人之惡者也勿以有己為人子者也勿以有己為人臣者也孔子曰敬奉教自周反魯其道彌高遠方弟子從者至三千焉按唐享孔廟迎神樂章云通英表聖問老探真三千弟子五百賢人億齡規法萬載祠禋潔誠以祭奏樂迎神云大樂舊有此詞不詳所起王廙頌曰無為有宗虛為實源老子清寂寄意不言遂為孔師守一長存陸士衡頌曰孔丘睿聖配天弘天風扇玄流恩深神寶明發懷周興言模老信非虛也蘇子古史曰孔子以仁義教人而以禮樂治天下仁義禮樂之變無窮而其稱曰吾道一以貫之或無以貫之則因變而行義必有支離而不合者矣易曰形而上者謂之道形而下者謂之器語曰君子上達小人下達而孔子自謂下學而上達者灑掃應對詩書禮樂皆所從學也君子由是以達其道小人由是以得其器達其道故萬變而致一得其器故有守而不蕩此孔子所以兩得也蓋孔子之為人也周故示人以器而晦其道使達者易入而未達者不眩也老子之自為也深故示人以道而略其器使達者易入而不恤其未達也要之其實皆志於道而從施之有先後耳聞之吾兄子瞻曰太史公言莊子作漁父盜跖胠篋以詆訾孔子之徒以明老子之術此知莊子之粗者豫以為莊子之言皆實豫而文不豫陽擠而陰助之其詆訾孔子未嘗不微見其意也太史公又言申韓少恩皆原於道德之意夫商鞅以法治秦申不害以術治韓憲令著於官府刑罰必於民心所謂法也因任而授官循名而責實操生殺之柄課群臣之能所謂術也韓非之學並取申商而兼用之法之所止雖有聖智不用也術之所操雖有父子不信也此申韓所謂老子之道而實非也陳大夫聘魯私見叔孫叔孫曰吾國有聖人子知之乎大夫曰非孔丘耶曰然曰何以知其聖叔孫曰吾聞顔回孔丘能廢心而用形陳大夫曰吾國亦有聖人子弗知乎曰孰謂聖人曰老聃之弟子有亢倉子即庚桑楚也其著書號洞靈真經得聃之道能以耳視而目聽叔孫以告魯君聞之大驚使上卿厚禮以致之亢倉子至魯君卑辭請問亢倉子曰傳之者妄也我能視聽不用耳目而不能易耳目之用魯君曰增異矣其道奈何亢倉子曰體合於心心合於氣氣合於神神合於無其有介然之有唯然之音雖遠在八荒之外近在眉睫之間我必知之乃不知是我七孔四肢之所覺心腹六腑之所知其自知而已矣魯君大悅他日以告孔子孔子笑而不答商太宰蕩見孔子而問曰丘聖者歟孔子曰聖則丘何敢丘博學多識者也太宰曰三王聖者歟孔子曰三王善任智勇者聖則丘弗知曰五帝聖者歟曰五帝善任仁義者聖則丘弗知曰三皇聖者歟曰三皇善因時者聖則丘弗知太宰大駭曰然則孰為聖孔子動容有間曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其為聖弗知其真聖歟真不聖歟太宰默然計曰孔丘欺我哉老子之和光同塵處無為之事行不言之教故孔子慕其聖而往師之且如亢倉子衆猶稱為聖人而況其師于魯表東海周在魯西時老君在周孔子居魯故指其方述其德而推其聖諒非欺也後人或者妄認以為佛是時佛滅已久且與中國言語不通文軌不同孔子奚取焉況孔子內諸夏外夷狄被髮左衽乃其所深惡春秋之法用夷禮則貶之其肯捨中華之聖師而尊之耶昔有文王居于岐山之下是為西伯武王曰惟我文考顯于西土周在中華之西故亦自稱為西也如伯夷叔齊處于孤竹慕文王之聖德相謂曰吾聞西方有人似有道者試往觀焉遂至岐山之陽詩云為誰之恩西方美人彼美人兮西方之人兮此衛國風也鄭氏箋云思周室也又齊姜謂晋文公曰西方之書有之日月不處人誰獲安此亦周書也歷考古之所謂西方者指言周耳孤竹遼西之國也魯衛齊東方之諸侯也故皆稱為周西方未嘗遠指流沙之外也至於陰陽家云某神煞在西方乃指在墻壁間豈遠指他所乎又如孔子南之沛見老君老君稱為北方之賢豈在獯鬻玁狁之類哉夷烈王二年老君過秦獻公聞之郊迎授館致禮問曰敝邑鄙遠孤不肖先生幸臨寵之軍旅之事不敢瀆聽天之曆數可得聞乎老君曰老夫何足以知此公曰孤願聞之先生無讓老君曰秦始與周合而中離離五百載而復合合七十載而霸王者出焉過此以往未可問也公悅曰願先生少留使得師事之明日老君不謝而行遂出散關秦孝公時老君東還又與尹真人等遊于上虞赤城蒙山重過扶桑大帝之所校集群仙已而隱於洛中景室山時有黃髮老叟五人或乘鶴或衣羽手執靑筠之杖相與共談天地之數世無知者老君著經書垂十萬言傍有二神人捧金壺盛墨汁狀若淳漆其墨灑木石間皆成篆籀之文王嘉拾遣記云昔老君居景室山與老叟五人共談天地之數撰經書垂十萬言有浮提國二神人出金壺器中有墨汁狀若淳漆灑木石皆成篆隸以寫之及金壺汁盡二人乃欲刳心瀝血以代墨焉五老即五天帝釋也景室即太室山也秦昭王時老君與尹真人諸仙遊女几地肺天柱諸山復西出散關渡流沙升崑崙還紫微上宫返平太玄之鄉王聞之恨不及見乃於西麓下老君經由之處為修城邑以表聖迹今有老君亭驛尹喜城故墟尚存秦孝文王畋于殽函之間親詣樓觀禮祠焉赧王十年丙辰老君遣使召隱士沈羲羲本吳郡人學道於西蜀能救人疾苦一日與妻賈氏共載詣子婦卓孔寧家路逢龍車虎車白鹿車各一乘導從甚衆皆朱衣仗節問羲曰君是處十沈羲否羲愕然答曰是騎士曰處士陰功及物心不忘道少小以來履行無過黃老今遣仙官來迎乘白鹿車者侍郎薄延也靑龍車者度世君司馬生也白虎車者送迎使者徐福也須臾三仙羽衣持節以白玉册靑玉界丹玉字授羲碧落侍郎遂載羲升天時路間鋤耘人皆見之須臾大霧霧散但見羲所乘車牛入田食苗或有識其牛者以報羲家其子疑為邪魅所攝乃將數百人分布百里之內山谷間搜求之不獲至後漢殤帝元年丙午凡四百一十二年乃還鄉里推求得其十世孫名懷喜懷喜曰聞先世相傳說家有仙人今來歸耶留數十日說初上天時不見天帝惟謁老君宫殿鬱鬱有如雲氣五色不可名狀侍者數百人多是童子庭中有珠玉之樹衆芝叢生龍虎避邪遊戲其間但聞琅琅如銅鐵之聲四壁熠熠有書著之老君長可丈餘體有光耀不可正視老君令玉女持金桉玉杯盛藥賜羲曰此是神丹飲者不死夫妻各一刀圭告言飲畢拜而勿謝筆賜棗二枚大如雞子復以符一道及仙方一首賜羲今且還人間救人疾苦若欲上升可以此符掛竿杪吾當遣使迎汝語已羲奄然如睡覺已在地上竇太后疾嘗遣使請羲安帝時猶在人間後復升天秦始皇建老君祠於樓觀之南世給廟户親製祝文曰大道泛兮其可左右老君去則西遊返則東顧朕方有事蓬瀛願垂影響始皇躬行享禮俄見老君降于座帝驚喜再拜罄折求道老君笑而不答命授以鬼林經策使鬼神之符猶懇請不已老君忽不見始皇贍悵而還其所製文筆札尚存混元聖紀卷之六
